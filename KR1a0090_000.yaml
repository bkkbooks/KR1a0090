body:
  text: 周易文詮易類提要臣等謹案周易文詮四卷元趙汸撰汸字子常休寧人師事黃澤受易象春秋之學隱居著述作東山精舍以奉母洪武二年召修元史不願仕乞還未幾卒此書大旨主於略數言理然其門人金居敬稱其契先天內外之旨且悟後天卦序之義則亦未嘗置數也經義考載八卷此本舊抄止四卷然首尾完具疑出後人所合併原書上方節節標題細字詳其詞意不類汸筆或後來讀者所題記於經義亦鮮所闡發今併從刪削焉汸平生為學工夫於春秋最深所著説春秋之書亦最多並巳别著於録其説易祗有此本流傳頗罕其中詮釋義理大旨本宋儒緒論為多不及其春秋諸書之深造自得然其於天道人事吉凶悔吝之際反覆推闡極為明暢頗有合於通德類情之本指於易義不可謂無所發明以之羽翼程朱固亦足備一家矣乾隆四十二年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:e6abe8fdd93385ea22dd260677c1e31544e220b21823b2e0fbf17755bf176f48
