body:
  text: 周易文詮卷二元趙汸撰艮下兑上咸亨利貞取女吉卦有交感之義故名咸其在于人與天下相感精神往來毫无間隔故亨然感通之道以静不以動以誠不以言所謂咸者利于无心之貞我不着感彼不着應戒欲循理一出自然合天理而出于无心當人情而應以无意如取女之正乃得咸之貞而吉彖曰咸感也卦名咸者彼此交感之義也无心者不能感故咸加心而為感有心者不能咸感故感去心而為咸咸皆也惟无心故无不應咸感者心无其心也柔上而剛下二氣感應以相與止而説男下女是以亨利貞取女吉也卦體柔上剛下是剛感柔應柔感剛應其氣相通造化所感之正也卦徳艮止兑説是感者專一不他應者樂從无强其情相洽人已所感之正也卦象男先下女既不凟倫以少配少又不過時男女所感之正也凡此皆貞是以亨而取女之吉也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣即感之理而極言之天地與萬物同一氣以氣感而物之同受是氣者自莫知其氣化而形生焉聖人天下同一心以心感而人之同有是心者自莫知其情孚而和平焉即此而究觀之凡天地施受萬物應求皆不期感而自无不感者其情盖可見矣象曰山上有澤咸君子以虛受人澤非山上所有而有之是澤氣上蒸于山而山受之咸象也君子以山惟虛故受澤心惟虚故受益于是寂然不動廓然无我任物之自往自來而我全无意必致虛以受天下之感與山之受澤无異矣初六咸其拇處咸之初感于最下是事物未接而意見将迎不能虛受有心于感者也故為咸拇之象象曰咸其拇志在外也未感之先心本在内一動于感則逐于外此豈處静之學乎六二咸其腓凶居吉隂柔􅏥動不能固守是當感之時不克順應馳逐于物有心于感為咸其腓如是則虛體汨而感動累矣凶然幸其中正徳性未冺能居其所静以待感則為以虚受人而吉動凶静吉君子審之象曰雖凶居吉順不害也二凶而居猶吉葢反􅏥為静能順自然之正静固静動亦静矣何害之有九三咸其股執其隨往吝初二隂柔不當隨者三不能自主而隨之是所守不正感不以道專以隨人為主而執之不變者也為咸股執隨之象如是以往徒以身為天下役感必不通吝象曰咸其股亦不處也志在隨人所執下也隂柔固動而不處三以陽剛亦然其志盖在隨人與君子超然自立大相刺謬不亦卑下之甚乎九四貞吉悔亡憧憧往來朋從爾思心之感動當正而固乃得其理九四以陽居隂未免有悔必能以静虛為感大公順應而貞乃推之而感无不通反之而心无所役吉而悔亡若有心于感而憧憧往來思及于徃思及于來又思及于徃而來來而往将以思窮物者終必以物窮思則但見朋類從之豈能感通天下悔且不免况于吉乎象曰貞吉悔亡未感害也憧憧往來未光大也貞吉悔亡者以貞為感意必不生未涉私感之害也若憧憧往來則計較横據咸道狹矣豈得為光大乎九五咸其脢无悔心體至虛膠之使有絶之使无皆非貞也五當脢處是有心絶物孤髙寂寞一无所感者也為咸其脢較之二三之縁感而生累者雖亦少異然亦僅可无私感之悔耳象曰咸其脢志末也君子以天地萬物為一體以經綸參賛為已責天下何一不藉吾感而乃至于脢焉其志不亦末乎上六咸其輔頰舌人于天下固不可无心于感亦不可有心于感上六以隂柔居悦之終當感之極耑以巧媚動人而无其寔為咸其輔頰舌之象象曰咸其輔頰舌滕口説也感人貴誠上則馳騁不根咸之貞道失矣巽下震上恒亨无咎利貞利有攸往卦有恒久之義故為恒學而能恒則真積久而見解融亨且作輟不生而无頻復之咎然天下无不恒之正容有不正之恒必有所行者精擇乎經常不易之正道而守之方措之事業无往不利彖曰恒久也剛上而柔下雷風相與巽而動剛柔皆應恒卦名恒者久之義也卦體剛上柔下髙卑以陳分之常也卦象震雷巽風動散相承勢之常也卦徳巽入震動各妙其用有常行矣卦體剛柔相應彼此相資有常情矣常則无不及者故曰恒恒亨无咎利貞久於其道也天地之道恒久而不已也恒固亨无咎矣又曰利貞者何也盖正外无道道外无正惟皆聖賢當然之道乃非久于私智久于異端而謂之恒不正不可以言道也觀之天地惟天之命於穆不已萬古如斯亦以正而久也况人顧可以不貞乎利有攸往終則有始也天下之理有守斯能有為不養則不可動利有攸往者正謂久于其道學問于此造極經綸于此造端有終則有始而不可窮也何往不利日月得天而能久照四時變化而能久成聖人久于其道而天下化成觀其所恒而天地萬物之情可見矣以恒道極言之日月得天自然之理亘古今而能久照于上一恒也四時隂陽變化亘古今而能久成乎時亦一恒也聖人至誠无息而治功悠久天下化于道而成俗亦一恒也即此觀之覆載生成常理不愆飛潛動植常性不易情之所在皆道之所在人則安可久非其道也故貴利貞象曰雷風恒君子以立不易方雷風至變也而終古不易變而有不變者存恒之象也君子體之以隨其所至不易方焉常久之理如綱常倫紀以至日用事物各有當然之則所謂方也見之既明守之又定任千變萬化而其所立終不可易君子之恒也初六浚恒貞凶无攸利初與四應理之常也但居在下位不无相隔之勢初不度量以巽善入之性深以常理求之計欲其聽言欲其從為浚恒之象如是則所求雖為正應而不自量以入嫌隙易生徒取疏辱凶又何利象曰浚恒貞凶始求深也人情相求貴量淺深初與四相與之始遽深求之交淺言深所以凶也九二悔亡以陽居隂所為或有乖于常道本應有悔幸其居柔是存心有常為能圖回善反範其身于中正之歸以久于道故内省不疚而悔亡象曰九二悔亡能久中也二宜悔而亡者葢道所貴者中中所貴者久能久于其中始終不渝則氣質雖偏中不可改何悔不亡九三不恒其徳或承之羞貞吝三居得正本自有徳乃過剛不中志從于上是識操未定一旦易志于功名富貴者也大節一隳終身莫贖上而見鄙縉紳下而遺譏清議羞辱之來有不知其自來者夫无徳承羞猶可言也貞而不恒何羞如之象曰不恒其徳无所容也凶咎猶可言也以不恒取羞則内媿已外媿人其身心何所容乎九四田无禽以陽居隂久非其位是所久者偏主曲學之私非聖賢中正之道内无益于身心外无禆于事業猶田于无禽之地而无獲也象曰久非其位安得禽也位者人所當止之處即所謂道也久非其道流于曲學而无用安得禽乎六五恒其徳貞婦人吉夫子凶自古英君毅辟非不降其虚懐而乾綱未始不攬五以柔中應二剛中是人主以任臣為貞而守之不變為恒其徳貞之象不知君道貴剛與臣道貴柔不同夫此順道惟臣事君如婦之從夫則可若君使臣如夫之從婦則偏任生奸而凶象曰婦人貞吉從一而終也夫子制義從婦凶也婦人貞吉以臣道猶妻道忠順不失以事一人如婦人從夫終身守一故吉若君則猶夫也正當以義獨制而乃至于從婦安免下移之凶上六振恒凶振者動之速也上六居恒之極處震之終恒極則不常震終則過動又隂柔不能固守是大臣當國不能安静一于紛更者也故有以振為恒之象而有悮國悮民之凶象曰振恒在上大无功也振恒自以為功矣孰知動擾之極貽害民社不小也艮下乾上遯亨小利貞遯退避也二隂浸長陽當退避故為遯然君子時雖當遯而九五當位下有六二之應若猶可以有為但二隂浸長于下則其勢不可以不遯故為君子能遯則身雖退而道亨在小人則利于守正不可以浸長之故而遂迫于陽也彖曰遯亨遯而亨也剛當位而應與時行也遯何言亨正以惟遯能亨不遯則不能亨也五剛當位而二應之是君子有可為之徳小人有包承之心似不必遯而二隂漸長正當遯之時也君子于此不恃可為不倚私好見早去決通乎時之妙用而與之偕行則不降不辱而亨小利貞浸而長也小利貞者二隂浸長其勢日盛将凌君子非小人之貞即非小人之利故利于貞遯之時義大矣哉乃知遯之時以遯為義者也時自外遭義由中出不先時而遯不後時而遯不遯于迹而遯于理相時之消息而妙用之非有見幾之智克己之勇者不能其時義豈不大哉象曰天下有山遯君子以逺小人不惡而嚴天逺於山遯之象也君子以逺小人不必大聲厲色以絶彼之迹惟荘敬自持以消彼之邪則无意于逺小人而小人自逺猶天无意以逺山而山自逺也初六遯尾厲勿用有攸往當遯之時宜先不宜後初居卦下不能與時皆遯為遯尾之象危道也惟勿往而静俟可耳象曰遯尾之厲不往何災也遯尾之厲以不早遯故耳若止而不往則不殆不辱矣六二執之用黄牛之革莫之勝説二當遯時而有中順之徳知時之當遯而與時偕行收歛其徳不形于外守之不變萬鍾不以動其心三公不以易其介猶執之用黄牛之革者莫之勝説也象曰執用黄牛固志也遯不以迹而以志二固守其中順之志故能確乎不拔也九三係遯有疾厲畜臣妾吉三近二隂是君子隠忍包容不能決去有所係戀者也不惟名節有疵而且中傷有禍疾厲所不免者此用豢飬臣妾則吉若施之于遯則不可也象曰係遯之厲有疾憊也畜臣妾吉不可大事也係遯之厲非小人能危君子以君子溺于比昵故有疾而至憊也畜臣妾吉者係戀之情僅可施之此耳若出處之事大節攸闗豈可以此畜之乎九四好遯君子吉小人否四下應初是與小人有所好也然乾體剛健不係私好而絶之以遯者此惟自克以義制欲之君子能之有遯亨之吉而小人則否也象曰君子好遯小人否也君子重名義故能絶私愛而遯若小人則昵私情必不能矣九五嘉遯貞吉人當遯時或當遯而不能與時偕行或能遯而濡滯不決俱非遯之美也今五與二中正相應是在已有可為之徳在人有承順之心若不必遯而能與時偕行妙用其機善藏其用遯之嘉美者也乃為得處遯之正道而身名兩全吉象曰嘉遯貞吉以正志也人志富貴則富貴足以累心人志功名則功名足以累心五能正其在我之志則泊然无累故能嘉遯而吉上九肥遯无不利陽剛有必遯之志无應又得遂其志故其為遯也優游自得處之裕如而肥者也如是則寵辱不驚理亂不聞尾係厲危俱不能及无不利象曰肥遯无不利无所疑也心有所疑則身有所係上九胸次洒落无疑于富貴功名无疑于毁譽得失故肥遯无不利乾下震上大壮利貞四陽盛長是君子滿朝故為大壮然其所以壮者不徒勢以倡之寔理以維之也制心制事立身立朝務以禮義正直自持而終无氣激謀疎自恃其壮之意乃可保其壮而利彖曰大壮大者壮也剛以動故壮卦名大壮以四陽盛長君子之勢将充滿于朝大者壮也然君子之大大以道而非徒以其人君子之壮壮以理而不徒以其勢卦徳乾剛震動是本天徳之剛以動毅然樹道義立名節不屈于欲不靡于氣故勢日昌而業日熾而壮大壮利貞大者正也正大而天地之情可見矣大壮矣而又利貞者何以君子之大者本无不正也其人為天下之大人則所存所發光明俊偉方嚴特立必无不正故利于貞試即正之出于大者究言之天地无情无私而已矣无私覆載无私生成亦一貞也天地且然况君子乎信乎大壮不可不貞也象曰雷在天上大壮君子以非禮弗履雷在天上威嚴赫烈大壮之象也君子體之以為禮者天理之正非禮者人欲之私苟非禮而履之則无以勝私而不可以言壮故必以理制欲不失身于從欲之危以道御情不失身于邪動之過而後天徳之剛常伸徳義之勇在我自勝者强矣初九壮于趾征凶有孚初以陽剛居下事權全不在我乃因君子勢盛之日不量勢力恃壮妄為遽欲興大事去小人壮于趾者也以是而往為􅏥為激理拂事乖其凶必矣象曰壮于趾其孚窮也居下而即􅏥進其凶不必于事後也當始壮之時理勢有必困窮矣九二貞吉以陽居隂不免恃壮似乎不貞然所處得中是大臣以禮持躬相其機而不驟明其勢而不激凡所動履一歸于正則内不任剛外不召釁吉象曰九二貞吉以中也大凡事无過舉皆由于心无偏私二以貞得吉以其心之中也九三小人用壮君子用罔貞厲羝羊觸藩羸其角君子之于天下必有忍人所不能忍之徳性然後有為人所不能為之事功九三過剛不中是君子之恃壮輕為者夫小人方用无禮之勇以伺君子而君子乃不能慎重蔑視小人是亦過于壮矣所為雖正而意忽防疎適以自厲有羝羊恃壮觸藩自困其角之象君子可不戒乎象曰小人用壮君子罔也小人血氣未除用壮无足怪者乃君子以義理自勝而亦用罔謂之何哉九四貞吉悔亡藩決不羸壮于大輿之輹以陽居隂不免躁進之悔然不極其剛為能自反不恃壮用罔而貞則動罔不臧而心隨以愜吉且悔亡矣如是則羣邪屈服不撓上進之機而在人无阻小人不能阻君子之進取象于羊猶藩決而不羸其角素藴精强發于幹旋之際而在我不撓君子不患无可行之其取象于車猶壮于大輿之輹象曰藩決不羸尚往也凡往之不利皆由用罔者自取其困壮趾者自致其凶惟不極其剛而以貞行則人心无忤事勢不拂羣邪莫阻而吾道可尚進也六五喪羊于易无悔隂柔居中既巽順而无可為之才復安分而无必為之志是人皆恃壮競進彼獨喪其剛勇之氣而不自覺者為喪羊于易之象羸角之悔吾知免矣其如尚往何象曰喪羊于易位不當也柔中雖善而以之處壮則為不當故不能乗時有為耳上六羝羊觸藩不能退不能遂无攸利艱則吉壮終動極是大臣才弱志剛不自度量而喜動好事心既不安于退而才又不足以遂其進為羝羊觸藩不能退遂之象如是何所利哉然惟不艱故耳誠能詳審而艱以處之内審事理外度機宜則善用其壮終得遂其進而吉象曰不能退不能遂不詳也進退无據由其不詳審于時勢也艱則能詳而遂其進彼不遂之咎不長矣上可不艱哉坤下離上晉康侯用錫馬蕃庶晝日三接上離下坤是人臣以坤順之徳乗時而麗乎君故為晉盖人臣立功啟之者時本之者徳而成之者君有是三者而上進則澤被生民功在社稷為安國之侯用是而受君之寵不惟錫馬而且蕃庶禮何隆也不惟晝接而且三接情何殷也康侯之遇誠隆哉象曰晉進也卦名晉者是上進之義在天道為方亨之㑹在人事為奮庸之時也明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接也康侯何以獲此殊遇哉盖録功以時卦象明出地上是世道清明賞罰无私有其時矣居功以徳卦徳順麗大明是恭順事上勞謙不伐有其徳矣録功以君卦變柔進上行是徽柔在御崇徳報功有其君矣有此三者自成安國之殊勲膺寵任之殊遇是以康侯用錫馬蕃庶晝日三接也象曰明出地上晉君子以自昭明徳明出地上愈進愈明晉之象也君子以晉莫有大于進徳者徳本明也而昏昭之機全操于自于是澈吾蔽澄吾天日新又新内省于潛宻惺于獨而徳将與日同明矣初六晉如摧如貞吉罔孚裕无咎以隂居下有欲進之心應不中正遇妨賢之人有晉摧之象當此可尤人乎惟重道義慎名節自守以貞終必見信于上得遂其進而吉然此論其常耳設猶未孚亦當泰然寛裕以俟之自无干進之咎象曰晉如摧如獨行正也裕无咎未受命也晉何以摧如以直已守道獨行正耳惟正所以見摧又安可因摧以失其正即至罔孚必裕无咎者以未有官守之命正可綽綽自如也六二晉如愁如貞吉受兹介福于其王母六二中正无應有可進之徳无汲引之人一片憂盛危明之心不能自遂能免愁乎為晉如愁如之象然豈以愁而遂自貶以求庸乎必直已守正乃終見知于主不惟得遂其進而吉且受大福于中順之君而寵任不虚矣象曰受兹介福以中正也二有中正之徳明主所必求者介福所以受也非倖致也六三衆允悔亡三不中正宜有悔者然下與二隂皆欲進而麗乎大明之君是其志同道合為衆所允如是則信友可以獲君摧愁之悔可亡象曰衆允之志上行也人孰无志但志于富貴功名者皆不為衆所信三之志欲上而行道故衆皆允之也九四晉如鼫䑕貞厲四无中正之徳而竊據髙位患得患失貪而畏人者也為鼫鼠之象雖位出天朝而貞然徳不勝位終必失之厲象曰鼫鼠貞厲位不當也无徳而據髙位是為不當雖貞亦厲豈能久乎六五悔亡失得勿恤往吉无不利以隂居陽治道或有未純不无有悔幸大明在上天資英敏健明以照其悔可亡然五雖明體而以六居之人主當晉盛之時挾長駕之術功利之私在所不免此而不以純王之心處之終非純王之化也必去其好大喜功之心而一切得失概置勿恤乃政純化溥吉无不利象曰失得勿恤徃有慶也王道本于誠意失得勿恤純王之心也本此心以往則化自溥而大有慶矣上九晉其角維用伐邑厲吉无咎貞吝上居剛進之極是純以躁猛用事而畧无寛和之度為晉其角之象若此者将安用之維用伐不服之小邑雖兵凶戰危而厲亦可收戰勝之吉无敗亡之咎然徒用剛而不尚徳雖伐之有名而貞其去夫聖武益逺而吝剛之不可過用如此象曰維用伐邑道未光也居晉之上宜明徳以照四方征伐已非其道况維用以伐邑乎其于自昭明徳之道大相逺矣離下坤上明夷利艱貞夷傷也下離上坤日入地中是陽明君子見傷于柔暗故為明夷又上六為暗之主六五近之是以宗臣而近暗主難于去位難于行志不正則失身直道則賈禍惟操危慮深隠忍以行其志委曲以盡其忠如此艱難以守其貞乃不唯唯以徇非復不矯矯以激怒而為臣道之利象曰明入地中明夷卦名明夷者日不明也入地則晦猶君子為柔明所掩也曰明夷内文明而外柔順以蒙大難文王以之明夷之義何居為卦内離外坤人臣内有文明之徳外有柔順之為以是徳而蒙國家之難是明而見傷者也古之人有以之者文王是也緝熙之徳翼翼小心遭紂見囚正此類也利艱貞晦其明也内難而能正其志箕子以之利艱貞者盖明夷之時明不可露宜韜晦也五近上六暗主正忠臣蒙難事之不可諫之不行去之不得所恃黙黙周旋惟此志耳正之于内不形于外所謂晦其明也古之人有以之者箕子是也盖其為紂近親佯狂受辱正其晦明者也象曰明入地中明夷君子以蒞衆用晦而明明入地中明夷之象也君子體以蒞衆不明則人皆我欺過明則物不我容于是明哲旁燭本无不明不敢以明為明而不盡用其察用晦而明初九明夷于飛垂其翼君子于行三日不食有攸往主人有言君子以道而行猶鳥以翼而飛初當明夷之時其去暗主尚逺禍雖未及道已難行有飛而垂翼之象君子于此惟有去而已矣見幾而行困窮雖至三日不食不暇顧慮即去此適彼動得謗尤或議其迂或議其固至于主人有言亦安計哉象曰君子于行義不食也行何至于三日不食以義自決當如此也六二明夷夷于左股用拯馬壮吉二去暗主較初為近猶夷于左股及此不去禍无及矣速于決去如用馬壮之疾以救之乃可全身逺禍而吉象曰六二之吉順以則也二之所處難于初矣而乃得吉盖禍及而去處明夷之則也二有順徳能早見而決順也而以則也故吉也九三明夷于南狩得其大首不可疾貞九三以剛居剛有天下之大徳居明體之上有天下之大望而上應暗主向明伐暴獨夫授首有明夷于南狩得其大首之象夫以明伐暴貞也但君臣大倫放伐大事其可亟乎尚可以化暗為明吾寜待之豈可以貞疾圖之耶象曰南狩之志乃大得也南狩非富天下也志在除暴救民乃能成大功也六四入于左腹獲明夷之心于出門庭四爻暗體是身處昏朝道无時而明有入于左腹之象然幸柔順得正有能去之智居暗尚淺有可去之機故猶可飄然得意于逺去為獲明夷之心于出門庭之象象曰入于左腹獲心意也四雖入于左腹然能見幾而作是時義可去而去得遂心意也六五箕子之明夷利貞五以宗臣居暗地近暗君去之不能徇之不可惟晦其明以正其志象如箕子之明夷佯狂受辱以守其貞此貴戚之道萬世不易當其任者必守之乃利象曰箕子之貞明不可息也箕子之貞乃艱貞也艱貞䝉難似不用明然其晦也无非委曲以全此心之明明愈晦而愈全自不可滅息也上六不明晦初登于天後入于地以隂居坤之極不明其徳以至于晦始則處髙位以傷人之明終必至于自傷而墜厥命故其象如此象曰初登于天照四國也後入于地失則也初登于天亦常居尊位以照四國而卒入于地者昏而不明失其照臨之則也離下巽上家人利女貞卦之九五六二内外各得其正而家道成故為家人夫家之不正恒起于婦人而家之難正亦莫難于婦人故正家者務修身以正乎内樹範閨壼端化刑于利女貞焉乃為風化之原而外亦因之以正矣彖曰家人女正位乎内男正位乎外男女正天地之大義也家人何以利女貞卦之二五主卦内外是為女者秉順徳以正位乎内而不預外事為男者秉剛徳以正位乎外而不牽内私男女正則剛柔之義明倡隨之義得是古今隂陽㑹合之理非天地之大義而何家人有嚴君焉父母之謂也男女何以正哉一家之中不一者分不齊者情惟家人有嚴君以主之而後内外森然嚴君者誰謂此正位乎内外之父母也以正為嚴夫是以謂之嚴君而為家人所宜有也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣惟有嚴君則教行于家初上秩尊卑之位父父子子也五三定先後之序兄兄弟弟也三五二四嚴内外之别夫夫婦婦也家道至此倫盡而正矣家正則天下一家也人人能正則天下之有家者各盡其正而定矣正家之所係如此安可不貞象曰風自火出家人君子以言有物而行有恒風出于火化出于家家人之象也君子以家之本在身而身之所出惟言與行故言必有物闡明綱常俱根體騐而行必有常敦篤倫理无間始終則身修家齊而天下亦自此而定矣初九閑有家悔亡正家之法莫重于始始而不閑後必至有相凟相夷之悔初以陽剛處有家之始是時固當閑而徳又能閑者本吾身以立閑乗其倫之未凟恩之未離而肅之以義聮之以情則倫正義篤而夷凟之悔亡矣象曰閑有家志未變也一家之人志已變而防之難志未變而防之易初即能閑其志未變故悔可亡六二无攸遂在中饋貞吉柔順中正是女子幽閑貞静者一切家庭之事統于夫子不敢自遂惟在中饋酒食是議此真女子之正位乎内而成桃夭之化者也貞吉象曰六二之吉順以巽也二之所以吉者本此柔順之徳以巽從夫也九三家人嗃嗃悔厲吉婦子嘻嘻終吝過剛不中治家太嚴有嗃嗃之象如是則傷恩而有悔厲然家道嚴肅人心能正而得吉若以悔厲之故致使綱維不立婦子嘻嘻則蕩倫敗節終必吝矣象曰家人嗃嗃未失也婦子嘻嘻失家節也家人嗃嗃雖有悔厲然使人心肅而不縱猶未失正家之節若至婦子嘻嘻則必以情掩義失其正家之節矣六四富家大吉人君以天下為家四為大臣其家相也以柔正居上位是能開財源節財流以自然之利富天下之家者也如此則人富而禮義生仁讓之風成矣大吉象曰富家大吉順在位也順徳而居高位得理財之道又能操理財之權所以大吉九五王假有家勿恤吉五以陽剛應二柔順是正乎外者固賢聖之君而正乎内者又賢聖之后王者其儀不忒而假于有家者也以聖君配聖后則勿用憂而關雎麟趾之化成矣象曰王假有家交相愛也王假有家豈私愛哉聖君慶内助之得人聖后樂刑于之有主所謂雍雍在宫一徳相合而成愛者也上九有孚威如終吉上九以剛居上是主家之久者而能以剛行之本孚誠以蓄恩義而其間倫紀森嚴毫不可犯有孚而威如者也如是則一家之中情洽分定家道永昌終吉象曰威如之吉反身之謂也家之欽式惟在于身威非作威反身自治言物行恒而人自畏服之所以吉也兊下離上睽小事吉睽乖異也為卦上火下澤性相違異中女少女志不同歸故為睽濟大事者以人心為本睽則人心乖異若一无可為幸而有徳有勢有輔即未能遽合天下之睽以成大事猶可補偏救弊維持目前徐俟人心之定小事吉彖曰睽火動而上澤動而下二女同居其志不同行卦名睽者觀象于物火動炎上澤動潤下物性之睽也觀象于人二女同居其志異適人情之睽也即物與人觀之而世道之睽可知故名睽説而麗乎明柔進而上行得中而應乎剛是以小事吉人心既睽何以小事吉卦徳説麗乎明是内既心氣和婉而外又旁燭事幾有其徳矣卦變柔進上行是以徽柔之質而握大寳之權有其勢矣卦體六五得中應二之剛是以虛中之誠而來賢人之助有其輔矣是以尚可有為而小事吉天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽之時用大矣哉然性情之暌不可有而形體之睽不可无人但知睽之為暌不知暌之為合試以其用而極言之位上位下天地之睽也而化育之事同位内位外男女之睽也而倡隨之志通别生分類萬物之睽也而應求之事類可見不暌則无以為合而三才之用幾息矣睽之時用豈不大哉象曰上火下澤睽君子以同而異火澤合體其性相違睽之象也君子以之處世未常不異亦未常立異以為異惟以同而異不矯情以忤物亦不和光以徇人盖睽中原自有合君子亦于合中用睽深于睽者也初九悔亡喪馬勿逐自復見惡人无咎濟睽无助宜有悔者幸與九四同徳相應其悔亡矣象猶始雖喪馬終勿逐而自復然當睽之時同徳相合正異已者所忌分别太嚴必遭䜛搆故必見惡人以釋其疑乃可无咎象曰見惡人以辟咎也初見惡人豈其本心正以避中傷之咎以固同徳之合也九二遇主于巷无咎二五隂陽正應居睽之時乖戾不合然君臣之義不容恝然必至誠以感動之盡力以扶持之明理義以致其知杜蔽惑以誠其志委曲求通象猶遇主于巷此臣子苦心致君妙術臣責无咎矣象曰遇主于巷未失道也委曲以遇其主似乎枉道而實正應所在分不可逃義不容已豈失道乎六三見輿曳其牛掣其人天且劓无初有終三與上正應本有君臣之分不幸居二四之間故欲進而與上相遇二則從後援之為曳其輿四則從前尼之為掣其牛此情勢所迫三固无如何者所恃上之見諒耳乃上剛明處極猜恨方深疑其有妄合之意而欲加之髠劓之刑之象猜疑如此是无初也然邪不勝正終必釋疑而合有終象曰見輿曳位不當也无初有終遇剛也見輿曳者以三位居二陽之間迹有可疑是以疑見橫生也无初有終者所恃遇上之剛性最坦直雖一有可疑不惜情面而一明心迹亦便渙然冰釋也九四睽孤遇元夫交孚厲无咎四與初九本為正應奈左右之隣皆隂柔小人孤立无助為睽孤之象幸初陽在下元善之夫也與之相遇徳同心契而交孚焉睽乃不孤矣第當睽之時間之者多交情未深易離難合故必危以處之防䜛杜害然後得保其孚而无咎象曰交孚无咎志行也濟睽大臣之志也四孚无咎則同心協力而睽可濟志大行矣六五悔亡厥宗噬膚徃何咎以隂居陽濟睽之才不足宜有悔者然柔中應二其悔可亡盖二為宗臣乃厥宗也五以虛中應之臣方篤于遇主君更切于下交情投意洽誠如噬膚之易者以是而往與之合則君臣之睽合而天下之暌无不合矣无咎象曰厥宗噬膚往有慶也君能與臣契合而往以濟暌慶有不在天下者乎上九睽孤見豕負塗載鬼一車先張之弧後説之孤匪寇婚媾往遇雨則吉上九本與三應但以剛明處睽之極則猜疑所結意見橫生遂成睽孤故三本无汚而疑其汚如見豕負塗即至一切无有之事而亦疑其為有如載鬼一車疑益甚矣由是積疑成忿如張弧而欲射之然三本无此事則疑将釋後若脱而不果射焉乃知三非為我害寔為我親前疑盡釋而往從之若隂陽和而雨焉則始睽終合而吉象曰遇雨之吉羣疑亡也遇雨之吉㑹合深矣由三本无可疑故羣疑盡釋也艮下坎上蹇利西南不利東北利見大人貞吉蹇難也為卦艮下坎上見險而止世艱方殷不可輕進故為蹇夫蹇時必有地有輔而有徳以行之乃克有濟故必守要害據行險方進可以戰退可以守西南平易乃為利耳若往東北則英雄无用武之地不利也又必見有徳有望之大人始可資其謀畧以匡濟而利又當秉公扶義以順人心乃施為正大能成撥亂之功貞吉盖見險者貴于能止而又不可終于止處險者利于進而又不可失其正也彖曰蹇難也險在前也見險而能止知矣哉卦名蹇者難之義也國之險難臨在前也夫見險而能自止以審時則不冒進不退避居静觀動非深明利害者不能豈非智哉蹇利西南往得中也不利東北其道窮也利見大人往有功也當位貞吉以正邦也蹇之時用大矣哉蹇而利西南者卦變四往居五而得中是據形勢而可圖恢復也不利東北者以四退入于艮是陷身險阻无用武之地濟險之道窮也利見大人者以九五有大人之象往而見之能資謨猷以定禍亂而有功也貞吉者以五爻各當其位有正之義盖扶大義秉大公以削平亂畧整頓紀綱而邦因之以正也夫所恃以濟蹇者不過地與輔與徳耳今有此三者可以審旺衰之形決從違之理盡張弛之畧其為時用豈不大哉象曰山上有水蹇君子以反身修徳山上有水曲折難行蹇之象也君子以世道之蹇皆由吾徳之不修致之故不敢外生怨尤惟自反之于身或省察于念慮或體騐于躬行有所未善則改之无歉于心則加勉如是以修其徳則吾身之蹇已濟而徳孚于人矣初六往蹇來譽豪傑首貴識時初當險難方殷正宜俟時故往則有蹇惟見險能止而來焉乃為從容觀變而有俟時之譽象曰往蹇來譽宜待也往蹇來譽非謂其勿往也謂宜待時而往也若一于止而不行何譽之有六二王臣蹇蹇匪躬之故柔順中正忠藎之臣也而應五在險正當國難鞠躬盡瘁不避艱險是王臣之蹇而又蹇者也然其所以為此者進不為名退不為利豈以其躬之故哉雖捐軀有所不恤矣象曰王臣蹇蹇終无尤也王臣而至蹇蹇事雖不濟終无可尤况又未必然乎甚矣人臣應如是也九三往蹇來反三當國難方殷非一手足所能濟者如恃才獨往有蹇而已惟反就二隂同心協力庶可有濟故宜來而反之也象曰往蹇來反内喜之也反非强與之合也内之二隂初止以待時二蹇以求濟俱樂豪傑為之助者寔喜其來也三可不反哉六四往蹇來連大臣身處國難才弱不能以濟往則有蹇惟來連九三資其才力可也象曰往蹇來連當位實也九三陽剛盖有濟險之實徳者也故宜連之以共濟九五大蹇朋來居尊當蹇宗社係焉大蹇者也幸有剛中之徳勢力既足以招徠而信義又足以號召是以豪傑景附正應而外如來譽來反來連來碩之朋无不獻猷効力以濟天下之蹇矣象曰大蹇朋來以中節也大蹇之時智士所深避者五何以朋來盖遺大投艱非有剛中之節鮮不畏難而阻五有中徳故羣歸之上六往蹇來碩吉利見大人隂居險極時雖将濟若止自往益以蹇耳惟來就九五濟蹇之君乃有碩大之功而吉盖五為徳位兼隆之大人見之則撥亂之猷将展于中節之君其碩吉也象曰往蹇來碩志在内也利見大人以從貴也往蹇來碩者以志在天下國家之内而欲濟之所以來就大君以成大功也利見大人者正以五有徳位之貴乃從而見之也坎下震上解利西南无所往其來復吉有攸往夙吉解難之㪚也居險能動才足出險故為解大難方解百姓始離湯火之日故必去煩滌苛務為寛大以養方復之元氣保未固之生機如西南平易乃為利也如此時亂流盡殄而无所往固當與民休息來復其所而安静使國家相安于无事而吉若遺孽猶存而有攸往又當早往早復不可久為煩擾使國家不苦于多事而吉彖曰解險以動動而免乎險解卦名解者以其徳坎險震動當險難之時而幹濟之才能戡定于禍亂之外為險以動夫處險特患无才才既能動自克振作有為易險為夷而解難盡脱矣解利西南往得衆也其來復吉乃得中也有攸往夙吉往有功也利西南者卦變坤體平易卦畫又有中之象是當解時以平易之道往以近民乃得衆心也其來復吉者解時以安静為中卦變二居得中是不喜功生事而與天下休息能處解之中道也有攸往夙吉者二惟得中而往所以早往早復收安輯之功也天地解而雷雨作雷雨作而百果草木皆甲坼解之時大矣哉極解之道言之非惟帝王以之生萬民天地亦以之生萬物天地解則二氣暢發雷雨交作以動以潤凡百果草木枯者萌甲而甲開坼矣是天地未解萬物不能先時天地既解萬物不能後時解之時豈不大哉王者宜法天以行解矣象曰雷雨作解君子以赦過宥罪雷雨交作萬物解散解之象也君子以天下多難人易罹于罪過法解之意于无心之過竟赦之而不問即有心之罪亦宥之以從輕无非體天地生物之心而解斯民網之宻也初六无咎治解之道固不可多事以激變亦不可因循以養變初以柔在下徳本安静而上應九四剛足以濟則无紛更之弊亦无委靡之失何咎之有象曰剛柔之際義无咎也初之无咎非倖致也柔得剛濟剛柔交資義无咎也九二田獲三狐得黃矢貞吉當解之時衆君子成之而不足一小人敗之而有餘况狐有三乎二有剛中之徳是秉道嫉邪之君子也故能去邪媚之小人而得中直之正士為田獲三狐得黃矢之象此正人臣舉錯之正朝廷清而天下治矣吉象曰九二貞吉得中道也小人難去君子又難合二惟以中自秉故好惡不偏為能得正而吉也六三負且乗致寇至貞吝三以无徳之人而據髙位雖得必失如負者之人乗君子之器而致寇奪者雖位出于君而貞實有不稱之羞而吝况又未必正乎象曰負且乗亦可醜也自我致戎又誰咎也負而且乗處非其位即不見奪亦已可醜况必致寇乎寇之至也自我致之安所歸咎九四解而拇朋至斯孚解時非剛明之朋不足以同徳相濟四應初柔是大臣頤指之人也故為四計斷然解去爾之比昵以示門无私交斯同徳之朋至而相孚无間然則朋之至與孚皆視小人之解與否耳象曰解而拇未當位也初固私人而四應之亦是私情之合也不特豪傑聞而解體于義不容不解矣六五君子維有解吉有孚于小人正當君位誠君子也然與三隂同類其情不无牽引人君于此惟有解之而已无他術也小人一解則君徳清而天下治吉然小人難退外疎而内親之者往往有之故必以小人之去為騐非僅托解之名以逃天下之公議遂可云解也象曰君子有解小人退也自古小人易進難退必實有以解之小人方退若有其名而无其實小人未必退也上六公用射隼于髙墉之上獲之无不利三以小人竊據髙位隼在墉之上也上當公孤之任抱已成之器用解除之則一舉即擒如射隼于髙墉而即獲焉大奸一去宗社生靈俱受其福无不利象曰公用射隼以解悖也小人蠧國害民悖亂之大者也公是以聲其罪而射之耳非私惡也兊下艮上損有孚元吉无咎可貞利有攸往為卦損下卦上畫之陽益上卦上畫之隂有剥民奉君之象故為損損非善道宜難得吉而无咎宜非貞而不可往必平日節用愛人之心素著一時出于萬不得已而有孚焉然後議損則衆庶共諒其心而輸将恐後國事濟矣元吉且不以為厲而无咎此雖一時濟變之權亦可為萬世救時之法可貞不獨可以施之一方亦可施之四海為利有攸往信乎損非得已而必貴于有孚也曷之用二簋可用享以不得已損之必以不得已用之其用維何雖享帝享親國之大典禮宜從厚而時詘不可舉贏即以二簋亦可用享况其他乎彖曰損損下益上其道上行卦名損者損下益上剥民以奉君也夫民貧則君不能獨富勢必損及于上其道上行矣損而有孚元吉无咎可貞利有攸往曷之用二簋可用享二簋應有時損剛益柔有時損益盈虛與時偕行人主損民而誠有孚則元吉无咎可貞利往不必言矣又曰曷之用二簋可用享者何也豈享可從薄哉當損之時應有此用乃時之不得不然者試觀卦畫損乾剛以益坤柔亦以剛進之極時當損也柔退之極時當益也又觀物理進極必盈盈則必虛自與時而偕損退極必虛虛則必盈自與時而偕益无非趨時者也時不可違如此故用享亦然象曰山下有澤損君子以懲忿窒欲山下有澤損深益髙損之象也君子以吾身所當損者莫如忿慾忿則不能以理處人欲則不能以理處已故于忿也則懲之中和養心平易養氣制于未發之先忘怒觀理不為客氣所使于欲也則窒之省察研幾克治務盡絶于未萌之始以理勝私不為情欲所牽庶損所當損而身无不修矣初九已事遄往无咎酌損之初應四陽有救正之責于是已吾私家之事而遄往以懲窒其忿欲則公爾忘私事上之責已塞无咎然以下而損上勢分懸絶情義未孚法言巽言當量而入必因事納誨相時效忠不得以遄往而遂徑直為也惟酌乃為善用損者不然未信見謗以数受辱所不免矣象曰已事遄往尚合志也已事遄往者以四之志正欲初助己以損其疾初與之合何嫌于遄故初當速往也九二利貞征凶弗損益之剛中自守不肯妄進所謂貞也則道義自持名節不辱而利若輕有所往降志辱身凶莫甚矣甚哉節義之不可損也誠常守之而弗損其益于上之風教者大矣弗損正所以益之也象曰九二利貞中以為志也二以中徳為志則在我者確乎不拔所以能貞而不妄進也六三三人行則損一人一人行則得其友下卦本乾而損上爻以益坤是人于同類之中而或有異己者即三人行也三則嫌疑生必我損去其異類者而使彼行可也所損之一人既行則在此者皆同心共濟斯得其友矣象曰一人行三則疑也于三人行而必損一人者非示人以不廣也正以三則學術駁而議論乖不得不然耳六四損其疾使遄有喜无咎四以大臣而有柔靡之習是資初之剛明以損其疾者也此必勇于改過速于遷善能使初見我汲汲之心而遄往于我方得匡救相成而有喜无終疾之咎象曰損其疾亦可喜也人而无疾固為可喜有疾而能資人以損之則過復无過亦可喜也六五或益之十朋之龜弗克違元吉柔中居尊是人君虚心好善使天下豪傑景從効才獻徳若益之十朋之龜有弗克違者如是則合天下之聰明才智為其功名君徳純而治化溥元吉象曰六五元吉自上祐也賢為上之所簡五能致天下之賢則克當天心矣其元吉豈特人祐之哉上九弗損益之无咎貞吉利有攸往得臣无家人君之益天下以因為上制田教畜一无所損其利自溥能以弗損益人无負子民之責而无咎然其所以益之者一出于帝王大公之正道斯澤无不被而吉且法可常行而利惠而不費其惠廣矣其得臣尚可以家計哉象曰弗損益之大得志也王者以益天下為志今弗損益之則益道大行而志得矣震下巽上益利有攸往利涉大川卦畫損上益下民富則君不得獨貧下益而上亦益矣故為益二五中正君臣同徳二體皆木才猷素裕人主本此以益民則有所往而發政施仁自徳澤四達而民賴以安固利即使涉川而拯溺救屯則阽危胥援而民賴以生亦利彖曰益損上益下民説无疆自上下下其道大光卦名益者卦體損上益下是君能減常賦行補助自損以益民則民被其澤悦懌无疆矣然所以損上益下者實恩由上推而下及于閭閻非徒為一切轉移之術姑為益下之名者也此其為道如天道下濟而光明與霸者之暗昧不同此民説所以无疆也利有攸往中正有慶利涉大川木道乃行利有攸往者盖以益下之道必由君臣同徳使各懐異志則上恩或不下究下意或不上通今二五中正其益下也必有良法美意非偏小私補之術且无壅蔽之患民被澤而有慶矣至于利涉大川益道已无不行乃所以行者由震巽皆木有濟川之具在人為才猷克壮道濟經綸卓然有具乃能大行而利益動而巽日進无疆天施地生其益无方凡益之道與時偕行試取益道而極言之由事功以推之學術由學術以推之造化而知之益道不外一時其在學問卦徳震動巽入是為學者既奮發精進又沈潛深入勿忘勿助循此日進自然徳崇業廣寜有疆乎其在造化卦體陽上隂下天施地生自然並育不悖化化生生之機无有方所矣凡此皆益即皆道也皆道即皆時也故凡人事之窮而通失而得物理之虛而盈消而長皆出于時之自然而非智力所能與也非與時偕行乎益道之大如此象曰風雷益君子以見善則遷有過則改風烈雷迅交相助益益之象也君子法之以自益見有善也不拘一轍隨見皆遷无少逡巡見有過也不俟終日隨見皆改无少係憚如是則理存欲遏而益于身心多矣初九利用為大作元吉无咎人臣原不為利祿効忠况居下受益是仕籍初登寵任已渥其報効也必盡心竭力利用大有作為于凡關宗社係生靈者為人之所不能為為人之所不敢為方足報知主上然始進而圖非常之功一有不善疑忌交集必謀出萬全事圖經久帝王其規模聖賢其事業大善而吉乃可免咎象曰元吉无咎下不厚事也居下始進本不當任重事使非元吉何能无咎六二或益之十朋之龜弗克違永貞吉王用享于帝吉虚中處下是人臣竭誠致敬故精意所感自來君眷而寵渥之來有辭之弗克者為或益之之象此即臣之貞也第永守之而不變則主眷益隆而吉斯道也雖王者用以享帝尚可居歆况人臣守此事君有不吉乎甚矣貞必受益而人臣不可不貞象曰或益之自外來也益出于君何以曰或以二之心原不為利祿而效忠也故寵渥之來如出意外二真純臣哉六三益之用凶事无咎有孚中行告公用圭六三隂柔不中不正不當得益者也然當益下之時居多凶之地遺大投艱有益之以凶事者必儆戒震動增益其所不能然後可以无咎然益以凶事責望良深又必内而有孚誠積于中外而中行協中以行以此自靖如用圭以通信乃為无咎象曰益用凶事固有之也孚中人所固有第人情不激則不發益用凶事者正欲其困心衡慮而固守之也六四中行告公從利用為依遷國益下之事不一必㕘酌合宜乃為中也四不得中非中行矣誠能以益下為心勉于中行則動中機宜所行皆合于君以此入告言无不從既能如是即以遷國勞民傷財亦依衆心之所欲如太王遷岐不以養人害人盤庚遷殷曰視民利用遷人心樂從无有不利况君寜有不從中行者乎象曰告公從以益志也告公而從以四惓惓以益下為志故君能諒而從之也九五有孚惠心勿問元吉有孚惠我徳五以陽剛為益之主是大君之益天下者一本于肫懇之心而非違道以干譽者也如此惠民何待問而知元吉哉但見上以誠感下以誠應而民之惠我徳者亦皆出于有孚矣象曰有孚惠心勿問之矣惠我徳大得志也人主之患特恐其志不真惠民耳惠出于心其益无方元吉可勿問也至有孚惠我徳益道大光益民之志不大得乎上九莫益之或擊之立心勿恒凶陽居益極求益不已是君剥民自奉而不知止者不知耑利于己即以施奪于民有莫益而或擊之者焉然其端始于立心之不恒盖益下者君上之恒一念反常即為禍府豈待擊而後知其凶乎象曰莫益之偏辭也或擊之自外來也人君求益不已犯天下之大怒而但言莫益者特從其耑利之一偏言之也若究其禍必有擊之出于意外豈徒莫益而已哉乾下兊上夬揚于王庭孚號有厲告自邑不利即戎利有攸往夬决去也以五陽去一隂决之而已故為夬然决之之道必正名其罪以揚于王庭則小人之罪始明而盡誠以呼號其衆相與合力則君子之勢始盛然小人之罪雖明而君子之待小人者常疎又必有危厲之道操心也危慮患也深則隄防始嚴苟遂乗以安肆則不可君子之類雖集而小人之伺君子者常宻又必有自治之道无隙可乗无過可議則謀出萬全若徒尚夫威武則不利夫然後一舉而小人可以立决吾道可行而利有攸往彖曰夬决也剛决柔也健而説决而和卦名夬者决之義也以五剛决一柔其去之也易矣故為夬然决之之道過柔者易失于懦過剛者易失于暴必如卦徳乾健兊説健以斷之剛毅嫉邪不為柔媚所惑而不緩圖以失其機悦以處之平心易氣絶不傷于忿戾而不輕動以激其變然後事合機宜動中肯綮以此而决健非黨錮悦非調停揚于王庭柔乗五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也揚于王庭者以一小人居衆君子之上妨賢誤國罪莫大焉不得不揚也既孚號以集衆矣而必有厲者恐小人隂謀不測故必操心以危而謀出萬全决道乃大光也既告自邑以自治矣而又不利即戎者盖惟理足以服人若耑尚威武且将激變自取困窮也利有攸往者五剛既長一變即乾而陽乃終是滿朝皆君子而决道乃成終也象曰澤上于天夬君子以施祿及下居徳則忌澤氣上升于天勢必沛决而下夬之象也人君體之以施澤于下祿予加于君子樂利及于小人猶澤之决而下注焉然上之祿下非以為徳也若居為己徳矜功伐善積而不流則封殖自私失大君之宜而忌矣初九壮于前趾往不勝為咎當决之時居下任壮是少年新進憤憤嫉邪急于一决以為快者有壮于前趾之象以是而往决小人則力弱計疎必不能勝其咎乃自為耳象曰不勝而往咎也君子欲决小人必事出于萬全而功乃收于一旦今初不勝而往豈待往而知其咎哉當不勝時已可卜其咎矣九二惕號莫夜有戎勿恤從來决小人者最患輕疎而不為計自任而不求援九二居柔得中其為决也不任剛壮内既懐憂惕以善其謀外又孚號衆正以集其類如是雖小人變生不測為莫夜有戎之象然思慮周而无可乗之機黨援盛而有難犯之勢奚用恤乎象曰有戎勿恤得中道也有戎則有憂恤曰勿恤者以其能得中道不恃剛而惕號故有偹而无患也九三壮于頄有凶君子夬夬獨行遇雨若濡有愠无咎頄顴也九三當决之時以剛而過乎中是决小人而剛壮見于面目者也如是則機疎謀露有凶道矣然在衆陽之中獨與上六為應為君子計决正不以迹也若能果决其决不係私愛則雖合于上六如獨行遇雨至于若濡而為君子所愠然終必能决去小人而无所咎也象曰君子夬夬終无咎也君子之决小人獨有此心耳心果夬夬迹雖若濡終必无咎九四臀无膚其行次且牽羊悔亡聞言不信以九居四不中不正心既不能静守才又不足有為故将止而不决小人則志欲上進而居則不安将進而欲决小人則力有不足而行則不進有臀无膚其行次且之象悔可知矣吾為四計惟讓君子前進而我隨之設謀决䇿一聽於人如牽羊然乃因人成功而悔可亡然四切競進雖聞此言必不見信吾其如之何哉象曰其行次且位不當也聞言不信聰不明也其行何以次且由其才徳不足以遂其進也聞言何以不信由其志惑于競進而聪之不明也九五莧陸夬夬中行无咎五為决主切近上六是人君親附小人朝夕左右之間為所蠱惑而不自覺如莧陸感隂氣之多者可不决去之乎故必真心决之而且善藏其用不激于氣而中行乃為决而和者无咎象曰中行无咎中未光也中行宜无弗得而止无咎者盖小人不難决而君心中之小人最難决迫于義而係于情中心豈得為光明乎上六无號終有凶隂居夬極黨盡勢孤雖應三比五而皆夬夬何所呼號以求援乎始雖乗剛終必凶矣象曰无號之凶終不可長也小人居于君子之上方自以為萬年之固抑知終為君子所决何可乗以自恣乎巽下乾上姤女壮勿用取女夬盡為乾方喜君子滿朝不意一隂始生小人忽爾進用不期而遇故為姤以一隂遇五陽滅貞之謀已蓄堅氷之微已成猶女徳不貞而壮之甚也君子于此豈可忽其始進而與之比昵哉取以自配必害乎陽惟早杜而嚴絶之勿用取女可也彖曰姤遇也柔遇剛也卦名姤者不期而遇之義也一柔而遇五剛是衆君子无心于遇小人而一小人輙敢于遇衆君子卒然而值出于意外故為姤勿用取女不可與長也勿用取女以小人用事皆君子有以與之未幾而禍君子蠧國家矣豈可與之長共事哉天地相遇品物咸章也然論隂陽淑慝之分遇不可有若論隂陽相須之理遇不可无卦體以隂遇陽是天當純陽用事之日忽得地之㣲隂助之則燥烈之氣有所滋潤而品物流形自爾咸章矣造化以姤成功如此剛遇中正天下大行也造化不能一日无隂况世道乎第顧其主張世道者何如耳卦體以九居五是人君以英明果斷之徳遇宅中表正之位則徳以位顯天下惟其運化政教大行矣聖人以姤成功如此姤之時義大矣哉此固天人相遇之善也豈所論于君子之與小人哉姤之一隂始生其端雖㣲其勢必盛自非識㣲君子謹而防之必支蔓而不可挽斯時斯義豈不大哉象曰天下有風姤后以施命誥四方天下有風物無不遇姤之象也元后體之以天不能遇物而遇之以風君不能遇民而遇之以命于是以王心之一為王言之大舉凡政教必施命令布誥四方使天下曉然洞吾為民之心則君心與民相遇亦如風之鼔乎萬物矣初六繋于金柅貞吉有攸往見凶羸豕孚蹢躅初隂始生小人用事之始也誠能堅以自止不進而肆害君子如繫于金柅此小人之貞得受君子之賜吉若乗勢而往則自失其庇凶然在君子當知一隂雖㣲勢必得權害正猶羸豕必至蹢躅可不早為之防哉象曰繫于金柅柔道牽也小人之道柔道也柔則多媚善附易于牽引羣邪以進而肆害正之謀故以金柅戒之也九二包有魚无咎不利賔二以得時用事之君子而與初遇是小人在其包容之中為包有魚之象乗此制之諭以道義惕以禍福使不肆害自可免咎若失此不制使與諸賢相遇則貽害无窮甚不利焉象曰包有魚義不及賓也包有魚者非獨計及賓之害而制之也揆之于義二當盡制小人之責不令害及賓也九三臀无膚其行次且厲无大咎過剛不中性躁欲進上下无遇而不得遂為臀无膚其行次且之象如是則寡助可危固厲然无滛朋之大咎象曰其行次且行未牽也其行次且由勢孤未得牽引之人无所援以梯進耳九四包无魚起凶初與四應本其所属之民乃遇于二而不遇四為包无魚之象人心既去禍亂自此起矣凶象曰无魚之凶逺民也无魚之凶豈人之逺我我无孔邇之懐我寔有以逺之耳民非无故而去也九五以杞包𤓰含章有隕自天陽剛中正主持世道是以徳位兼隆之君子而下防始生用事之小人猶以把包𤓰勢甚易矣然彼方長而我将消天運使然難以力爭必其所謂包𤓰者深宻其謀潛藏其勢含晦章美不露聲色而黙以制之乃人事盡而天運回而陽之消者倐然來復若從天而降矣信乎姤轉為復非含章不能也象曰九五含章中正也有隕自天志不舍命也君子之去小人多不能宻其機而九五獨能含章者以有中正之徳涵養甚深不徒恃剛故能含也隂陽迭勝乃天命之自然而五能有隕自天者以志不舍命能以有常之理順乎天而不逆其命以挽回之任圖于己而不委其命故以人勝天而命自我回也上九姤其角吝无咎人必謙以與人而後能得所遇上无位而處剛是驕亢自髙求遇而以角者也以角求遇徒觸忤耳吝所不免然亦无比匪之咎象曰姤其角上窮吝也髙亢在上絶物无侣宜窮于遇故足羞也坤下兊上萃亨王假有廟利見大人亨利貞用大牲吉利有攸往卦徳見君民之萃卦體見君臣之萃故為萃萃之時當盡處萃之道而道莫大于尊尊親親在王者當假于宗廟之中聚一己之精神以通祖考之精神而非靡文以為假也在君子利于見大人事君以行義則道可達而亨又必利于正而非枉己以為徇也然假廟豈徒聚精神已哉萃則物豐而祀宜隆必用大牲以昭民力普存祭乃受福而吉然見大人豈徒聚以正已哉萃則學偹而宜用宏必有所往以展平生所藴乃能有功而利彖曰萃聚也順以説剛中而應故聚也卦名萃者聚之義也卦徳坤順兊説是民順以從君而君説以先民也卦體五剛中而二應之是君以誠實下交而臣以虛中上應也元后黎庶心結不解元首股肱精意相孚故聚也王假有廟致孝享也利見大人亨聚以正也用大牲吉利有攸往順天命也王假有廟非以邀福盖以王者孝親之情既聚必對越告䖍致吾誠敬于廟也利見大人亨非以干祿盖吾人從君之志既聚必行義達道一出于正而乃亨也假廟而必用大牲吉見大人而必利有攸往盖禮隨時豐功以時建皆天命之所必然物以萃而豐用大牲者時隆而隆也學以萃而益利有往者時行而行也順乎天命所以吉而利也觀其所聚而天地萬物之情可見矣試取其理而極言之不特王者與仕進也推之天地萬物莫不有萃聚之情焉觀其所聚陽倡隂和乾施坤承天地之情于聚可見也形交氣感聲應氣求萬物之情于聚可見也萃之大如此象曰澤上于地萃君子以除戎器戒不虞澤上于地津潤上行萃之象也水聚而不防則潰人聚而不防則亂是以君子體之以保萃為之簡練兵戎修戢武備以戒内難外患之出于意外者則萃可長保矣初六有孚不終乃亂乃萃若號一握為笑往无咎初六上應九四而隔于二隂當萃之時不能自守是有孚而不終志亂而妄萃也宜有咎矣若能呼號正應則從違靡定未免為衆所笑然號之者正也笑之者妄也但勿恤而往從正應則无亂萃之咎象曰乃亂乃萃其志亂也人之相萃未有不由于志初之乃亂乃萃志先自亂矣誰其主之而令其亂乎六二引吉无咎孚乃利用禴二應五而襍于二隂之間似君臣本自相孚而為讒邪所間故必牽引二隂以萃于五乃有集思廣益之吉无背公植黨之咎夫此引萃之心非避嫌非邀名一出于忠愛之實心所謂孚也二以孚上通五亦以孚下交不事煩文自足相信猶祭者有其孚誠雖用禴亦可格神无不利象曰引吉无咎中未變也二引萃而得吉无咎者由此中公忠之念未常少變故能不昵朋比也不然未有不亂萃者六三萃如嗟如无攸利往无咎小吝六三隂柔无可萃之徳上无應與无可萃之人欲求萃于近己之權貴而不得故嗟如而无所利為三之計惟往從于上可以无咎但困然後往復得隂極无位之人亦可小羞矣然理宜如是自當近舍不正之强援而逺結正應之窮交小吝不必恤也象曰往无咎上巽也往從上而无咎者上居悦極能巽順以受之故得萃而无咎九四大吉无咎四以大臣比君因以下比衆隂得其萃矣權之所集咎必歸之且以陽居隂未免有邪媚之私則咎不終无者必其所以萃者貞以親上義以使民既不枉道以從欲又不違道以干譽思患以杜釁孽之萌謹㣲以逺僣逼之漸大吉如是庶幾臣節克靖君民兩无負矣象曰大吉无咎位不當也必大吉而後无咎者以其非君位而萃天下之心居危疑之地而有不當之嫌自非盡善難以塞責也九五萃有位无咎匪孚元永貞悔亡當萃時而有陽剛之徳以居尊是徳稱其位而民信從萃有位而无咎矣設有方命未孚固為至治之累而有悔然不必求之人也反而益修吾徳俾吾元善之懿无間而永不雜而貞則徳純化洽而匪孚之悔亡矣象曰萃有位志未光也人主之志萬邦作孚乃為光大今萃有位而猶有匪孚此中豈能坦然愉快故曰未光上六齎咨涕洟无咎萃極将㪚而隂柔才弱无位望輕有孤立之危故必操危慮深恐懼修省如齎咨涕洟乃創艾改圖可以信友可以獲君不終无萃而可无咎象曰齎咨涕洟未安上也上能得萃其心乃安今居上而求萃不得宜其憂懼如此耳巽下坤上升元亨用見大人勿恤南征吉卦變柔上居四是以柔嘉君子乗時奮庸故為升君子之升恒患无徳與應卦體巽順有升之徳五應有升之機自得元亨所以方升之始用以利見大人則主臣交孚所謂日隔之疎與不專之患但可勿恤既升之後南征有為則展布經綸将見道徳日盛功業日彰吉莫大焉其元亨盖有如此彖曰柔以時升卦名升者卦變柔自解來進居于四升于二陽之上是柔嘉之士因時以進而居台輔之位者也巽而順剛中而應是以大亨升何以元亨盖不度已之可進而進者是為自輕其身不度人之能用而進者是為不量其君卦徳巽而順是内既沉潛觀理无欲速躁進之心外又從容俟時无冒進干君之失可升之徳裕矣卦體九二剛中而五應之是臣有强毅匡濟之畧而遇虛己下賢之君又有可升之㑹矣既不困于抱負復不厄于際㑹是以大亨用見大人勿恤有慶也南征吉志行也又言用見大人勿恤盖君子出仕必欲得君今一徳而明良契合不惟一身之慶而實斯道之慶也又言南征吉盖君子之志在于行道今有慶而致主澤民則隠居之志殆為行義之達矣象曰地中生木升君子以順徳積小以髙大地中生木以漸而高升之象也君子以為徳之升也亦必以漸從細處致慎積之以至于髙大如由一念之善念念皆謹積而至于无念不善由一事之宜事事皆宜積而至于无事不宜則日新月盛徳必廣大髙明而不可及矣初六允升大吉初為巽主柔順居下不先時而躁進故二陽從而信之援以同升可以勿恤而南征吉孰大焉象曰允升大吉上合志也初允升而大吉者上二陽志在南征初能巽而與之合故二陽樂為汲引而同升也九二孚乃利用禴无咎九二剛中上交五以虛中應之是人臣精白一心足以感孚于君而致君之孚也惟既孚矣乃可以任吾樸忠不事繁文象如利用禴祭則我勿欺而君不疑无咎象曰九二之孚有喜也二能以心孚于君上則得君而道行矣寧不有喜九三升虛邑三以陽剛之才當雍熙可升之時而進臨于坤道可大行如入无人之境為升虛邑之象象曰升虛邑无所疑也人于升時有時而无徳未免有疑于己有徳而无時未免有疑于人三經濟有術際遇有時動无阻礙何所疑乎六四王用亨于岐山吉无咎四為大臣无可復升而以隂居隂順之至者是人臣能致誠敬以事上如王者致誠而事神也有王用亨于岐山之象如是則得臣道之純而无隕越之咎象曰王用亨于岐山順事也四取象于用亨者臣之于君猶君之于帝謂其忠順不失以事其上也六五貞吉升階以隂居陽未免見小欲速必念慮謀猷一皆出于純王之貞不雜于功利不流于偏黨乃心純化溥吉升斯世于大猷如升階之易易矣象曰貞吉升階大得志也王者以致治為志今以貞成治則其功業所就可以嫓帝王㕘天地矣其志不大得乎上六㝠升利于不息之貞以隂柔居升極昏㝠于升沈迷利欲知進而不知止者亦何利哉惟轉此不已之心用之于不息之正孶孶不倦漸進髙大乃為利耳象曰㝠升在上消不富也人之一身外有増加則内必減損㝠升在上而進極不已本體消亡日甚豈復有所富乎坎下兊上困亨貞大人吉无咎有言不信卦體六爻陽為隂掩志不得伸道不得行有困窮之義故為困君子處此惟守義安命泰然自得以自亨通則得處困之貞然非素有大涵養者不能故惟大人足以當之有亨貞之吉无不亨貞之咎苟非其人心不能亨而嘵嘵自鳴徒為憤世嫉俗之論祗益以困誰其信之不可不戒也彖曰困剛揜也卦名困者卦體剛為柔掩是君子剛大正直之氣為柔所蔽欝而不伸所以為困險以説困而不失其所亨其惟君子乎貞大人吉以剛中也有言不信尚口乃窮也困何以亨盖亨不于其身而于其心不于其時而于其道卦徳險以説是所處之境雖困而樂天知命胸中自得之趣依然獨抱不因困而失其所亨此惟有守有識之君子能之乎所謂貞大人吉以二與五剛而不屈无柔懦可乗中而不躁无矜激敗事制事制心俱能順理所以得吉又曰有言不信以困時所尚者心亨困不足以窮我惟所尚者口説憤憤不平徒以激人之怒滋已之危自取困窮也處困者可不戒哉象曰澤无水困君子以致命遂志澤以注水下漏則枯困之象也君子以處困之道莫先于志或遇君父之仇或值國家之難係于綱常名節為志所必欲成者則凡身家性命利害難易俱所弗計而惟猛拚一死獨行其是以遂其志而已初六臀困于株木入于幽谷三嵗不覿初以隂柔居困之下束手待斃不得所安如臀困于株木者然若以明者遇此猶可望其醒悟以圖出險之功今又居暗之甚才既不能審機智又不能觀變終入于困不克自振有入于幽谷三嵗不覿之象象曰入于幽谷幽不明也審時觀變全恃識力入于幽谷心不明乎事理安望其出于險哉九二困于酒食朱紱方來利用亨祀征凶无咎九二當困之時剛中應五是以才徳而膺艱大舉凡宗社生靈俱以身任所謂王事賢勞者也上之知遇不特髙爵厚祿極其豐隆而且寵任責成有加无已為困于酒食朱紱方來之象二将何以承之必精白一心竭誠報效如用亨祀乃為利焉即時值困窮征或有凶而精誠自獻雖凶无咎象曰困于酒食中有慶也二固困于酒食以有中徳故能竭誠濟困以貽天下之慶也六三困于石據于蒺藜入于其宫不見其妻凶三隂柔不中正才徳不足以處困故欲前推九四以上進而四堅不可動欲退依九二以圖安而二又剛鋭不可依為困于石據于蒺藜之象如此則禍必及身雖有上六正應亦終不得見矣如入于其宫不見其妻凶莫甚焉象曰據于蒺藜乗剛也入于其宫不見其妻不祥也據于蒺藜以乗九二之剛據非所據不得安也入于其宫不見其妻孤立寡援危亡立見不祥也九四來徐徐困于金車吝冇終大几才足濟物正應有困能速救之雖有强暴之徒不能阻吾之援四无才以援初故其來也徐徐不速而初困于九二不克前進為困于金車之象夫初之困四之吝也然邪不勝正終必得合有終象曰來徐徐志在下也雖不當位有與也四來徐徐勢雖若緩其志未常不在初也人特患其无志耳既有其志才雖不足究竟有志自成必能相與有合也九五劓刖困于赤紱乃徐有説利用祭祀五當困時上為隂揜是蔽于近習下則乗剛是迫于强臣上下皆傷為劓刖之象既為所傷是臣服于我者反得以制我猶赤紱為臣下之服而今為所困矣幸其剛中有英斷之才又居悦體善調停之術為能從容和緩制馭臣下而大權漸收无憂旁落乃徐有説而不終于困也然小人進退恒視君心之誠否一有不誠便得乗間而入必无二无襍如享祀然斯小人不得倖進國家獲无窮之福乃為利耳象曰劓刖志未得也乃徐有説以中直也利用祭祀受福也劓刖者隂揜則蔽乗剛則危動輙有制濟困之志豈能得乎乃徐有説者以五有中徳不縱不激順理而直也利用祭祀者君心純一小人不得而入宗社生靈皆受其福也上六困于葛藟于臲卼曰動悔有悔征吉以隂柔處困極欲動則才弱束手纒縛而不能解欲静則時勢危迫震撼而不得安動輙有悔无往不困為困于葛藟于臲卼曰動悔之象然物窮則變誠能深自悔悟振作有為以是而征困可免矣吉象曰困于葛藟未當也動悔有悔吉行也困于葛藟以隂柔无解困之才而所為未當也因動悔而有悔心則克自奮發而吉與行㑹不終于困矣巽下坎上井改邑不改井无喪无得往來井井汔至亦未繘井羸其瓶凶巽木入水而上出其水有井之象故為井井體有常而不遷猶治道有定而不易故為治以養人者恪守成法雖時勢不无變更而先王仁天下之法毫无更改猶改邑不改井焉夫既不改則于舊章无所增損而人人蒙澤不猶无喪无得而往來井井者乎然法貴由舊尤貴慎終設守之未幾而紛更隨起如汲井幾至得水尚未盡綆而敗其瓶則功雖垂成一旦僨棄凶彖曰巽乎水而上水井井養而不窮也卦名井者以巽木入乎坎水之下而津潤上達為木之華猶井水在下而汲之上行也故為井是井也其出有源其施不竭養民而不窮于用也改邑不改井乃以剛中也汔至亦未繘井未有功也羸其瓶是以凶也改邑不改井者以二五有剛中之徳剛則强毅有守而持之久中則意見不偏而善于因此所以能守常法有功而无凶也若汔至亦未繘井是法方行而澤未及物未有功也正當恪守之時乃妄肆紛更以至僨事如羸其瓶是以取凶豈法之過哉象曰木上有水井君子以勞民勸相木上有水津潤上行井之象也君子體以養民不勞民則澤壅不流不勸相則澤施不廣于是制田里教樹畜以勞來其民又勸勉之使民自相周助則以君養民固君之養使民自養亦君之養養之不窮與井不竭一矣初六井泥不食舊井无禽井以陽剛為泉上出為功初六以隂居下既无養人之徳又无及物之功明主所不賓天下所共棄者也象猶井泥而人不食遂成廢舊之井即禽鳥亦莫之顧也象曰井泥不食下也舊井无禽時舍也井泥不食言隂柔居下而澤不及于人也舊井无禽言其不能濟物而為時所棄也九二井谷射鮒甕敝漏九二剛中徳足及物但无正應汲引无人下比初六彚征无助雖有其徳僅能自潤如井旁穴水止可下注于鮒不能逺濟即有汲者亦如甕敝水漏于下不能上出盖抱徳而不遇其時者也豈不惜哉象曰井谷射鮒无與也二非无徳无與汲引之人所以其澤不能及物耳九三井渫不食為我心惻可用汲王明並受其福陽剛得正徳足澤民居下之上未為時用使人徒憫其道之窮象猶井渫不食為我心惻者此正惻其可汲而不汲也以无王明故耳如有王之明者汲而用之則徳施所溥君民俱受其福矣象曰井渫不食行惻也求王明受福也井既渫而猶不食豈特知已興嗟行道之人亦以為戚也倘有求賢之王明于知人舉而用之民社之福王者受之矣六四井甃无咎四柔得正是清介之士反身自治不染流俗浴徳有餘而濟人不足者也故其象為井甃如是則日新不已雖无及物之功亦无汚染之咎象曰井甃无咎修井也井以甃而无咎以有修之者也能防其汚方能致清然則側身勵行修潔其身士君子曷可少哉九五井冽寒泉食五以陽剛居尊是淵泉之徳素裕于己而時出之功自及于人象猶井冽而寒足為人食者象曰寒泉之食中正也寒泉而為人食不徒操利物之權以有中正之徳凡所以養人者盡善盡美故能如是上六井收勿幕有孚元吉上居井終坎口不揜是溥其井養之徳導民之利而不窮任民之取而不禁象猶井之汲取而不覆者此皆由其實心實政而有孚焉乃有此宏施耳大善而吉象曰元吉在上大成也上得元吉于井終則无一人不得其養上下與天地同流矣養道大成豈曰小補之哉離下兊上革已日乃孚元亨利貞悔亡離下兊上物理人情俱所當革故為革盖人心可與習常難以通變可與樂成難與慮始一日變革豈能遽信必得已革之日事久論定然後信聖人之革非喜革也不得已也革之難如此然事勢當革即一時未信亦何暇恤要在革之當耳果能灼于事理順于時勢善其所革可以通之天下萬世而元亨協于天理人情而利貞則所革皆善而妄革之悔亡矣彖曰革水火相息二女同居其志不相得曰革卦名革者水上火下各相滅息而勢不相濟二女同居少上中下長幼失序而志不相得物理人情俱當變革故曰革已日乃孚革而信之文明以説大亨以正革而當其悔乃亡已日乃孚者以革故非常黎民懼焉必至已日而後无不信也又曰悔亡者以卦徳離明兑説内能灼乎事理而非苟革外能順乎時勢而非驟革其為革也大善而可亨且咸正而无缺革而能當其悔乃亡天地革而四時成湯武革命順乎天而應乎人革之時大矣哉試以其革而極言之天地之道隂極則革而陽陽極則革而隂寒暑往來而四時成矣湯革夏而為商武革商而為周盖因天心厭亂人情思治而順且應之矣可見天地之成化工聖人之成世道皆不外于革則革之所在時之所在也時之所趨不得不革革之時豈不大哉象曰澤中有火革君子以治厯明時澤中有火火燃則水乾水决則火滅革之象也君子以為革之大者莫過于時使不治厯以明之則四序不分嵗令无别何以欽天道而授人事于是設占步之法以推天象運行之度立布筭之術以察氣機旋轉之變由遲速以定推遷由分積以考盈縮使晦朔弦望不愆其序分至啟閉不失其時如是則七政齊而百揆序在上者得以敬天而勤民在下者得以因時而趨事革莫大于此矣初九鞏用黃牛之革雖當革時居初无應是法未盡弊而猶有待上无委任權不在我豈可輕有所為惟不妄革為中不躁革為順堅確固守如鞏用黃牛之革則為善也象曰鞏用黃牛不可以有為也鞏用黃牛非避事也時勢不在本不可以有為故中順以自守也六二已日乃革之征吉无咎中正文明上應九五有徳有勢可以革矣然革乃大事非得已者化可更而无以善治未可也變可通而无以宜民未可也必從容詳審至于已日然後革之由是以往則其革為便民利國有更化之吉无紛擾之咎象曰已日革之行有嘉也已日革之則更張有漸弊无弗革治无弗新行有休嘉之功矣九三征凶貞厲革言三就有孚過剛不中居離之極過暴過察躁動于革者也以是而往人必不信凶雖事所當革而貞亦不免于矯拂而厲然時既宜革所病者不能審耳若能于利害可否熟思審處議革之言至于三就則亦足以信取于人而可革矣象曰革言三就又何之矣革言三就則審之又審慮无遺䇿矣又何必再有所商酌哉九四悔亡有孚改命吉以陽居隂是大臣承積弊之後宜有悔者幸剛柔不偏善革之用不乖事理不拂人情其悔可亡然在我或有可革而在人或未能信則亦未可遽革必其所革者揆諸理而咸當騐諸人而恊從變通盡利之事有以孚于上下然後舉凡政令之未善者而更易之庶惟其所為无不樂從而革故鼎新之治成矣象曰改命之吉信志也改命豈易而四得吉由其為國為民之志當未改之先已見信于君民故上安而下從也九五大人虎變未占有孚陽剛中正為革之主是以大人革命而有天下者以自新新民之徳而為順天應人之舉則皇猷帝治煥然一新有虎變之象此其道徳之威自能明著動變四海從風不待占决而有孚矣象曰大人虎變其文炳也大人轉移世道如虎之變則禮樂昭明其文炳然革道盛矣上六君子豹變小人革面征凶居貞吉上居革終天下風移俗易革道成矣其在君子則遷善敏徳而光輝外著如豹之變其在小人亦畏威逺罪遵王之道而革面向化至此復何為哉變革之事不可以過况上六之才又以守文為勝若往紛更則有擾事之凶惟居守其貞與君子小人共相安于徳化則可保治而吉象曰君子豹變其文蔚也小人革面順以從君也君子豹變者君子自治積中發外蔚然而可觀也小人革命者因君而革化為順從不敢自外于王化也巽下離上鼎元吉亨爻象俱有鼎之體用故為鼎鼎重器也得之固難保之亦不易必有徳有位有輔而鼎乃可保卦象變體備此三者則經綸調燮自可以凝天命係人心矣元亨象曰鼎象也以木巽火亨飪也聖人亨以享上帝而大亨以養聖賢卦名鼎者卦體有鼎之象初隂為足二三四陽為腹五隂為耳上陽為鉉制器尚象鼎之用立矣卦象有鼎之用以巽木入離火而致烹飪鼎之用行矣故為鼎然其用豈小哉聖人享上帝以報功也而特牲之物必用鼎以烹之而後可以達其誠聖人養聖賢以崇徳也而式燕之具必用鼎以烹之而後可以將其敬夫以報功崇徳之鉅典而皆有資于鼎鼎之用不大哉巽而耳目聰明柔進而上行得中而應乎剛是以元亨鼎之所係如此其大保之誠未易矣而詞曰元亨何以致之盖凝鼎在徳而位主之賢輔之卦象内巽順而外聰明是心思沉潛深入義理而視聽明聰旁燭事機有凝鼎之徳矣卦變柔進而上居五是以徽柔而履大寳之尊有主鼎之權矣卦體又五得中而應二剛是以虛中而任剛明之佐有調鼎之輔矣兼此三者徳位相資明良共濟則重器可保永為享帝養賢之令主矣是以元亨象曰木上有火鼎君子以正位凝命木上有火烹飪乃致鼎之象也君子以鼎為重器命之所在位之所在也命不凝无以主鼎位不正无以凝命于是正以凝之非僅端荘南面之謂也齋戒神明以正其内而毫无邪思整齊嚴肅以正其外而絶无妄動念念事事與命對越則正既不離乎位位自不離乎正而命无不凝鼎可永保矣初六鼎顛趾利出否得妾以其子无咎居鼎之下趾象也上應九四四所任者隂柔才弱不能勝任致四覆餗失飪鼎顛趾矣然因有負于四而警戒震動出其隂邪之惡則克勝其任猶顛趾而因以出否之象未為不利盖因敗以為功猶得妾以其子因賤以致貴也无負委托之咎象曰鼎顛趾未悖也利出否以從貴也人臣以盡職為道鼎而顛趾似悖道矣而實未為悖也以出否也其有出否之利者正以從陽剛之貴柔靡去而剛毅存可以不負所托也九二鼎有實我仇有疾不我能即吉以剛居中實徳充積鼎有實之象而宻邇初隂易為所溺是我之仇而足為我害者幸剛中自守不惡而嚴初自不能就而疾我則實徳不虧輔鼎之功出矣吉象曰鼎有實慎所之也我仇有疾終无尤也人未有无因而即我者由我有所之也二雖鼎有實矣可自恃哉宜愛吾鼎而慎所之于始則雖我仇有疾而終不能凂何有失身之尤九三鼎耳革其行塞雉膏不食方雨虧悔終吉三居鼎腹承文明之腴本有雉膏之美足以食天下者乃越五應上舍可事之君而從避世之士道无由行澤无由沛猶鼎耳方革而其行塞雉膏不食之象上負天子下負所學不有悔乎幸陽居得正尚非果于忘世而上又有好賢之君若舍上應五則明良㑹合如方雨然而虧其不仕之悔矣終必為人所食而吉象曰鼎耳革失其義也君臣之義不可廢也鼎耳革則潔身亂倫不仕無義自我失之矣九四鼎折足覆公餗其形渥凶四以大臣任天下之重宜廣求賢才以共圖之乃下應初六之隂委任匪人以致敗事猶鼎折足而覆公餗負君誤國能迯刑誅哉凶象曰覆公餗信如何也人臣未常不以薦賢自許四任匪人以敗公事向之期許何如也无論刑誅當亦自愧矣六五鼎黃耳金鉉利貞五以虛中應二堅剛是聖君良弼兩相成矣猶鼎黃耳而又貫以金鉉之象又當任賢勿貳始終如一而貞斯賢才效用鼎命永凝而利象曰鼎黄耳中以為實也鼎黃耳者任賢之念真實由衷中以為實非矯飾而為之也上九鼎玉鉉大吉无不利上佐五以出治猶鉉貫耳以舉鼎然輔鼎以剛而太剛則折上以陽居隂剛而能温是精明出以渾厚有玉鉉之象如是則輔理謀猷不吐不茹粹然盡善相道得而萬國理矣大吉无不利象曰玉鉉在上剛柔節也人臣之徳過剛无以立渾厚之體過柔无以起明作之功皆不足以比徳于玉今以陽居隂不一于剛而能以柔節之所謂温潤而栗者也安得不吉震下震上震亨震來虩虩笑言啞啞震驚百里不喪匕鬯一陽始生震動奮發在人事則值天下之變而震動不安故為震夫人當變故之來似難得亨然危者使平震固有亨道焉盖天下之事安不生于安而生于危主震長子誠能安不忘危心存恐懼常如事之來而虩虩然不敢安寜則怠緩之氣盡消自能精神凝固舉動安和優游自如而笑言啞啞矣平時業已寜定臨事豈復周張即有非常之變生于猝然有如震驚百里而心有定主事有常度處之泰然不失所主之重猶主祭者不喪匕鬯所謂震亨如此彖曰震亨卦名震而詞曰亨者葢生全出于憂患安樂得之艱危震則必亨能震故亨也震來虩虩恐致福也笑言啞啞後有則也震來虩虩者恐心也恐固非福而福惟恐乃能致也笑言啞啞者非倖致也盖人能先事恐懼觀變已審而後區處自有法則也震驚百里驚逺而懼邇也出可以守宗廟社稷以為祭主也震驚百里者以國家大變卒然臨之如震雷而逺邇驚懼也人情當此易喪所守而主器長子獨能處之泰然不失所守如不喪匕鬯其中心有主真足以任天下之重宗廟社稷寔式憑之故出可以守之為祭主也象曰洊雷震君子以恐懼修省雷聲洊至震之象也君子以為禍變之來皆人所召非盡人事何以回天于是存恐懼之實心以之修治其身思省其過以盡恐懼之實事如此則善于承天而變故自消處震之道得矣初九震來虩虩後笑言啞啞吉初為震主居震之初是先時而能虩虩然恐懼修省者也圖之已早慮之已周患无自生而後笑語自如矣吉象曰震來虩虩恐致福也笑言啞啞後有則也震來虩虩則即此最初一念持之而有終也笑言啞啞即此恐懼一法行之而有效也過初而懼則為晚矣六二震來厲億喪貝躋于九陵勿逐七日得二以隂柔乗初之剛為所侵凌是當震之來而危厲者勢不能敵避之可也特患係戀所有而不能耳是必盡棄貨財逺去圖存如億喪貝躋于九陵焉然二柔順中正徳足自守猶可勉為善後之圖不久則所喪者亦将復得有勿逐七日得之象象曰震來厲乗剛也震來厲者以乗初剛弱不敵强不得不厲非徳之不足也六三震蘇蘇震行无眚以隂居陽而不中正是无才无謀一當震來不勝驚懼緩㪚自失莫知所為有蘇蘇之象是固應有眚矣若因震而修省能行以去其不正則眚可无矣象曰震蘇蘇位不當也震蘇蘇者由其徳不足以禦震當危懼之時而束手待斃不當如此故自失耳安可无變計乎九四震遂泥四以才徳不足之人陷于二隂重險之中不能自振遂沉溺而不復起矣為震遂泥之象象曰震遂泥未光也當震時而能奮發有為乃為有光今震而遂泥終于暗昧安得光明六五震往來厲億无喪有事隂居君位而當國家之變才弱不足以濟故往來皆厲无時不危者也幸其得中能存小心恐懼修省不特无大喪失之禍而且能持危定傾而有事于補救也象曰震往來厲危行也其事在中大无喪也震往來厲以无才濟變危與行㑹也然危行而猶能有事者以有中徳不倚于情不激于氣修省之宻可以易危為安所以大无喪也上六震索索視矍矍征凶震不于其躬于其鄰无咎婚媾有言以隂柔處震極是无才而處大變者志氣索索而消阻故瞻視矍矍而傍徨以此而往中先自亂其凶必矣此惟防之不早故耳若當震未及身之先能自儆戒預備則可无咎然猶有意外之變如婚媾且不免言况不防之于先乎象曰震索索中未得也雖凶无咎畏鄰戒也震索索者由中无主未得所安也雖凶无咎者以震在鄰乃鄰人所戒而我即畏備則有備无患也艮下艮上艮其背不獲其身行其庭不見其人无咎艮止也上下皆艮有止之義故為艮天下之理各有當止之所猶人之一身惟背為止人心惟不知所止是以内則迫于吾身之利害外則奪于人事之是非而不免于有咎苟能止于當止之理則方其静而未行湛然一太虛之體而思慮俱捐一切耳目口鼻之私不動于中如不獲其身及其動而既行廓然一太虛之用而外誘不擾一切聲色臭味之用不牽于外如行其庭不見其人如是則内不出外不入静固止動亦止无妄動之咎彖曰艮止也時止則止時行則行動静不失其時其道光明卦名艮者言心之止也止非枯寂而守之者也貫乎動静而妙于一時故時當止則與之俱止斂感于寂可也時而當行則與之俱行通寂于感可也如是則吾心體之内動静不膠一因乎時而不以我與焉兩忘而化于道也尚有意必固我之為累而道不光明乎艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人无咎也人之一身惟背為止所謂艮其止者言止得其所也止之時所在止行之時所在行无時非止无止非所也内外之卦隂與隂應静不耦動陽與陽應動不耦静上下敵應而不相與是各止于其所也是以行止皆因于時物我皆无所累若不獲其身行其庭而不見其人无咎也象曰兼山艮君子以思不出其位兩山相峙各止其所艮之象也君子體之以心之官則思思不可馳凡人咸有現在所居之位于位中所當自盡之理固不可缺于位外不必自逐之念亦不可紛從位起思而不以思迎位隨思還位而不以位閑思是則止所之學也初六艮其趾无咎利永貞初隂柔性本静者也而居艮初是内欲未萌外交未引能止其所者也无朋從之咎此即初之貞也能永守之則止為常止而利象曰艮其趾未失正也人生而静吾人本來之正也人多縁妄動而失之今曰艮趾則能止于未動之初而于主静之正未失也六二艮其腓不拯其隨其心不快二當腓處最易動者而居中得正是制心制事一皆恬静自守置之波蕩之地而不為所動為艮腓之象然君子之心必合人已兼成而後快三乃二之所隨者過剛不中妄止于上二不能救其膠執之失其心豈能快哉象曰不拯其隨未退聽也不拯其隨由三剛愎自用不肯退聽乎二非二之過也九三艮其限列其夤厲薫心心體固不可妄動亦不可惡動而求静三當限處本非可止而過剛不中違時强制不復顧其變動屈伸為艮其限如是則事勢乖違物情暌絶如列其夤在三之心或以盡去物感可以息心抑知却動求静心豈能静拂戾于外必不安寕于内其為危厲可知象曰艮其限危薫心也三艮其限方自以為可以制心而列夤之危至于薫心限其可艮乎哉六四艮其身无咎純隂得正時止而止是于一身之中思不亂營官不亂役為艮其身之象如此則内外皆止視聽言動俱无所累无咎象曰艮其身止諸躬也四之艮身豈徒求之形體之間哉見之躬行實能時行時止而止諸躬也六五艮其輔言有序悔亡五當輔處言所由出以隂居陽似未免悔然能得中心本安静言不妄發發必中理為艮其輔言有序之象而失言之悔亡象曰艮其輔以中正也艮其輔者心安于静而不偏故言當乎理而不紊也上九敦艮吉以陽剛居止之極是徳性本自堅凝而功夫又无間斷動静各止其所而始終不渝敦厚于止者也大人之止至善聖人之欽汝止可與侔矣止體光明而吉象曰敦艮之吉以厚終也心性之學靡不有初鮮克有終敦艮之吉愈久愈凝厚其終矣艮下巽上漸女歸吉利貞卦體下止上巽是為士者未進之時止而不妄方進之時巽而不驟故為漸君子仕進特患不以漸耳苟如女子之嫁禮備後歸則其進也以禮其出也不苟可以有為而吉然士人固有漸進而未必正必以正自守毋曲學阿世毋枉道徇人乃利彖曰漸之進也女歸吉也卦名漸而詞曰女歸吉者漸進之義也天下漸進者莫如女歸以女歸之道而進則可以行道而吉也進得位往有功也進以正可以正邦也何以利貞卦變自渙而來九進居三是臣得臣位自旅而來九進居五是君得君位夫位者功業之所藉也進得其位往必有功所以然者位非虚擁功非倖成始進以正則正已可以正人而邦即從此正矣其位剛得中也夫此得位也在卦變固有得正之功矣在卦體又有得中之義焉以剛居五而得其正是為君者英明强毅粹然而无偏私以此建中即以此表正有君如此君子之進可不正乎止而巽動不窮也夫卦體固有得中之象矣而卦徳又有漸進之義焉則時未可進止而不苟既恬退而无求時若可進巽而不躁復舒徐而不驟以此動而有為自重者人亦重之自无摧抑可以輔剛中之主而成正邦之功矣寧有窮乎象曰山上有木漸君子以居賢徳善俗山上有木以漸而長漸之象也君子體之以徳必積累而後成寛以居之而无欲速之心則徳以漸而進俗必漸摩而後化馴以善之而无督責之意則俗以漸而美矣初六鴻漸于干小子厲有言无咎始進无應是以新進之士名寔未孚阨于下僚如鴻漸于干而未得所安也夫以一介孤臣履危蒙譏為小子厲有言也然實時命不偶非其自致无咎象曰小子之厲義无咎也小子之厲位卑无應使然非妄進所致也于義為无咎六二鴻漸于磐飲食衎衎吉六二柔順中正進以其漸而上應九五是有徳有遇而徳以稱位居髙食厚而委蛇自適者也為鴻漸于磐飲食衎衎之象夫以大臣不尸位素餐則正邦善俗功業爛然吉象曰飲食衎衎不素飽也飲食衎衎豈徒伴食以徳詔祿不素飽也九三鴻漸于陸夫征不復婦孕不育凶利禦寇九三過剛不中而无應是无徳无援而恃剛躁進何以安其位乎猶鴻離水而漸于陸夫㝠行者必取困違衆者必見摧以一己而言徒然率意而行如夫征行而不復以與人而言不能資人柔順如婦孕而不育凶莫甚焉此等過剛无適而可惟用禦寇庶幾克敵外此别无用也其于漸進豈所宜哉象曰夫征不復離羣醜也婦孕不育失其道也利用禦寇順相保也夫征不復者以剛愎獨行自離羣類也婦孕不育者以有陽无隂失其生育之道也利用禦寇者以此陽惟用以禦寇斯為順道而能相保也若用以處漸則逆而非所宜矣六四鴻漸于木或得其桷无咎以柔乗剛是大臣見逼于權奸而不得其所者幸有巽順之徳善于處已處人使彼不能肆暴而我猶得少安如水鳥木棲或得平柯之象庶无危身之咎象曰或得其桷順以巽也乗剛宜不得安而或得其桷以順而无忤于物且巽而能沉于幾遇難處之人有善處之術所以能得安也九五鴻漸于陵婦三嵗不孕終莫之勝吉五居尊位鴻漸髙阜之象然君待臣以𢎞化猶婦待夫以生育二體正應乃為三四所隔不得相遇以成治功為婦三嵗不孕之象然邪不勝正自将君臣㑹合而成正邦之化吉象曰終莫之勝吉得所願也得賢𢎞化五所願也終莫之勝吉則得遂其所願矣上九鴻漸于陸其羽可用為儀吉上有剛徳非不足羽翼聖朝但出臣位之外是髙飛遐舉如鴻漸于雲路然夫當漸之時不患少事功而患少節義如上九之清風峻節可以振激一時師表百世无用之用大有功于名教者其羽為儀吉孰大焉象曰其羽可用為儀吉不可亂也其羽可用為儀吉者以其超世之志卓然自立舉凡富貴功名俱不足以亂之也兑下震上歸妹征凶无攸利卦以少從長既非婚姻之時情以悦而動亦非于歸之禮女先于男所歸者妹故名歸妹夫妹而自歸已非正矣且卦體位多不正滛滅禮也以柔乗剛婦制夫也自其方歸之始已非禮法之所容以征則凶究其既歸之後又豈室家之所宜无攸利彖曰歸妹天地之大義也天地不交而萬物不興歸妹人之終始也卦名歸妹豈細故哉男女室家雖曰人道而隂陽交感天地之大義也天地不交則氣化塞而萬彚不興若男女不交則形化㝠而人類滅息故歸妹雖女道之終而生育之所造端寔人道之始也非天地之大義而何説以動所歸妹也夫歸妹之義通乎天地如此而可苟乎乃卦徳則説以動是女子為私情之合而不由于禮所歸者妹也征凶位不當也无攸利柔乗剛也詞曰征凶者以卦爻自二至五位皆不當是男不以正從女女不以正從男閨門慚徳非禮法所容也无攸利者以三五爻皆以柔乗剛是夫屈于婦婦制于夫惟家之索也象曰澤上有雷歸妹君子以永終知敝雷動則澤隨猶女之隨男而動歸妹之象也君子知夫婦之道不可以不久必正其始斯能善其終而无敝苟以悦而動則一時雖合逆知潰禮教敗倫常久必至于乖離所以思其終必圖其始念其永必慎于今以防㣲而杜弊也初九歸妹以娣跛能履征吉初九居下而无正應是位列家臣如歸妹以娣者然有陽剛之徳雖不得大展其志猶能為所當為猶跛能履之象以是而往隨分盡職吉象曰歸妹以娣以恒也跛能履吉相承也妹歸以娣而亦能有為者以陽剛有恒久之徳位雖卑而才則裕也跛能履吉惟有此恒徳乃能承助其君也九二眇能視利幽人之貞二剛中而應不正是有徳之賢臣遇非其主不能言聽計從而究其所施如眇能視而不及逺也夫進不能行其志不若退而守其志利幽人之貞可也象曰利幽人之貞未變常也抱道守志士人之常利幽人之貞者二不以時未偶變其所守之常也六三歸妹以須反歸以娣隂不中正既乏經綸為悦之主又覬利祿是徳不足以待用耑務媚人以求售者此士類所羞稱明王所必棄也誰其用之祇見其久待于下終于卑賤而已如歸妹以須未得所適而反歸以娣之象象曰歸妹以須未當也歸妹以須以徳不足而行可鄙所以見棄于時也九四歸妹愆期遲歸有時陽剛居上而无正應是有徳而未遇其君故抱道自守寧過期不仕為歸妹愆期而遲歸之象然其所以遲遲者豈失時哉仕自有時時之未偶即愆期勿恤矣象曰愆期之志有待而行也士固有志愆期之志非不欲行待可行而後行也六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉五以柔中下應九二是為君者屈己下賢以實不以文猶帝女下嫁而其服飾反不如娣之美者君徳至此盛无以加為月幾望之象如是則賢才輔而理道昌吉象曰帝乙歸妹不如其娣之袂良也其位在中以貴行也夫以帝乙歸妹而反不如其娣之袂良也由其有中徳之貴而行故不尚飾也上六女承筐无實士刲羊无血无攸利上六隂柔居終无應既无可進之徳復无與進之君擬之女之嫁者如承筐无實不成嫁也擬之士之娶者如刲羊无血不成娶也上不能以得君下不能以治民何所利哉象曰上六无實承虚筐也陰柔无徳无見用之實故世莫之用徒懐欲進之心猶之承虛筐耳離下震上豐亨王假之勿憂宜日中卦徳明動相資致治盛大故為豐豐則天下一綂治化四達亨王者至此豐亨之時可喜也而盛極當衰尤為可憂然徒憂无益盖有道焉惟日戒滿不以勢盛而萌侈大不以治極而啓紛更如日之中天不至于昃乃可長保此豐矣彖曰豐大也明以動故豐卦名豐者治功盛大之謂也是何修而臻此卦徳離明震動智能見大而識天下之幾才能圖大而振天下之務明與動合故明作有功而治化廣大故豐王假之尚大也勿憂宜日中宜照天下也王假之者言王者至此豐亨之時治普化𢎞功宏志廣不期大而自大所尚者大也勿憂宜日中者以大可有而不可尚言宜抑尚大之心為守成之心凡四海休戚生民利害无不畢照不敢自有其盛以置天下于度外乃為宜也日中則昃月盈則食天地盈虛與時消息而况于人乎况于鬼神乎王者所以宜日中者以中不可過耳日既中未有不昃者月既盈未有不食者即天地氣機之盈虛且與時為消息時未有息而不消者則天地亦未有盈而不虚者况于人事不出天地之外鬼神運于天地之中有能常盛而不衰乎治亂循環有必然者所以宜日中之戒也象曰雷電皆至豐君子以折獄致刑雷電交至威照並行其勢盛大豐之衆也君子體之以治獄于獄之未成則法電之照以剖析之使是非曲直惟明克允既成則法雷之威以刑致之使輕重大小惟斷乃成如是則奸无遺而民不寃豐可長保矣初九遇其配主雖旬无咎往有尚初明四動是明動相資合而有助為遇其配主焉惟其相配則一徳未有不一心者兩賢豈相厄哉惟智謀才力不相上下必无傾軋之咎以此而往同寅協恭豐可保矣為往有尚象曰雖旬无咎過旬災也雖旬无咎者正惟旬而不過故无咎耳若求勝其配則相忌之災不可言矣六二豐其蔀日中見斗往得疑疾有孚發若吉二本明臣而遇五尚大之暗主猶豐大其障蔀斗且日中而見也以君若此而遽直言往諫必反猜疑疾惡惟積有孚以感發之斯誠无不格君蔽可開吾明不掩吉象曰有孚發若信以發志也五雖暗主而本明之志未有不可發者有孚發若正積誠以感發之非以口舌争之者也九三豐其沛日中見沬折其右肱无咎三處明極而應上六其受障蔽甚于蔀矣為豐沛見沬之象夫明徳既為所蔽勢必至于廢棄如折其右肱而終不能展其用也然此固蔽賢者之過于三无咎象曰豐其沛不可大事也折其右肱終不可用也事君保豐大事也豐其沛則主已昏暗大事去矣是以三雖至明可用為股肱亦如右肱之折終不可用也九四豐其蔀日中見斗遇其夷主吉四以大臣而近暗主亦明而受蔽者也故為豐蔀見斗之象然大臣不宜以君蔽自諉而協贊自能以和衷相成下有初九與我同徳吾之夷主也若能下而就之同輔其君則同心協力謀斷相資君可格而豐可保吉象曰豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也豐其蔀者以位不當立昏暗之朝也日中見斗者以明為君蔽幽而不能自耀于光明也遇其夷主者明動相資可往以格君而吉行也六五來章有慶譽吉質雖柔暗難以保豐若能來致天下章美之賢則資人之明開已之暗可享豐亨之慶致聖主之譽何吉如之象曰六五之吉有慶也五以來章而得吉豈止一人之慶哉天下皆受其慶矣招來賢士豈宜緩也上六豐其屋蔀其家闚其户閴其无人三嵗不覿凶上以隂柔居豐之極處動之終是恣意尚大而又鋭意喜功自以為窮天下之明而不知自恃其明其暗反甚如豐其屋而自蔽其家者然即其障蔽之深人情物理一无可見終身昏迷如窺户無人三嵗不覿如此則窮大失居邦家淪喪凶莫甚焉象曰豐其屋天際翔也闚其户閴其无人自藏也豐其屋者言其豐極動終懐滿假之心負驕盈之氣如屋之髙大翔于天際也闚其户閴其无人者由其恃勢挾才自驕以蔽其明自滿以昏其志故障蔽之深一无所見也艮下離上旅小亨旅貞吉艮下離上卦體卦徳俱有去所止而不處之義故為旅凡人寄身羇旅黨少親寡似難得亨然道无不在若能善處而有安静之心酌于理勢以善其動則不忤于物不迷于事為可小亨此即處旅之貞也能守之而不失則人已兩得可保其亨矣吉彖曰旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也旅則失其居矣何以小亨盖處旅之道莫貴乎得中莫病于自足卦體六五柔得中乎外而順乎上下之二陽則是不亢不屈行已合乎中行而于人之有徳者又虚心順從使有才力者樂為我助處已處人兩得其道矣抑處旅之道莫貴于静正莫患于不明卦徳艮止而離麗于明則是恬退安静心不失于妄求而所以應于外者又審時度勢凡事物機宜俱洞悉无遺則以内以外交盡其善矣是以雖在旅時亦能小亨而貞吉也旅之時義大矣哉由是觀之當旅之時自有處旅之義所遇之人既非情所素孚所處之地又非身所安便髙則取禍卑則取辱自非柔中應剛内止外眀者不能小亨而吉此時此義豈不大哉象曰山上有火旅君子以明慎用刑而不留獄山上火動去而不留旅之象也君子體之以獄者司民之命故于獄之未决則明察其情慎重其事用刑如山輕重出入无敢慢易于刑之既成則當刑即刑當斷即斷不留如火或罰或宥无敢淹滯如是則用刑之道得矣初六旅瑣瑣斯其所取災隂柔居下是氣量淺狹行已卑污處旅而卑瑣者也旅而若斯必致侮辱是旅不為災災適自取耳象曰旅瑣瑣志窮災也旅瑣瑣志量猥陋亦已甚矣其自取災固其宜也六二旅即次懐其資得童僕貞柔順中正既能與物无忤又能處置得宜以是處旅自即次而安其身懐資而裕其用且得童僕之貞信為无欺而有賴盖惟全乎處旅之道故能備旅之善也象曰得童僕貞終无尤也旅以得人為重二能得童僕貞則即次懐資皆有所賴雖云親寡終无尢矣九三旅焚其次喪其童僕貞厲過剛不中居下之上是性既剛暴行又亢驕待人不遜御下寡恩者也以故无爰處之安有叛離之志為焚次喪僕之象此雖心无私邪而貞然亦失依寡助而厲象曰旅焚其次亦以傷矣以旅與下其義喪也旅而焚次已傷不安况又喪僕然當旅之時而與下之道如此義當喪也豈人之无良哉九四旅于處得其資斧我心不快以陽居隂用柔能下是不過于剛而又不忤于物以此處旅則隨處皆安可獲棲身之地隨事有備可得資身之防然居非正位而上下皆柔則所處非久安之位所與非相知之人不能伸其志而愉快也象曰旅于處未得位也得其資斧心未快也君子之志在得位以行其道旅于處則非所安之位位既未得志必不能自伸雖有資斧其志豈能快然六五射雉一矢亡終以譽命六五柔順文明又得中道為離之主有雉之象是逺臣入國覲天子之光以行其志如射雉然夫士處旅親寡不能遽合其先不无一矢之失然才不終晦終必以此聲聞于朝受命于君也象曰終以譽命上逮也終以譽命者身際文明聲譽上達于天子也上九鳥焚其巢旅人先笑後號咷喪牛于易凶上處旅之終窮大失居棲遲无地鳴豫于未焚之先悲號于既焚之後為焚巢笑號之象所以然者由其驕亢自髙失其順徳而不自知如喪牛于易凶象曰以旅在上其義焚也喪牛于易終莫之聞也處旅之時惟謙順可以圖安上九好髙不下誰其容之其焚巢宜也喪牛于易者以失其順徳不自聞知而終于昏迷也巽下巽上巽小亨利有攸往利見大人隂伏陽下其性善入故為巽天下事惟陽剛才力方能大有作為巽隂為主則力量才猷皆有未逮小亨幸其以隂從陽則力與才俱有所藉可以圖大而利有攸往然必所從者為徳望冠世之大人乃利見耳彖曰重巽以申命上下皆巽是重巽也巽入也重巽則深入矣盖君之入人心莫如命惟重巽是所以申命者反覆叮嚀有以深入于人心矣剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人詞曰小亨利有攸往利見大人者卦體九五剛也而巽入乎中正之徳初四柔也而皆順從乎九五之剛是君以剛毅之資而巽順乎中正之矩則徳純化洽而建中表正之志行矣由是在下臣民莫不順其剛之中正以歸于中正是以柔雖小亨而无不利也象曰隨風巽君子以申命行事風行相繼无物不入巽之象也君子以風不繼无以深入萬物命不繼无以深入萬民故于國家紀綱民生利病无不三令五申熟民耳目一民心志而後行其所命之事則有以深入乎人心矣初六進退利武人之貞初六以隂居下為巽之主卑巽太過于天下事退怯而不敢為化所當更徒裕蠱以滋其弊而不能叮嚀于其變之前弊雖宜革徒詭隨以安其陋而不能揆度于其變之後故為進退不果之象若以武人之貞處之則事不持于兩可有以濟其所不及而得所宜矣象曰進退志疑也利武人之貞志治也天下事皆起于志方進而退不果决志有所疑而未定也惟濟以武人之貞則志有主而不亂矣九二巽在牀下用史巫紛若吉无咎處隂居下能巽者也而又居中不為已甚是人臣謙卑遜順不敢少亢而惟叮嚀煩悉其詞以對揚其精白以道達其真誠象猶巽在牀下用史巫紛若者然如是則忠順不失于君可格而吉于臣不諂而无咎象曰紛若之吉得中也人臣之道以順為中二能竭誠得其道矣豈諂乎哉九三頻巽吝過剛不中无下人之資居下之上挾上人之勢非能巽者故雖勉為謙遜于一時而不能久頻巽而頻失者也无恒取羞吝象曰頻巽之吝志窮也巽出于心乃為可久九三過剛不中志意滿極其所為巽者徒致飾于聲音笑貌耳六四悔亡田獲三品隂柔无應承乗皆剛是才弱勢孤而又迫于强暴似行有不得之悔幸其用柔能下為能謙恭下士而羣䇿羣力皆為我用則不特其悔可亡亦且如田者能獲三品之多焉象曰田獲三品有功也人臣之功莫大于延攬豪傑四能虛懐以獲之天下之功集矣九五貞吉悔亡无不利无初有終先庚三日後庚三日吉五居巽體是繼世之君承先朝之積弊宜有悔者然剛健則能更而中正又善其更為能革弊以歸于貞焉貞則得更化之善而吉從前之弊盡革而悔可亡且維新之治大洽而无不利是雖无初也而實有終矣則惟貞之故也貞豈易言哉必于未然用先庚三日之丁斟酌以悉利害于已然用後庚三日之癸揆度以圖久逺斯謂之貞而吉象曰九五之吉位正中也五以變更而亦得吉以有正中之徳既不因循亦不躁率變而不失其正權而不離乎經所以能貞而吉上九巽在牀下喪其資斧貞凶上九本有剛斷之徳以居巽極凡事一于柔荏過于卑巽而所為剛斷者俱失為巽在牀下喪其資斧之象雖時所當巽而貞然志氣卑靡必致僨事凶象曰巽在牀下上窮也喪其資斧正乎凶也巽在牀下者以居巽上卑巽已極也喪其資斧者失其剛斷天下事无一可為其凶必也兊下兊上兊亨利貞悦萬物者莫悦乎澤上下皆兑故為兑人君以悦感民民无不懐化无不洽亨然違道以干民譽非貞也必其所為悦者大公至正不煦煦于驩虞之私乃為王道之正而利彖曰兑悦也卦名兑者以兩情相恱之謂也兩相恱則此感彼應其間自有淪洽无往不通矣故名兊剛中而柔外説以利貞是以順乎天而應乎人説以先民民忘其勞説以犯難民忘其死説之大民觀矣哉説固冇亨道矣而又必利于貞者何卦體二五以剛居中三上以柔居外是内而中心誠恱外而接物和柔本誠為悦而恱以正乃為利也貞則天人共協是以順天心而不悖應人心而不違由是以順應者率民趨事民悦而忘其勞即率民犯難民亦悦而忘其死夫勞與死民情最難堪也而俱與為忘是説之之道蕩蕩為公而不流于小補其鼔舞相勸不能自已豈不大哉象曰麗澤兑君子以朋友講習兩澤相麗互相滋益兊之象也君子以學无所麗无以恱心于是集友以闡明義理開發性靈而習之不已講習討論无少間斷則在已有以裕其已在人有以及于人恱心之趣自无窮矣初九和兊吉陽居説體而處最下又无係應是真性自暢而外无私戀其出而為説者一本性情之正而无偏黨之私所謂和而不流者也為和兊之象和則達之天下而志无不通吉象曰和兊之吉行未疑也和兊之吉者從本性發見流行順應而无私何疑累之有九二孚兊吉悔亡以陽居隂是處危疑之地不足取信于君而有悔者幸其徳剛中能以精誠為媚而非致飾于言貌之間孚兊者也孚則至誠所格可以獲上治民吉而悔亡象曰孚兊之吉信志也凢人之恱多以其貌九二剛中是其孚實本于中心而克自信其志也自信而君安有不信哉六三來兊凶隂柔不中正為兊之主是无徳而専事媚恱者以上无應而來就二陽以求恱則枉已求容必為正人之所賤惡凶之道也象曰來兊之凶位不當也來兊而取凶辱以位不當而无自守之徳也九四商兊未寧介疾有喜上近九五中正之君下比六三柔邪之人故不能决而商度所恱未能寧定幸質本陽剛為能介然守正知三為邪媚而疾惡則君臣相合而有喜矣象曰九四之喜有慶也絶去柔邪媚兹一人九四之喜也然豈獨四喜哉明良合而庶事康天下受其福慶矣九五孚于剥有厲上六以隂柔小人為説之主處説之極隂剥人主者也五雖剛正而宻邇之未免因其匿情矯偽而誤信不疑孚于剥焉将聰明壅蔽天下國家之危厲從此起矣象曰孚于剥位正當也孚于剝者以五剛中為正居尊為當一則恃其才足馭奸一則恃其勢足制命故不覺為其所剝而信之也上六引兊隂居恱極窮恱之巧以不求恱為恱能使人昵已而不自知為引兊者也識者可不早為防哉象曰上六引兊未光也上以媚恱引人則包藏禍心踪跡詭異曖昧甚矣豈能光乎坎下巽上渙亨王假有廟利渉大川利貞世道涣散人心瓦解故為渙時至于渙宜難得亨卦變有形險可據才能可運而又有為之助者可亨然濟渙之道首收人心次談經濟當渙之時九廟震驚祖考之精神渙矣王者必假廟以聚之使人心反本而有係属抑渙之時神州陸沉天下之陷溺深矣王者必奮憑河以救之使斯民拯救而得所安且合神明之渙舉動一本于大義其假廟也順時協禮不為淫祀以徼福其涉川也伐暴取殘不為行險以要功必利于貞其渙乃濟彖曰渙亨剛來而不窮柔得位乎外而上同渙何以亨卦變九來居二而得中是英雄得用武之地據守進取皆有資藉不至困窮濟渙有基矣六往居三得九之位是才堪文武能安集又能戡亂濟渙有才矣且上同于四得忠良豪傑與之戮力抒忠濟渙有助矣故可亨王假有廟王乃在中也王假有廟非虛文也王乃聚已之精神親至于廟以誠感格乎祖使天下曉然知人本乎祖之義而不至于渙也利涉大川乗木有功也利涉大川非倖致也盖有具也卦象巽木乗于坎水之上是經綸康濟之才藴蓄有素可以拯天下之難而有功也象曰風行水上渙先王以亨于帝立廟風行水上離披解散渙之象也先王以合渙在收人心收人心在使之知所本萬物本乎天享帝于郊仁人之所以事天而合上帝之渙也人本乎祖立廟于國孝子之所以享親以合祖考之渙也此濟渙之大也初六用拯馬壮吉居卦之初渙之始也始渙而能拯之為力極易又有九二之剛足以資其英畧𢎞濟時艱猶用拯而得壮馬焉則初六隂柔雖无濟渙之才而能順乎九二則渙无弗濟吉象曰初六之吉順也初以隂柔才弱之人而得濟渙之吉才謀功效不必自已出也以能順乎九二之剛耳九二渙奔其机悔亡當渙之時首在據險九而居二似失故居而有悔矣然能得乎中是正所謂剛來不窮者能據要害以圖恢復猶人之奔得其机而安也如是則英雄得用武之地進可以戰退可以守悔亡象曰渙奔其机得願也據險濟渙英雄所願而不能得者今奔其机其願遂矣六三渙其躬无悔三在内體躬之象也隂柔而不中正似有私于已者然居得陽位志在濟時為能不辭勞瘁馳驅四方渙其躬者也自无内顧之悔象曰渙其躬志在外也三渙其躬志在天下不在一身所以公爾忘私也六四渙其羣元吉渙有丘匪夷所思居隂得正上承九五是以大臣當濟渙之任而下无應與為能開誠布公散其朋黨渙其羣之象如是則相道克盡元吉然使止為一身明心迹而令才知之士懐疑不進則雖免招尤猶是尋常識見四當渙羣之日又能激發人心使人人乃心王室媚茲一人是渙也適所以為聚也有若丘陵此正老成妙算第一等事業第一等人品也豈常人思慮之所及哉象曰渙其羣元吉光大也去私交而得吉非心術之光明正大豈能公忠臻此九五渙汗其大號渙王居无咎天下之渙多起于情意不敷恩澤不究五以剛中居尊是能發徳音下明詔以宣達上下之情為渙汗其大號之象然實恵未徧號令為虚又能渙其居積大賚四方為渙王居之象是則可以收拾人心无負濟渙之咎象曰王居无咎正位也王既居矣而得无咎以有中正之徳而居尊位仁政本于仁心公利不私故无咎也上九渙其血去逖出无咎上以陽剛居渙之極才既有為時又将濟能出乎渙解傷害而使去且蘇阽危而憂懼出為血去逖出之象无負濟渙之咎象曰渙其血逺害也血者渙之害也上能渙其血則時雖有害今已逺之矣兊下坎上節亨苦節不可貞坎水无窮兊澤有限有防而不溢之意故為節凡事有節則立身无過裁制得中有亨道矣然所謂節者謂節之使不過也非過于節而為苦也節至于苦非中節矣矯情拂性其可久乎故不可守以為常彖曰節亨剛柔分而剛得中節而曰亨節固有亨道也其道貴乎得中卦之全體剛柔均分卦之二體二五得中分則均而不偏中則限而不過以此為節无偏勝之失而有當可之宜故亨苦節不可貞其道窮也苦節不可貞盖以苦則過中矯情拂性其道窮極而不可行矣故不可貞説以行險當位以節中正以通夫節道至苦則窮而不通矣而卦之徳體則又有通而不窮之道焉兊說也坎險也人情悦則易流險則思止以易流之情行險止之意是其所為止者以和平之心行之而不至于苦是節道也而九五當位主節是居尊以操節之權而又中正以善節之道則其制不過其節不苦可以通之天下萬世矣天地節而四時成節以制度不傷財不害民極而言之天地之道陽極隂生隂極陽生若有均節而不過者而氣序不忒四時于是乎成矣聖人以天地之節節為度數則匪頒有式費出有經不至傷財而害民矣節道之大如此象曰澤上有水節君子以制數度議徳行澤上有水其容有限節之象也君子體之以民用民行不節則不中爰是以制度數數有多寡度有隆殺制之云者自服物采章以至宫室器用莫不各有等級限制而使賤不踰貴下不侵上所以節民用也又以議徳行徳存乎心行見乎外議之云者自民彞物則以至進退周旋一一為之酌斟而使心无過思動不踰則所以節民行也民用民行咸歸于節天下治矣初九不出户庭无咎陽剛得正居節之初有能止之徳值當止之時為節而能止不妄求出不出户庭之象自无枉道之咎象曰不出户庭知通塞也不出户庭豈徒知塞哉通則行塞則止其于通塞之理知之深矣九二不出門庭凶二當可行之時而剛而不正昧于進退之宜上无應與忘乎君臣之義知節而不知通徒以隠為髙者也為不出門庭之象潔身亂倫凶莫甚焉象曰不出門庭凶失時極也時可出而不出自失機㑹之極矣六三不節若則嗟若无咎隂柔而不中正非能節者以行已則蕩而无檢以制用則靡而不經恣情矯縱畧不撙節徳縱而敗才縱而傷凶悔之來徒自嗟嘆為不節則嗟之象人而至此无所歸咎矣象曰不節之嗟又誰咎也不節之嗟可尤人乎誰為不節咎将安歸六四安節亨五以中正主節于上四以柔正純臣安于五之所節而立身制用一稟時王毫无勉强為安節之象則用无不經行无不宜亨象曰安節之亨承上道也安節之亨盖以五當位以節道之所在也四順而承之非徒安分而已九五甘節吉往有尚九五當位主節而有中正之徳故其為節也教不强世制不矯俗皆依性而行因情而出調于天節節之甘而不苦也制作盡善可以參天地合帝王吉且以是而往可以凖今可以傳後不有尚乎象曰甘節之吉居位中也節以中為貴五居位得中而有中徳節之所以甘而吉也上六苦節貞凶悔亡處節之道中則甘過則苦上居節極慕儉素之風而流于嗇髙賢智之行而傷于矯乃節之苦者也如是則矯拂太甚非人情所安雖事當節而貞終不可行而凶然此不可繩天下未始不可範一身戔戔之嗇可以共徳硜硜之守可以寡尤其悔可亡象曰苦節貞凶其道窮也節道豈有窮時苦節者自窮之耳兊下巽上中孚豚魚吉利涉大川利貞卦體中實中虛一心之孚卦徳下恱上巽兩情之孚故為中孚孚既在中則至誠所感无物不格雖人至頑㝠如豚魚之无知亦可感之而吉况有知者乎忠信可行无險不通雖事至艱危如大川之至險亦可濟之而利况平居乎可見天下无不可感之人无不可濟之事然又非硜硜小信所能孚也必正而不諒執而能通信所當信而合于貞乃為利耳彖曰中孚柔在内而剛得中説而巽孚乃化邦也卦名中孚者以一卦言之二隂在内為中虚以二體言之二五剛得中為中實是太虚之心一物无所容者即為萬理之皆實也此信之主于中者也卦徳下悦上巽是臣以媚兹上通君以順從下應都俞吁咈孚于一堂萬邦作孚矣此信之達于外者也豚魚吉信及豚魚也利涉大川乗木舟虚也豚魚吉者言誠信之極无物不動即无物不及雖无知如豚與魚亦能及之也利涉大川者卦象木為水上乗木之象外實内虛舟虚之象在人則有鴻鉅之才一本于虛中之心而出自可應變而不窮也中孚以利貞乃應乎天也中孚以利貞者以中孚之理无私无為天之道也孚出于貞則意見不着情識不生乃應乎天而合也象曰澤上有風中孚君子以議獄緩死風感水受彼此相入中孚之象也君子體之以用獄而致夫至誠惻怛之意恐其犯于不得已與陷于不自知于是議獄于可死之中而務求其生即求其生而不得亦不忍遽使就辟姑緩其死以待議如此則中孚之意溢于刑獄中矣初九虞吉有他不燕中孚之道貴審乎初初以陽剛應四柔正所當信者業已度其可信而一意信之是始合以正徳性事業借為典型吉之道也如有他焉則二三之心非所以定交而成其孚矣寧得燕安乎象曰初九虞吉志未變也初以虞而得志正以私情未起而從正之志未變也初當决其志矣九二鳴鶴在隂其子和之我有好爵吾與爾靡之二五中孚相應是為臣者幽隠之誠素積于中而君亦以誠應之為鹤鳴子和之象賡歌喜起欲間不能此豈私情之所致哉盖懿徳良貴人所同好二既有之五遂戀之天機之自動者天理之自孚也分雖君臣情同父子一徳之孚如此象曰其子和之中心願也五之孚二若子和者實出中心之願而无所强故不期和而自和也六三得敵或鼔或罷或泣或歌三以隂居悦極浮躁不常者也乃與上九信之極者相應以此之无恒應彼之固執適與相敵為得敵之象已既无主人又无藉所以作止无定或鼔或罷喜怒无常或泣或歌此誠人而无信不知其可也象曰或鼓或罷位不當也三之或鼓或罷豈敵之咎哉由位不當已无中孚之徳故惟所信是從而作輟无恒也六四月幾望馬匹亡无咎位近于君居隂得正是徳位兼隆如月幾望此正衆附黨集之時與初相應初方信之而四即能絶去私交一心以信于五如馬亡其匹自无危疑之咎象曰馬匹亡絶類上也馬匹亡者豈猶有係戀之情哉初雖其類四能絶之故能一心于上也九五有孚攣如无咎五為孚主而以健正之徳下應九二之賢和以中心靡以好爵心徳相固䜛邪不能間焉象如攣如則上下交孚化邦之治成矣无咎象曰有孚攣如位正當也有孚何以攣如由五有中孚之徳而當尊位故能與二交孚而无間也豈徒以迹相靡也哉上九翰音登于天貞凶天下事理常與時勢上下而不可膠于一定上九居信之極而不知變象猶翰音非登天之物而必欲登之者然以是為貞則必拂于理勢反足敗其信矣凶象曰翰音登于天何可長也信之所以能久者以能通其變而不窮耳上今翰音登于天則信非所信矣滯而不通豈能久哉艮下震上小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉隂多于陽故為小過夫所過者小則隂柔之人于人无所忤于事无所拂故為小過隨其才力所行自可无碍亨然其所為必因時合宜安于分義之貞乃為利耳利貞何如陽大隂小小其貞也陽上隂下下其貞也處小過者當思用柔非幹理之才但可小事而為吾所能為不可大事而為吾所難為即小事亦不可過甚尚必收斂退抑不居亢而居卑如飛鳥遺音下而不上乃為守貞而行適其宜事无不善大吉彖曰小過小者過而亨也小過而曰亨者以卦體隂多于陽是分處其小而勢過于大因其過而善用之亦可有為而亨也過以利貞與時行也柔得中是以小事吉也小過亨矣必以利貞者以小過之時分不可過理當慎宻故不敢圖大不敢處上貞也即時也時所當然與之偕行也可小事者二五以柔居中雖柔非任事之才而得中非一于柔弱尚能隨分而為所當為是以小事吉也剛失位而不中是以不可大事也不可大事者以三四二爻剛似有圖大之才而失位則權去而无任事之位不中則徳薄而昧時措之宜安可大有所為是以不可大事也有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也何以取飛鳥也卦體内實外虚如鳥張兩翼有飛鳴之象焉詞曰飛鳥遺之音不宜上宜下大吉者以小過之時理宜謙抑若驕亢而挾一上人之心則非其分而忤于時為逆若卑巽而懐一下人之心則得其常而合于時為順所以不宜上宜下大吉象曰山上有雷小過君子以行過乎恭喪過乎哀用過乎儉山上有雷聲雖離地未升于天小過之象也君子以時當小過不能為驚世之事但就一身之中无關天下國家之大者皆小也皆可以過也故于行已也寜過乎恭毋過乎傲但不過而至于足恭之甚于居喪也寧過乎哀毋過乎易但不過而至于滅性之甚于制用也寜過乎儉毋過乎奢但不過而至于吝嗇之甚此皆過以利貞與時行也過而不過深合小過之義矣初六飛鳥以凶小過之時凡事只因收斂初以隂柔躁妄之性上應九四權勢之交又當過盈之時輙欲妄動志亢氣揚如鳥之飛上而不下則逆而不順取敗招尤其凶必然象曰飛鳥以凶不可如何也凡人凶害未有不可解免者今初居下即以飛而取凶其自恃驕亢不可救矣可如何哉六二過其祖遇其妣不及其君遇其臣无咎六二柔順中正為純徳之臣其進而事君也過三四而遇六五是不入强臣之黨而惟從柔順之君心无驕亢節秉順恭有過祖遇妣之象焉如此則不凌迫其君而適得其為臣之分有不及其君而遇其臣之象又何専權逼上之咎象曰不及其君臣不可過也二之不及其君者非媚主也君尊臣卑原有定義臣而過君小則有専恣之嫌大則有僭逼之罪斷斷乎其不可也九三弗過防之從或戕之凶九三剛正君子衆隂所欲害者乃自恃其剛不肯過為之備則小人得以乗間而入為其中傷而不自覺從或戕之變生意外凶不免矣象曰從或戕之凶如何也從或戕之凶莫知所由來且不知所底止凶之甚也君子可不過為之防哉九四弗過遇之无咎往厲必戒勿用永貞大臣當過之時以剛處柔得宜下之道无咎弗過于剛而傲寧過于柔而恭適合小之宜矣若以剛往必以亢取厲所當戒也然亦時適當戒耳若因戒往厲而永執此柔以為常則太柔必廢咎所不免勿用永貞可也象曰弗過遇之位不當也往厲必戒終不可長也弗過遇之以剛而居柔為位不當在小過時獨為適合其宜也往厲必戒以往則過剛取敗而不可久所當戒也六五宻雲不雨自我西郊公弋取彼在穴五以无才之君居崇髙之位又當隂過将衰之時不能有為于天下有宻雲不雨自我西郊之象是在已固不能為矣而乃弋取以為助者又六二之隂柔以无能之臣輔不振之君猶鳥之在穴非弋之所能取者也兩隂相得其不能濟大事可知象曰宻雲不雨已上也宻雲何以不雨惟以才弱實由居尊而挾勢太髙不能下賢以求輔也上六弗遇過之飛鳥離之凶是謂災眚以隂居動體之上處隂過之極凡立心行已皆越分自髙弗遇合乎時宜而過之甚者如鳥之飛而且逺凶何如哉天人交忌災眚洊臻是之謂矣象曰弗遇過之已亢也小過之時不宜上宜下也上不遇而又過之其自處已亢矣上且不可况至亢乎宜災眚之並至也離下坎上既濟亨小利貞初吉終亂水火相交各得其用六爻之位各得其正其在人事是能協力夾輔而又處置得宜故為既濟濟而曰既盛極伏衰其亨亦小甚可畏也必敬天勤民不忘戒懼常守其貞乃為利焉所以然者當濟之初心恒敬畏得吉至于終人情漸怠以慢易致亂矣可見知懼則保恃滿則傾保邦未亂全在于貞安可不慎終如始乎彖曰既濟亨小者亨也既濟亨者盖時當既濟其盛已過惟事之小者尚可亨也利貞剛柔正而位當也利貞者卦之六爻以剛居剛以柔居柔各正而當位則剛能勵精圖治而不好大以生事柔能持重守成而不因循以滋弊此保濟之貞所當守也初吉柔得中也初吉者時當濟初六二柔而得中有持重之心无廢弛之失故保濟而吉終止則亂其道窮也終止者非終必亂也盖既濟之終人有止心是憂勤輟而怠荒生未有不致亂者治道于是窮矣安可不貞象曰水在火上既濟君子以思患而豫防之水火相交各得其用既濟之象也君子體之以既濟雖非有患之時而患每生于既濟之日其患之生也每隠而不及覺故貴于思思者戰兢恐懼思其終也又卒而不及持故貴于防防者謹㣲杜漸防其始也如是則有備无患濟可長保矣初九曳其輪濡其尾无咎既濟之初正逸欲未萌止心未起誠能凡事敬畏不敢輕動如車曳輪不前而任事慎重如狐濡尾不濟而慮患周詳則謹慎不敗无咎之道也象曰曳其輪義无咎也車以輪而行曳之則不行矣保濟者如此其謹其无終亂之咎宜也非倖也六二婦喪其茀勿逐七日得二以文明中正之徳上應九五剛陽中正之君宜得行其志而九五居既濟之時不能下賢以行其道如婦喪其茀而失其所以行也然中正之道不可終廢二不枉道求合而惟養晦俟時自有以來明主之求終得行其志故為勿逐七日得象曰七日得以中道也七日得者以二有中道也中道在我保濟者必求之故勿逐而自得也九三髙宗伐鬼方三年克之小人勿用以剛居剛當既濟時赫然而討不服有高宗伐鬼方之象然兵不可輕舉必毋希近功久而後克又當慎于擇将勿用小人以致窮黷甚矣師不可輕舉而将不可妄用也象曰三年克之憊也用兵必至三年能克師老財匱困憊甚矣可輕用乎六四繻有衣袽終日戒以柔居柔是小心敬畏之大臣也常思承平日久隠禍恒伏于致治之畧既无不具而思危之念尤不敢懈如乗舟者防繻已有衣袽而又終日戒焉可謂深于保濟者矣象曰終日戒有所疑也既豫防矣而猶終日戒者豈漫為无益之憂哉其心之所圖惟具見有不得不疑畏者在也九五東鄰殺牛不如西鄰之禴祭實受其福五當濟時盛極将衰天命人心皆莫之與雖居尊位不如二之得時天與人歸實有以凝之為東鄰殺牛其祭雖盛不如西鄰薄祭實受其福之象天豈私人人實有以受之耳象曰東鄰殺牛不如西鄰之時也實受其福吉大來也東鄰殺牛不如西鄰禴祭非位不如二時不如二也實受其福正以二能得時福祉方來未艾也上六濡其首厲既濟之極險體之上正終亂之時乃以隂柔處之惟務因循不知敬畏為狐涉水而濡其首之象危之道象曰濡其首厲何可久也上當終亂之時振作圖之猶恐不濟今以因循濡首喪无日矣豈可久乎坎下離上未濟亨小狐汔濟濡其尾无攸利未濟事未成之時也為卦水火不交不相為用是人心未協卦之六爻皆失其位是人謀不臧事无所濟故為未濟未濟有得濟之機有必濟之理亨然将濟者時乘時者人須老成持重敬慎圖功方克有濟若使紀綱稍振法度粗舉而即繼以輕鋭怠忽如小狐幾濟而濡其尾則治卒廢弛終于不濟无攸利彖曰未濟亨柔得中也未濟而亨豈徒天運哉盖未濟之時剛猛則僨事柔弱亦隳功今六五以隂居陽則柔既小心慎宻而得中又能處置合宜故能濟所未濟而亨也小狐汔濟未出中也濡其尾无攸利不續終也雖不當位剛柔應也小狐汔濟治貴治始尤貴圖終始雖有為而時事方殷未出險難之中也濡其尾无攸利怠忽旋生幾成而敗不能繼續以求濟于終也然天下事将逐已乎此特人之不善濟耳卦之六爻雖不當位而謀猷未臧然剛柔皆應則同心協力可以共濟何至濡尾不續終哉象曰火在水上未濟君子以慎辨物居方水火未交炎者炎而潤者潤不相為用未濟之象也君子以天下未濟物之倒置者多矣于是慎以辨之因器命名緣分定制使親疎貴賤各得其序尊卑大小各安其分則陽居陽位隂居隂位各執宜居之方民志定而世可濟矣初六濡其尾吝隂柔居下當未濟之初是无任事之才而又值難濟之日少年新進不能度勢量力急于求進而不能濟為狐涉水而濡其尾之象可羞吝也象曰濡其尾亦不知極也初以始進而即濡尾豈特時之難濟哉亦由不能自量昧于敬慎也九二曳其輪貞吉二以才臣應五柔主幾于迫矣幸其居柔得中為能安分守禮事无耑成心无欲速如車曳輪不進則得臣道之貞而有濟世之吉象曰九二貞吉中以行正也二以貞而得吉可謂能行正矣豈勉為行哉由其宅心中順故能行為臣之正道也六三未濟征凶利涉大川隂柔而不中正无經綸之才者而當未濟之時獨往以濟鮮不仆也凶然以柔乗剛有可倚仗之人将出乎坎又有可圖之㑹若能取資于陽剛之人乗時以圖共濟則未濟可濟何涉川之不利哉象曰未濟征凶位不當也濟世須有才徳三以菲才凉徳而往未有不敗宜其凶也九四貞吉悔亡震用伐鬼方三年有賞于大國四以大臣責在濟世而以剛居柔是志欲有為而未免于沮喪不貞而有悔也能勉而貞奮發有為則難无弗濟心无弗愜吉而悔亡然反正之功非可因循必以剛决之力作震奮之氣而且功深力久庶柔靡可除壮猷克展為震用伐鬼方三年有賞于大國之象象曰貞吉悔亡志行也四之志在濟時能勉而貞則震奮功深才猷克壮其志可行矣六五貞吉无悔君子之光有孚吉以六居五氣質未純亦非正也然文明之主本體極其虚靈居中應二求賢極其誠懇為能得賢之助以成其徳无歉于心貞吉无悔由是而暢于四肢發于事業文章禮樂煥然一新為君子之光又皆根于實徳而非矯飾于外而有孚焉天下文明何吉如之象曰君子之光其暉吉也君子之光吉豈止一身哉将光被四表格于上下矣上九有孚于飲酒无咎濡其首有孚失是以剛明居未濟之極才既能濟時又将濟人主于此復何為哉惟有真心實意與天下休養无為如孚于飲酒焉无急功罔動之咎然此非漫不事事而一于怠荒也若躭娯不返以至濡首則有孚為是者今失其是矣事終未濟可不戒哉象曰飲酒濡首亦不知節也飲酒而至濡首但知有孚之為是至于是之所在自有節制而不可過者今至失是其不知節亦已甚矣周易文詮卷二
