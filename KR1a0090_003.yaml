body:
  text: 周易文詮卷三元趙汸撰繫辭上傳天尊地卑乾坤定矣卑高以陳貴賤位矣動靜有常剛柔斷矣方以類聚物以羣分吉凶生矣在天成象在地成形變化見矣易畫始于羲皇易詞繫于文周人皆謂聖人之書也不知非聖人自為作也未有易書以前其理已具于造化聖人不過因而發揮之如易有乾坤豈自易始哉天以陽處上地以陰處下其一尊一卑已具健順之理而乾坤定于此矣夫易始于乾坤而因有貴賤剛柔吉凶變化又豈自易始哉凡地與人物之卑者序列于下天與萬物之髙者序列于上而卦爻在上為貴在下為賤者已位列于此矣天與萬物之陽者性常王動地與萬物之陰者性常主靜而卦爻之陽為剛陰為柔者已判斷于此矣以一人之念言之一念向善而衆理咸集一念向惡而衆欲皆歸以類聚也以衆人之品言之善與善交而不入惡黨惡與惡交而不與善謀以羣分也聚分而善則吉惡則凶而卦爻占決之吉凶已生于此矣在天而日月星辰成顯晦之象在地而山川動植成經緯之形而易中之蓍策卦爻陰變為陽陽化為陰者已見于此矣然則造化原有自然之易聖人不過因其理而發揮之耳是故剛柔相摩八卦相蕩伏羲聖人見天地間無往非易不過陰陽兩端其對待之中自含變化之妙是故畫一竒以象陽而稱剛畫一偶以象陰而稱柔剛柔既立變化無窮于是剛摩柔而生太陰少陽柔摩剛而生太陽少陰兩相摩而為四矣太陽與少隂相摩而生乾兑離震太陰與少陽相摩而生巽坎艮坤四相摩而為八八卦于是成矣此易之小成也由是以乾兌離震為主各以八卦推蕩其上自乾至復三十有二陽卦生焉以巽坎艮坤為主各以八卦次第推蕩其上自姤至坤三十有二陰卦生焉六十四卦于是成矣此易之大成也至此則易道大備所謂乾坤一定而貴賤剛柔吉凶變化無不備于其中矣鼓之以雷霆潤之以風雨日月運行一寒一暑聖人既本剛柔以作易則天地間無非易理之燦著也以變化之成象者言之若雷霆之鼓動即陰陽之搏擊也風雨之滋潤即陰陽之和暢也日月運行之不息即陰陽之推遷也寒暑循環不已即陰陽之代謝也是為象不一總之陰陽也即此剛柔摩蕩之理也乾道成男坤道成女以變化之成形者言之陽而健者乾道也凡得陽之多者皆屬乎乾其所成為男體一而實性動而健也陰而順者坤道也凡得陰之多者皆屬乎坤其所成為女體二而虛性靜而順也是為形不一總之一陰陽也亦此剛柔摩蕩之理也乾知大始坤作成物其理之散見于造化如此豈特成男成女已哉乾天也有父道焉氣始其形理始其性盡物皆主宰而資姑之蓋知大始者也坤地也有母道焉氣成其形理成其性盡物皆作養而成就之蓋作成物者也乾以易知坤以簡能然其知始作成豈有難且煩乎易簡而已夫乾知大始是物物無不始知若難矣然乾健而動氣至即行一始即始絶無等待絶無留難何易如之坤成大始盡物成之能若煩矣然坤順而靜凡其所行皆從乎陽而不自作事無專成為必有終何簡如之然則乾坤之用雖大要不外此易簡之理也易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可久則賢人之德可大則賢人之業夫乾坤有易簡之妙而體之則存乎人吾人之心原本乾始坤成合下自有易簡人人皆有易簡誠能法乾之易知以存心而克去艱險則明白坦夷盡人皆可知矣則易知法坤之簡能以處事而絶去紛擾則徑直要約盡人皆可能矣則易從易知則萬心一心其心之無弗同者皆吾親也所知皆親不必其附已矣易從則衆力為力其力之無弗同者皆吾功也所從皆功不必其身助也惟有親則心一不二其精神更無古今易之凝于心者豈不可久惟有功則成不獨成其分量自足兼善簡之擴于事者豈不可大可久則本體不息即至誠無息德為過人之德可大則分量無方即廣大無方業為過人之業而人之所以法乾坤者可謂賢于人逺矣易簡而天下之理得矣天下之理得而成位乎其中矣然則天下之理一易簡而已盡聖人體易之成一盡易簡而亦盡矣誠體易簡至于久大則易純乎易簡純乎簡一易簡而天下之理不遺于吾心而無弗得矣天下之理得則天得易以成位乎上地得簡以成位乎下人得易簡以成位乎中則體道之極功聖人之能事可以與天地參矣可見易理即天地之理天地之理即吾身之理人當求易理于天地亦惟求易理于吾心而已矣右第一章聖人設卦觀象繫辭焉而明吉凶自伏羲畫卦以來吉凶之理已默示矣文周聖人何又繫以辭哉蓋以有畫無文民用弗昭于是取所畫六十有四之卦而布列之統觀一卦則內外貞悔時有消息而係彖辭以明全體之吉凶析觀六爻則乘承比應位有當否而係爻詞以明一節之吉凶蓋聖人緣象以係詞使人因詞以求象則趨避之機決而利用之功大矣剛柔相推而生變化然聖人何以觀象而係辭蓋詞雖因象而係而象實因變而生卦爻中之竒偶雖不過剛柔二畫然非膠于一定者剛進之極柔以時推之則陽化隂而化生柔退之極剛以時推之則隂變陽而變生其變不窮則其象不一此聖人所以觀象而繫詞也是故吉凶者失得之象也悔吝者憂虞之象也然則聖人所作之易皆由剛柔不易之理推之其詞之模寫人事之紛紜者有不極其備乎詞之吉者即人事順理而得之象也辭之凶者即人事逆理而失之象也辭有自凶而趨吉之悔者即人事既失之後困心衡慮而為憂之象也辭有自吉向凶之吝者即人事未失之先安意肆志而為虞之象也詞之符于人事如此變化者進退之象也剛柔者晝夜之象也六爻之動三極之道也其變之闡發造化之精藴者有不極其備乎象變之中柔變而趨剛者即氣機退極而進之象也剛化而趨柔者即氣機進極而退之象也既變而剛即陽明用事而為晝之象也既化而柔即隂晦用事而為夜之象也至若剛柔變化流行于一卦六爻之間而九六迭運一剛一柔變之化之所謂動也其即三極之道乎太極之理一也而天地人各得之為三才之至極是其動于初二即地道剛柔之交錯也動于三四即人道仁義之並行也動于五上即天道隂陽之迭運也何動非道何道非極變之符乎造化如此是故君子所居而安者易之序也所樂而玩者爻之辭也夫易而歸之道則凡易之所在皆道之所在矣而君子可不學乎是故身之所處為居而安而不遷者在剛柔變化之易序至變之中有不變之理次第不紊不違其宜則一身皆易矣心之所契為樂而玩而不厭者在吉凶悔吝之爻詞有言之中寓無言之藴稽實待虛曲盡其變則一心皆易矣是故君子居則觀其象而玩其辭動則觀其變而玩其占是以自天祐之吉無不利惟君子身心不離乎易故動靜無間其功方居而未及卜筮也道著為象而詞以泄之則觀其卦爻之象而玩其吉凶之詞是居安樂玩無間乎靜矣及動而謀及卜筮也道呈為變而占以示之則觀其卦爻所值之變而玩其吉凶所示之占是居安樂玩無間于動矣如此觀玩則所趨皆吉所避皆凶一動一靜俱無違理則三極之道皆由我立天且弗違其居其動寧有不吉利乎是以自天祐之吉無不利此君子體易之極功也右第二章彖者言乎象者也爻者言乎變者也畫卦繫詞以後文周聖人又復諄諄而繫以彖與爻者何哉卦之既立意雖已盡而人不能得意忘象故文王觀象于卦而係彖辭彖者言乎一卦之象也與全體之竒偶純雜內外消長像乎物之宜者莫不統言之以示人也周公觀變于爻而係爻詞爻者言乎六爻之變也舉一節之隱顯貴賤當否比應趨乎時之變者莫不析言之以示人也吉凶者言乎其失得也悔吝者言乎其小疵也無咎者善補過也彖言象爻言變則吉凶悔吝無咎之詞已備之矣其言吉凶者言乎象變中有時消而位不當為失者失則從逆而凶有時息而位當為得者得則從順而吉也詞曰悔吝者言乎象變中剛柔雜居善惡未定有向于得而未得尚有小疵則自訟而悔生向于失而未失既有小疵則招尤而吝生也詞曰無咎者言乎象變中或時位未善才德未純足以致咎者是過也然一節之善或能更改而補救之則過復無過而咎可無也是故列貴賤者存乎位齊小大者存乎卦辨吉凶者存乎辭象變闡于卦爻如此而詞可無係乎是故爻固言乎其變已而所以列其孰為貴孰為賤者則存乎六爻之位蓋內外承乘而貴賤分焉彖固言乎其象已而所以齊其孰為小孰為大者則存乎六十有四之卦蓋陰陽淑慝而大小齊焉夫貴賤小大雜陳易于是乎有吉凶矣而所以辨其孰為吉孰為凶者則存乎卦爻之辭蓋詞有得失而吉凶辨焉憂悔吝者存乎介震無咎者存乎悔辨吉凶者存乎詞矣詞有悔吝辨于吉凶之間者也悔吝固言乎其小疵然不可因小疵而自恕必憂之而防微杜漸存乎善惡初分之介則不至悔吝矣詞有無咎辨于轉凶為吉之後者也無咎固能補過然欲動其補過之心必震之而警戒振動存乎悔悟創懲之幾則不終于咎矣凡此皆所以辨吉凶也而詞之所係不大乎是故卦有小大辭有險易辭也者各指其所之合而觀之無非詞也是故卦分陰陽雖有小大詞分淑慝雖有險易要非卦自卦而辭自辭也辭也者各推其卦之所向以示耳所之小則詞因係以險使天下懈怠有震懾之心所之大則詞因係以易使天下危疑有自全之策其所以不得不係其詞者正辨吉凶以示天下知趨避也聖人之情見乎詞矣右第三章易與天地準故能彌綸天地之道易之道其大乎天地一陰陽也易以道陰陽其與天地蓋齊準者也天地所以定位之理天地之道也惟與之準故能彌綸天地之道其兼陰兼陽有以聫合其全體而無一理之或遺即彌綸之中其分陰分陽又有以條析其一節而無一毫之或紊凡性理命無不具于其中信乎易與天地準也仰以觀於天文俯以察於地理是故知幽明之故原始反終故知死生之説精氣為物遊魂為變是故知鬼神之情狀惟易能彌綸天地之道故聖人用易以盡天地之道彼幽明死生鬼神理之最難知也而其道總不外乎陰陽幽明者陰陽之顯晦也聖人以易之理仰觀經緯之天文俯察一定之地理則知天文如夜與下地理如北與深幽也所以幽者陽化陰也天文如晝與上地理如南與髙明也所以明者陰變陽也其故以易而知之矣死生者陰陽之聚散聖人以易之理推原人物何自而始反觀人物何為而終則知始之生者氣聚而凝陰變陽也終之死者氣化而盡陽化陰也其説以易而知之矣鬼神者陰陽之屈伸聖人以易之理究其陰精陽氣聚為有象而成物魂魄降散入于無形而為變則知物者自無而有神之來而伸也陰變陽也變者自有而無鬼之往而屈也陽化陰也其情狀亦以易而知之矣與天地相似故不違知周乎萬物而道濟天下故不過旁行而不流樂天知命故不憂安土敦乎仁故能愛幽明死生鬼神而皆知之于易是易道即天地之道也聖人體易以知之則心通造化全體太極矣天地與我更無彼此之間我與天地相似故天地亦自不違于我何也天地之道知仁而已聖人所以盡性者亦惟知仁而已聖人以易而盡其仁盡其知焉知足以燭隱而照臨之內又溥之以道濟之仁則有仁以實乎其知而知不過于空虛矣知足以行權而圎通之中究不失其中正之則則有仁以貞乎其知而知不流于變詐矣吾密而證其知優遊于仁義忠信之天理洞燭乎吉凶禍福之命數泰然自適毫無障礙既樂且知故不憂吾深而窺其仁素位自安隨處而皆能下襲慈祥懇篤無物不被其周浹肫然至厚足以有容既安且敦故能愛聖人備體仁知如此信乎與天地相似也範圍天地之化而不過曲成萬物而不遺通乎晝夜之道而知故神無方而易無體夫聖人與天地相似如此而參贊之功有不與之同用乎天地之化不能無過聖人以易而範圍之如理陰順陽體國經野使天有常運地有常經而不過乎中天地中之萬物不能自成聖人以易理成之如于人則正德厚生于物則撙節愛養使人無失性物無失養而無少缺遺焉至合天地萬物而總之一書夜之道至難知也聖人又通乎其道而知于晝而夜夜而晝其所以循環無端密移無迹者無不與之冥契而符合焉如是則其主宰不測其流行不窮聖人之心一神也一易也神即易而寓以方求之而不得易隨神而在以體執之而亦不得此用易以彌綸天地之道信乎易與天地準矣右第四章一陰一陽之謂道道之名由來尚矣由今言之果何謂乎其一陰一陽之謂乎陰陽不可謂道獨陰獨陽亦不可謂道惟太極之靜固一陰矣靜極而動又一陽焉陰陽迭運循環無端是之謂也繼之者善也成之者性也是道也原于天而具于人陰陽流行初無間斷者也試以天人授受之際言之氣之繼靜而動理未著于人物渾然純粹所謂善也陽也及氣之凝成而為人物所受氣又依理而立所謂性也陰也何非道也仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣然善性本無不全而氣稟容有或異試以人之稟受言之仁者得陽之動為多其所見偏于發越則謂道盡于仁不知仁外有知也知者得陰之靜為多其所見偏于收斂則謂道盡于知不知智外有仁也至于陰陽稟雜者百姓也日用之間囿于仁知而不著不察全不知有仁知焉故君子仁知合一之道鮮矣然道曷有偏哉顯諸仁藏諸用鼓萬物而不與聖人同憂盛德大業至矣哉然氣稟容有所偏而造化則無不全試以氣機言之天地以生物為仁方其由閣而闢發生之功自內達外而顯諸仁焉天地以生物為用當其由闢而闔機緘之妙自外入內而藏諸用焉顯仁藏用所以鼓萬物之出入也然造化無心與聖人有心而憂天下之不得遂其生成者不同矣顯仁者德之發也仁顯而萬物以出德斯盛矣藏用者業之本也用藏而萬物以入業斯大矣盛大之出于無心如此其德業不至矣哉富有之謂大業日新之謂盛德德業有迭運之機又有互根之妙焉夫論業恆于外何為藏用蓋造化無無體之用藏用之時萬物生意包蓄無遺所有甚富其施必𢎞故因內知外所以直謂之大業也論德恆于內何為顯仁蓋造化無無用之體顯仁之際萬物生機發舒殆盡日日增新其源必深故因外知內所以直謂之盛德也盛德陽也大業陰也一陰一陽道不在此乎生生之謂易合而言之皆陰陽也即皆易也何謂易陰極則陽生陽極則陰生生生而不已即循環而無窮是之謂一陰一陽之道成象之謂乾效法之謂坤夫易為生生之理則天地間何物非陰陽之生生乎物之初生胚胎略成倣佛可象此則輕清未形屬乎陽也是之謂乾既生之後形色已呈有法可見此則重濁有迹屬乎陰也是之謂坤乾坤成而易肇乎其先此道之著于生物者然也極數知來之謂占通變之謂事生生之易豈獨氣機即人事亦然日用間無事非陰陽之生生也事未來而抱著問易究極陰陽老少之數求卦爻之所值而因以知未來之吉凶此則決疑通志是之謂占及占既決據所決吉凶之數以避以趨而通于事變之際此則定業成務是之謂事夫占乃事之未定屬乎陽也事乃占之已決屬乎陰也占事因而易行乎其中此道之著于人事者然也陰陽不測之謂神合天地人物觀之天地間無一非陰陽也又無可執為陰陽也謂陰也而陽在焉謂陽也而陰在焉謂陰陽無在也無而未常無也謂陰陽有在也有而未常有也不可象求不可器執兩在不測非天下之至神其孰能與于此乎此正一陰一陽之謂道也右第五章夫易廣矣大矣以言乎遠則不禦以言乎邇則靜而正以言乎天地之間則備矣夫易之為書非若他書之少藴蓄而隘規模也其中含蓄無遺蓋甚廣矣其外包括無盡蓋甚大矣蓋易不外陰陽而陰陽兼體事物以言乎逺則雖千載六合此理無所不到不可得而限也以言乎邇則雖瞬息几席此理不待安排而咸正無缺也以言乎天地之間則精及無形粗及有象萬事萬物之理無不悉備此易所以廣大也夫乾其靜也専其動也直是以大生焉夫坤其靜也翕其動也闢是以廣生焉然易之廣大何自而來本乎乾坤而得之者也夫乾天也靜與坤别生物之心專一而不他動與坤交生物之用直遂而不撓以乾一之氣下行于坤兩之中是以萬物皆資以始而其質大生焉坤地也靜與乾别生物之心翕受而無遺動與乾交生物之用敷闢而無隱以坤二之量順承乎乾一之施是以萬物皆資以生而其量廣生焉乾坤之廣大如此易固摹寫于乾坤者也廣大配天地變通配四時陰陽之義配日月易簡之善配至德夫易之廣大由于乾坤則易即乾坤矣其理之大一天之無不包而大也其理之廣一地之無不有而廣也其為配合無間者也由是而推四時錯行于天地者也而廣大中之變通配焉其剛柔之迭運即寒暑之推遷也日月貞明于天地者也而廣大中隂陽之義配焉其對待之流行即代明而不息也人之至德賦豫于天地者也而廣大中易簡之善配焉其確然易隤然簡者即人之存心健而易處事順而簡也總之一易之廣大配天地也故曰夫易廣矣大矣右第六章子曰易其至矣乎夫易聖人所以崇德而廣業也知崇禮卑崇效天卑法地夫易之為理塞天地通性情其至極而無以加乎常于聖人用易見之蓋天下德崇業廣莫如聖人而易則聖人所以崇之廣之也德起于知若識見有不髙明則德何能崇聖人以易理窮之于心則本體昭融而知崇矣業基于禮若踐履有不篤實業何能廣聖人以易理體之于身則躬修切實而禮卑矣然知不徒崇必如天之髙明無一理不在其洞悉之中禮不徒卑必法地之博厚無一理不在其體驗之內所以德崇而業廣也天地設位而易行乎其中矣成性存存道義之門聖人之德業崇廣如此自有上下與天地同流之妙焉彼天地設位于上下而其間陰陽之屈伸變化行乎其中矣此天地德業之崇廣也聖人知崇如天禮卑如地則其本成之性原于天者存而又存自是率之為道且宜之為道中燦然之義千變萬化皆由此出此聖人之德崇業廣也夫聖人德業侔于天地而皆有資于易則易不其至矣乎右第七章聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象易之作也卦必有象象何謂也羲皇聖人仰觀俯察有以見物理之至賾莫不有陰陽至一之理存焉于是以至賾之物各有形容比度于未畫之先得其物之所宜則象之于既畫之後如卦之純竒純偶則象純陽純陰之物宜卦之雜竒雜偶則象雜陰雜陽之物宜是象乃象天下之至賾也故謂之象聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻易必有爻爻何謂也周公聖人遠求近取有以見人事之至動亦莫不有陰陽至靜之理存焉于是觀理之統聚求一理之可通即通處之可行者立經常之典禮循典禮者則係辭以斷其吉逆典禮者則係辭以斷其凶是爻乃效天下之至動也故謂之爻言天下之至賾而不可惡也言天下之至動而不可亂也象有見于賾而立是象著示天下之至賾宜若可惡然一物一理則名雜不越至賾之中有至一者存玩之而不厭也爻有見于動而立是爻著示天下之至動宜若可亂然一事一理則事肆而隱至動之中有至常者存截然而不亂也此易道之妙所以為可用也擬之而後言議之而後動擬議以成其變化夫象不可惡爻不可亂言動變化之理無不備矣而欲用易以成之者可不擬議于斯乎將有言也必由象詞以明所言之理由變占以決所言之機比擬于易而後言將有動也必由象詞以明所動之理由變占以決所動之機商議于易而後動如是則隨時從易言不膠于一定動不滯于一隅語默作止無不各當其可而言動之變化成矣易之可用如此君子可不用易乎鳴鶴在陰其子和之我有好爵吾與爾靡之子曰君子居其室出其言善則千里之外應之况其邇者乎居其室出其言不善則千里之外違之況其邇者乎言出乎身加乎民行發乎邇見乎遠言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不慎乎試舉易之象辭所當擬議者言之如中孚九二所云蓋言誠信感通莫大乎言行也故君子居室之間雖非大廷廣衆之地使出其言合乎實理而善則千里之外信而應之況其邇者乎使出其言悖乎實理而不善則千里之外疑而違之況其邇者乎觀言則行可知是則言根于心特出乎居室之身而民罔不屬耳行基于言特發乎居室之邇而民罔不屬目感應之速猶樞一動而户即闢機一動而矢即發言行二者誠君子之樞機也故樞機之發善則遠邇皆應而為榮之主樞機之發不善則遠邇皆違而為辱之主豈惟民有應違善則降祥天地亦應不善降殃天地亦違君子之所以動天地者亦在是也安得不兢兢戒慎而以中孚為主乎擬議斯爻可以知孚信之道矣同人先號咷而後笑子曰君子之道或出或處或默或語二人同心其利斷金同心之言其臭如蘭如同人九五所云蓋言大同之道不以迹而以心也若據迹而觀或出而事君或處而獨善或默而藏辨或語而論斷似不同矣然自其心觀之則出非徇君處非忘世默非免禍語非沽名二人之心有不同乎惟其心同則讒莫能間雖金至剛其利可斷也以同心而發于言則意氣相投雖蘭至馨其臭可擬也宜乎先號後笑也擬議斯爻可以知同心之道矣初六藉用白茅無咎子曰苟錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之為物薄而用可重也慎斯術也以往其無所失矣如大過初六所云蓋言君子敬慎之道也彼物錯于地可以安矣又藉之于茅何有傾危之咎此其心蓋安不忘危慎之至也夫茅之為物至微而藉物則至安其用誠可重也慎斯術而往以求濟則凡所錯置無非萬全之計自無所失矣擬議斯爻可以知處事之慎矣勞謙君子有終吉子曰勞而不伐有功而不德厚之至也語以其功下人者也德言盛禮言恭謙也者致恭以存其位者也如謙九三所云蓋言君子善居功也彼勤于王事可謂勞矣而不矜伐于人及事成而有功矣而不任德于己此乃器識深沈度量宏遠厚之至也則夫所謂勞謙者正言其以功而能下人也此其心何如哉有功與勞皆德也德非不盛而愈欲其盛不伐不德皆禮也禮非不恭而愈欲其恭不謙不可得也凡以致吾恭耳非為位計也然人道好謙自皆不疑不忌位亦因之以保而不失矣擬議斯爻可以知居功之道矣亢龍有悔子曰貴而無位髙而無民賢人在下位而無輔是以動而有悔也如乾上九所云蓋言惟謙可以保位貴變而通之以時不可亢以取悔擬議斯爻可以知持盈之道矣不出户庭無咎子曰亂之所生也則言語以為階君不密則失臣臣不密則失身幾事不密則害成是以君子慎密而不出也如節初九所云蓋言君子慎密之道也惟口出好興戎故亂之所生則言語為之階君為臣謀而不密則啓姦邪之妬而失臣臣為君謀而不密則遭中傷之禍而失身至于利害伏于隱微成敗係于毫忽而不密其謀則人皆忌其成樂其敗而自害其成矣夫失臣失身害成皆亂也而皆階于言之不密言其可不慎乎擬議斯爻可以知慎言之道矣子曰作易者其知盜乎易曰負且乘致寇至負也者小人之事也乘也者君子之器也小人而乘君子之器盜思奪之矣上慢下暴盜思伐之矣慢藏誨盜冶容誨淫易曰負且乘致寇至盜之招也易者愛惡相攻盛衰相變若此爻有釁隙衰弱則彼爻乘變而奪之矣故作易者其知盜之情乎易之解六三所云蓋以負也者無德小人勞力之事也乘也者有德君子所御之器也小人而乘君子之器則處非其據適啓謀利者覬覦之心盜思奪之矣所以然者蓋以小人竊位上則慢君而不忠下則暴民而不仁盜思執詞以伐之矣夫奪之伐之雖不免于為盜而致其奪與伐者是猶慢藏財物所以教人盜我女子妖冶其容所以教人淫我易曰負且乘致寇至正言六三無德據位而為盜之招也擬議斯爻可以知居位之道矣右第八章天一地二天三地四天五地六天七地八天九地十伏羲之時有龍馬負圗出河其上有自一至十之數人知其為河圗之數而不知此即天地之數也天純陽其數竒而圗之一三五七九皆竒則皆天數也地純陰其數偶而圗之二四六八十皆偶則皆地數也河圗之具天地全數如此天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也是數也造化之全功無不該焉彼一三五七九屬天是天數五也二四六八十屬地是地數五也五數在圗各有定位是五數即五位也位之一與二三與四五與六七與八九與十竒先偶後其序不紊生成之功各専其一矣然相得之中自是有合如一與六二與七三與八四與九五與十竒施偶成其交無間生成之功妙合于兩矣此特以其分數言之耳若積天之五竒其數二十有五積地之五偶其數三十合而計之則五十有五而相得有合之數全始得以妙其用天一生水而六化成之地二生火而七變成之天三生木而八化成之地四生金而九變成之天五生土而十化成之是變起于天者化成于地化起于地者變成于天所以成變化者此數成之也一二三四五生數也即伸而神也六七八九十成數也即屈而鬼也然始生雖來而伸既生則往而屈既成雖往而屈方成則來而伸是所以行鬼神者此數行之也圗數之功用如此大衍之數五十其用四十有九分而為二以象兩挂一以象三揲之以四以象四時歸竒於扐以象閏五嵗再閏故再扐而後挂圗數具造化之全功則聖人之筮數皆本于是其衍之以作易以中宫之五為衍母以十為衍子以五之一而乘其十則為小衍以五數各乘其十則為大衍大衍之則五十矣是蓍䇿五十之數皆河圗中宫來也衍之將以用之其用以揲蓍止用四十有九蓋虛其一以象太極有一之不用而後四十有九無所不用而圓神無方矣至于所用之䇿左右兩手任意中分宛然兩儀之對待從而取右手之分者挂其一于左手小指之間以象人處天地之中儼然三才之並立挂一之後取其所分之策以四為揲又象四時之運行以成嵗焉四數之後取左右所零之䇿扐于左手中三指之兩間以成變又象積月之餘日而成閏焉然扐而至再者何也蓋一嵗之中氣盈六日朔虛六日積三嵗之餘必多三十六日以三十日為一閏餘六日必待五嵗之餘合之又為一閏是為五嵗再閏故揲蓍之法亦必再扐而後别起一挂以為後揲之端是蓍法之再扐亦厯法之再閏也數之用其妙矣哉乾之策二百一十有六坤之策百四十有四凡三百有六十當期之日蓍既揲矣各有所象也而過揲之餘策亦有所準焉策數由河圗四象而生太陽居一而連九陽數九也太陰居四而連六陰數六也揲蓍三變之末凡四為竒竒用其全餘三竒則九而為老陽是乾爻所餘之策每爻三十有六總六爻計之則二百一十有六凡八為偶偶用其半餘三偶則六而為老陰是坤爻所餘之策每爻二十有四總六爻計之則百四十有四合之凡三百有六十與期之日正相當焉雖一期之中氣盈朔虛或有不同而三百六十其常也以二老之策準之則謂策之揲為四時行可也按策而乾坤之藴可叩矣二篇之策萬有一千五百二十當萬物之數也不特乾坤也通上下經二篇之策凡陽皆乾陽爻百九十二每爻俱以三十六計之得六千九百一十二策凡陰皆坤陰爻百九十二每爻俱以二十四計之得四千六百八策合之萬有一千五百二十與萬物之數適相當焉雖萬物之中氣數形化或有不同而萬其總數也以二篇之策準之則謂策之揲為萬物生可也極數而二篇之會可通矣是故四營而成易十有八變而成卦筮法既合于造化則用之求卦自各有序是故卦始于一變之易而非自成也分二挂一象三歸竒凡四度經營然後或四或五而成一變之竒或九或八而成一變之偶易自此成矣由此一變積之十有八變然後內外以備貞悔以全則成六爻而一卦成矣此大成之卦也入卦而小成然未有內體未立而外體即成者畫卦之序自下而上方三十六營而成九變則三畫已具得八卦中之一卦而內卦已成此小成之卦也十有八變而卦大成正即此而重之耳引而伸之觸類而長之天下之能事畢矣夫卦既成六爻則老少形而動靜異其變可考而知也于是因爻求變或變在動動固可變也或變在靜靜亦可變也引其變之端而展伸之則一卦可變為六十四卦一卦如是諸卦可推因變及變同此卦即同此變即以引伸者觸類而增長之則卦之可變為六十四卦凡四千九十六卦其吉凶無不可見而天下趨避之能事無不畢具于其中矣顯道神德行是故可與酬酢可與佑神矣蓍卦盡變而能事畢其功用何如哉吉凶之道隱于無形不能以自顯也而有筮卦之詞則言象言變不隱于茫昧而道以辭顯矣趨避之德行滯于有迹不能以自神也而人取決于筮則趨之避之民咸用以出入而行以數神矣惟顯且神是故明則有裨于人而受命如嚮儼賔主之相酬幽則有功于造化而開物成務贊神明之不及蓍變之功用如此此能事之所畢也子曰知變化之道者其知神之所為乎合而觀之數法一變化也變化一道也道一神也苟能因數以極其變由法以明其理則知數法之妙皆出于理之自然雖天地聖人有莫知其然而然者其神之所為乎右第九章易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占聖人欲以其道示天下後世而因以其道泄之于易書是道雖易之所固有也而由今言之易有聖人之道四焉四者維何詞占象變是已聖人本道而係詞曲中而不越是議事之定論也故人欲以言商度其事者則取法其卦爻之詞以發言使淺深詳略各得其宜也聖人本道而裁變屢遷而不居是圗事之員機也故人欲以動圗度其事者則取法其卦爻之變以效動使卷舒進退不膠于一也聖人本道而擬象一定而不易是制事之成矩也故人有裁制于心而欲事有定理是謂制器則取法其陰陽老少之象蓋象為變之已定尚之可以成務也聖人本道而決占斷然而不二是臨事之確見也故人有兩可于慮而欲決其所疑是謂卜筮則取法其吉凶得失之占蓋占為詞之既決尚之可以通志也此聖人之道所以有之于易而濟民行者如此是以君子將有為也將有行也問焉而以言其受命也如嚮無有遠近幽深遂知來物非天下之至精其孰能與于此人之所以尚辭占者以其精耳是以君子將有為于一身將有行于天下抱蓍問易而求卦爻以擬議其所行之事易之詞占受人之命隨問隨答如嚮應聲之速凡所問之事不論遠而時地寥濶近而時地現前幽而事幾潛藏深而人心叵測來物之吉凶無不周知而詳應焉此惟辭占之理純粹不雜具于天道民物之故無不究極其精故能至此苟非然者何以稽實待虛存體應用能若是之如嚮無遺哉此以言以卜筮者尚之也參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變其孰能與於此人之所以尚象變者以其變耳君子當問焉以言之時四營成易是為一變乃竒偶所由分于是先以參之各數其左右之所歸後以伍之總數其先後之所扐則其策或八九之多或四五之少皆有以辨之而其變明矣逮三變成爻必有其數乃老少所由别于是即其所參伍者分之左右而交互以稽其變列之低昻而總挈以會其歸則其數或九六為老或七八為少皆有以稽之而其數明矣然參伍以變特一變耳未成爻也通三變而皆參伍則變中竒偶之錯陳剛柔之間雜宛然天地之經緯燦然而成文矣錯綜其數特一爻耳未成卦也極六爻而皆錯綜則數中老少之動靜隂陽之消息宛然天下之事物不易之定象矣此惟象變之理具圓神之德妙屢遷之機極天下之至變故能如此苟非然者何以不滯于隂陽不膠于動靜能如是之成文成象哉此以動以制器者尚之也易無思也無為也寂然不動感而遂通天下之故非天下之至神其孰能與於此然精變之妙何一非神之所為乎凡物有思有為其知識才能超出于萬物之表者方可以通天下之故今蓍龜之易不過一物耳何有于思何有于為方其蓍未揲卦未求詞占象變隱于無迹蓋寂然不動也及其動于分揲挂扐之餘則受命如嚮而來物遂知通變極數而文象畢泄天下之故無所不通此惟詞占至精而精之所通無方象變至變而變之所通無體極天下之至神故能無思而無不思無為而無不為如此也苟非然者寂則必淪于靜感則必滯于動孰能若是其寂而能感哉此易體之所以立而用之所以行也夫易聖人之所以極深而研幾也夫詞占象變皆易也易何以至精至變至神哉聖人為之也吉凶來物隱于無形所謂深也不極之則不出聖人係之詞決之占使深入于冥冥者泄于見聞而無遺是詞占之至精乃聖人所以究極其幽深之理者也隂陽老少渾于未剖所謂幾也不研之則不辨聖人制之變立之象使幾兆于微茫者剖于動靜而不惑是象變之至變乃聖人所以研窮其幾微之理者也而神即寓于精變之中矣唯深也故能通天下之志唯幾也故能成天下之務唯神也故不疾而速不行而至蓋易之為理不能窮究其至鮮能知其微也惟極之而詞占一深也故于幾微曲折無不洞悉玩占之下吉凶明而迷者以開天下之志為能通之惟研之而象變一幾也故雖隂陽老少推移靡定通變極數之後趨避決而怠者以奮天下之務為能成之惟深與幾皆出于自然而神也故其志之通也若或通之務之成也若或成之卒莫知其所以通所以成者其殆不疾而速不行而至乎使非聖人烏能有如是之功用哉子曰易有聖人之道四焉者此之謂也然則通志成務而妙于神易為之也而皆聖人之道為之也所謂易有聖人之道四者正以辭占為聖人所極深而神于通志象變為聖人所研幾而神于成務之謂也不然易道雖具四者安能為天下後世之所尚哉此可見聖人作易之功大矣右第十章子曰夫易何為者也夫易開物成務冒天下之道如斯而已者也是故聖人以通天下之志以定天下之業以斷天下之疑夫易始于畫卦終于係詞必有所用果何為者也蓋易用之可以卜筮以之開物則得告吉失告凶而顓蒙開焉以之處事吉使趨凶使避而幾務成焉以之統天下之理則凡物理之自然事理之當然而謂之道者無不備于吉凶趨避之中丕冒而無遺焉其易之用如斯豈小補哉是故聖人制為卜筮以開物者而通天下之志使人不迷于吉凶以成務者而定天下之業使人不怠于趨避以冒道者而通志以斷其心之疑定業以斷其事之疑使人不眩于義理則其所為切于民用大矣是故蓍之德圓而神卦之德方以知六爻之義易以貢聖人以此洗心退藏於密吉凶與民同患神以知來知以藏往其孰能與於此哉古之聰明睿知神武而不殺者夫易之用雖周于天下而其理實具于聖心是故易之所有惟蓍卦爻方蓍之揲也老少無定動靜無常妙于流轉不滯而兩在不測其德非圓而神乎及蓍所得之卦則得失並存貞悔具備確乎不易之中而有昭然其不爽者其德非方以知乎乃卦所生之爻則時之消息位之當否各具一節變易其説無不備以告人如貢獻者非易以貢乎此易之妙也而聖心先具之矣其中萬理盡澄一私不染若以此三者洗濯其心故方無事斂神知變易之德退藏于靜密寂然不動莫能窺之及其有事其于吉凶憂民不能趨避與之同患故其間吉凶之未萌曰來以退藏之神知之而若符其造化之靈吉凶之一定曰往以退藏之知藏之而若出其胸中之故此皆與民同患之心本于洗心宥密之內自靈自徹何假卜筮而後知也其孰能與此惟古聖人聰明不假耳目睿知不假心思猶神其威武而不假殺伐者始能神其蓍卦爻之理耳苟非其人誰能妙易理于一心如此哉是以明於天之道而察於民之故是興神物以前民用聖人以此齋戒以神明其德夫惟聖人有心易之神知是以上明天道之消息而契吉凶之原下察民故之攻取而洞吉凶之理則知蓍龜泄造化之祕而法可備于致用斯民昧趨避之途而用宜有以開先于是因蓍龜之神以興卜筮使民先事而知吉凶以前民趨避之用然聖人之心豈待卜筮而致齋戒哉其平日退藏無念不致誠敬而于此卜筮之時尤齋而一念不分戒而一念無斁以自考其吉凶之占而知來藏往之德益以神明矣是故闔户謂之坤闢户謂之乾一闔一闢謂之變往來不窮謂之通見乃謂之象形乃謂之器制而用之謂之法利用出入民咸用之謂之神夫聖人明天道察民故以興神物正以神物原于天道而周于民故也造化一氣流行萬物出入之户也時乎靜斂如户斯闔隂之事也謂之坤時乎動顯如户斯闢陽之事也謂之乾從闔而闢氣序相禪有更方互換之義謂之變闔闢往來循環無端有流行不滯之機謂之通乾坤變通而物生于其間矣方其始生影響見端輕清未形謂之象及其既生形質既具已有可見謂之器其于形象之中獨得乾坤之精而為物之最神者蓍龜是也聖人知其可興以前民用于蓍制為四營之法而用以筮于龜制為五行之兆而用以卜古今則之謂之法法既立而民之出者入者皆安于其用有不知誰之所為者謂之神蓍龜之用于是乎周天下矣是故易有太極是生兩儀兩儀生四象四象生八卦聖人作易既有蓍龜以妙其用必有卦爻以立其體是故儀象八卦皆隂陽之變所謂易也易固生生不窮矣必有所以生生之理主宰于其中不有太極乎太極動而生陽則畫一竒以象陽儀靜而生隂則畫一偶以象隂儀太極生兩儀兩儀一太極也陽儀之上加一竒一偶則生太陽少隂隂儀之上加一竒一偶則生太隂少陽兩儀生四象四象一太極也太陽少隂之上各加一竒一偶而乾兊離震生焉太隂少陽之上各加一竒一偶而巽坎艮坤生焉四象生八卦八卦亦一太極也八卦既生則六十四卦特因而重之耳此畫卦自然之序也八卦定吉凶吉凶生大業是八卦也雖未斷以吉凶其間時有消息位有當否則吉凶已默定矣吉凶既定雖未知有趨避而得失之報明可為利用出入之資而趨吉避凶之大業已從此生矣夫孰非太極定之生之乎是故法象莫大乎天地變通莫大乎四時懸象著明莫大乎日月崇髙莫大乎富貴備物致用立成器以為天下利莫大乎聖人探賾索隱鈎深致逺以定天下之吉凶成天下之亹亹者莫大乎蓍龜八卦成而蓍龜之用行矣其功豈小補哉試以天下之大者觀之成象成形皆法象也而法象之大莫大乎天地之覆載往來屈伸皆變通也而變通之大莫大乎四時之推遷懸象于上而其明之昭著莫掩者莫大于日月之代明由其造化而推及于人列爵惟五分土惟三誰非崇髙惟富有四海貴為天子者為尤大智者作法巧者創始誰非制作而備水火動植之物以致斯民之用立小大方圓之器以利天下之民惟聖人竭耳目心思之巧通民情世故之煩豈不大乎至若理之賾亂者而探其至一幾之隱伏者而索其先兆深入于性命理數而鉤之使出逺隔于時地世數而致之使近于以定吉凶而失得之報明成亹亹而趨避之不倦則莫大乎蓍龜蓍一筮而八卦之象即著龜一卜而五行之兆即明所以前民用者無以加矣是故天生神物聖人則之天地變化聖人效之天垂象見吉凶聖人象之河出圖洛出書聖人則之然易雖作于聖人而其原實本于天地是故天生蓍龜神物蓍具圓神之德龜具伏藏之智聖人則之以立其占蓍用之筮龜用以卜不過因天之所生興神物以前民用也由是卜筮中有變化非無自也在天成象在地成形各有變化聖人效之而九六迭用剛柔雜居無非效于天地者也卜筮中有吉凶非無自也天垂日月星辰之象循度而見吉失度而見凶聖人象之而于卦爻之得則斷吉以象休徵于卦爻之失則斷凶以象咎徵皆象之于天者也有卜筮則有儀象儀象何自而成哉天不愛道龍負圖而出于河以五生數統五成數而同處其方數之體也地不愛寶神龜載書而出于洛以五竒數統五偶數而各居其所數之用也總之皆易理也聖人則圖而用摩蕩之法其所為儀象八卦者已備則書而用縱橫交錯之法其所為儀象八卦者亦符蓋易一隂陽也圖書亦隂陽也本隂陽以作易孰謂天地圖書非聖人作易之原乎易有四象所以示也繫辭焉所以告也定之以吉凶所以斷也聖人本造化以作易而所以前民用者豈外是哉彼揲蓍求卦之餘有隂陽老少之四象果何以哉所以示人所值之卦爻也所值卦爻必係以詞又何以哉彖詞告人以全體之象爻詞告人以一節之象也詞之所立定以吉凶又何以哉蓋吉凶一定不易斷之使人決于趨避也凡此皆以前民用也易之開物成務冒道如此右第十一章易曰自天祐之吉無不利子曰祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉無不利也大有上九曰自天祐之者豈天私佑上九哉有所以祐之也蓋佑之為言助之謂也天無私助助必于順由天推人而人亦無私助助必于信即人觀天而知天之祐非無故也上九當大有時下從六五之賢是身所履者極誠而無妄心所思者循理而不拂又以此履而思者崇尚乎賢士真大君信順之極滿而不溢者是以自天祐之吉無不利子曰書不盡言言不盡意然則聖人之意其不可見乎子曰聖人立象以盡意設卦以盡情偽繫辭焉以盡其言變而通之以盡利鼓之舞之以盡神聖人與民同患之意固無窮也書以載之而書不盡欲言言以達之而言不盡其意然則聖人之意終無以自見乎非也聖人以天下之事不外隂陽言之所傳者淺象之所示者深于是畫一竒以象陽畫一偶以象隂則體貴對待而包涵無外用貴流行而變化無方言與書不能盡者而象無不盡矣然意之所包有情偽情偽未盡即意未盡也即此象而因重之設為六十四卦則消息異時而小大判當否異位而淑慝分情偽無不盡矣意之所發有言言未盡即意未盡也即此象而發揮之係彖詞以言材而全體義著係爻詞以言變而一節義彰情則斷以吉偽則斷以凶而言無不盡矣然卦詞以立其體使不能達其用聖人之意亦未盡即象之趨時者制為卜筮因其卦爻之變使人通之事為則趨避咸宜而利盡矣然欲盡利而使人勉強以趨其意猶未極其妙也即象之變通者妙于鼓舞則趨避踊躍有不知誰為之者而神盡矣至于盡利盡神而聖人之意寧有不盡乎乾坤其易之緼耶乾坤成列而易立乎其中矣乾坤毁則無以見易易不可見則乾坤或幾乎息矣立象所以盡意者以象始于乾坤二畫隂陽變化包含無窮其殆易之緼耶何也乾以竒成列于左坤以偶成列于右對待之中自妙流行之用隂陽合德而諸卦之體已成剛柔雜居而六爻之質已具雖未變化而其體立矣向使竒偶之卦畫毁而不成列焉則何以為隂何以為陽而變化之易體不可見矣易不可見人何以化隂何以化陽乾坤之用或幾乎息矣乾坤必不可息易必不可無乾坤之成列此乾坤所以為易緼而立象之必不可已也是故形而上者謂之道形而下者謂之器化而裁之謂之變推而行之謂之通舉而措之天下之民謂之事業乾坤何以為易之緼正以易之所有無非乾坤也是故乾坤之象一隂陽之形也自其形之超于法象而上者是為太極之真至精至粹謂之道道固乾坤之精也自此形之著于法象而下者是為竒偶之質有方有體謂之器器固乾坤之迹也因此乾坤自然之化而裁之如陽化趨隂裁之為隂隂化趨陽裁之為陽隂陽交錯一道之推遷也謂之變因此化裁之理而推行之如隂窮則推而行之于陽陽窮則推而行之于隂流行無滯一道之旋轉也謂之通由是舉變通之化措之天下使民無不趨吉避凶則事無不成業無不定聖人之事業溥矣孰非乾坤之妙用哉信乎乾坤為易之緼而立象足以盡意也是故夫象聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻聖人固立象以盡意矣然立象非無見也聖人蓋有見于天下之賾莫非道也于是擬諸其形容而因畫卦以象其物宜道之精蘊于此悉模而象之故謂之象象立而爻生焉非無見也聖人又有見于天下之動莫非道也于是觀其會通以行其典禮係詞焉以斷其吉凶道之變動于此悉倣而效之故謂之爻蓋緣意以起見緣見以立卦詞此聖人必立象以盡意也哉極天下之賾者存乎卦鼓天下之動者存乎辭試以用易言之象見道于賾而立則欲究極天下之賾而無遺存乎卦蓋觀卦之象物宜陳而萬理析矣爻見道于動而立則欲鼓舞天下之動而不怠存乎辭蓋觀爻之詞典禮明而趨避決矣化而裁之存乎變推而行之存乎通神而明之存乎其人默而成之不言而信存乎德行至若揲蓍求卦之詞因卦爻隂陽之化而裁為七八九六之數則存乎卦爻之變蓋變乃聖人所裁以盡利者人亦裁此而已極數之後因卦爻所著之理而推于出入云為之際則存乎卦爻之通蓋通乃聖人所推以盡神者人亦推此而已乃若不假化裁推行之迹而神明夫變通之用則存乎其人焉苟非其人道不虛行然所謂其人者必于變通之理沉潛淵默而完具渾成且不煩擬議而孚合無間所謂神而明之者也則存乎德行蓋其平日造理精微履事極其純熟自然易之變通已先得之深矣故一用易之際而自成自信神明不測有如此也此則得意忘象之事道器精粗一以貫之矣可見易非聖人不能作亦非聖人不能用也右第十二章繫辭下傳八卦成列象在其中矣因而重之爻在其中矣易理盡于吉凶吉凶原于爻象爻象何自而立哉聖人作易自兩而四自四而八乾兊八卦以次而序二老列而純隂純陽之象著六子列而雜隂雜陽之象著俱在成列之中矣由是因已成之卦各以八卦次第加之以成六十四卦是因而重之也則內外滿而貞悔全承乘比應之爻在各卦之中矣此易之體所以立也剛柔相推變在其中矣繫辭焉而命之動在其中矣夫卦爻既立則卦爻一剛柔也然是剛柔迭相推蕩剛推乎柔則剛變為柔柔推乎剛則柔變為剛雖未及乎占變而卦爻之變已在相推之中矣推變則卦之消息爻之當否無不備具聖人于時位之息而當者則係詞以命其吉于時位之消而不當者則係詞以命其凶雖未形于動而為占然占者所值當動之卦爻已具于係詞中矣此易之用所以行也吉凶悔吝者生乎動者也動雖寓于詞而詞實顯于動卦爻之詞固有吉凶悔吝然必抱蓍問易而值其所動然後吉凶悔吝可見蓋生于動者也剛柔者立本者也變通者趣時者也吉凶悔吝生乎動矣而實本于位之未常動趨于時不得不動者也蓋卦爻未動時一剛一柔各有本位有凝然對待不易之意是立本者也然有一定之位而無一定之時及其動也變化不拘剛進之極變通于柔柔退之極變通于剛立本之中又有迭運不窮之妙是蓋趣時者也吉凶者貞勝者也夫剛柔變通吉凶見矣是吉凶者不容並出常以正而相勝者也吉有當然則吉為正而常勝凶凶有當然則凶為正而常勝吉出此入彼事勢必然非貞勝而何天下之道貞觀者也日月之道貞明者也天下之動貞夫一者也然吉凶所以貞勝惟其理之一而已蓋理一則不當有二至常則不容有變試以造化驗之人事天地之道消息盈虛變之至也要以貞而常運法象所垂亘古今以為觀也日月之道晦朔弦望變之至也要以貞而常照晝夜代明亘古今以為明也况人事之動乎天下吉凶之動紛然不齊雖極至變要以貞而常勝蓋不貞則二貞則未有不一者也惟當然不易之理隨其所勝而貞自在順則吉而逆則凶此所以貞勝也夫乾確然示人易矣夫坤隤然示人簡矣夫吉凶貞勝固由于一而一之原則出于天地夫乾天也確然天下之至健也理行即達氣至即亨示人以生物之易矣夫坤地也隤然天下之至順也承天之理為理順天之氣為氣示人以生物之簡矣其易簡之理非一乎所謂貞觀者也爻也者效此者也象也者像此者也夫乾坤以易簡示人如此而易之爻象誰能外之故八卦因重而有爻爻非他也竒者效乾之易偶者效坤之簡也八卦成列而有象象非他也陽息隂消者像乾之易隂息陽消者像坤之簡也然則爻象雖至變至賾亦不外乎一理天下之動非貞夫一哉爻象動乎內吉凶見乎外功業見乎變聖人之情見乎辭夫爻象之體由易簡而立而爻象之用得蓍卦而行故揲蓍求卦之先參伍錯綜雖未成爻象而爻之竒偶象之消息已躍然動乎蓍卦之內矣揲蓍求卦之後通變極數則所值吉凶占決之詞在卦而以全體昭在爻而以一節著遂顯然見于蓍卦之外矣夫爻象之動即變也雖未見諸行事而所以通志定業者見于斯矣吉凶之占即詞也雖非聖人面命而所以與民同患者見于斯矣卦爻之功豈不大哉天地之大德曰生聖人之大寶曰位何以守位曰仁何以聚人曰財理財正辭禁民為非曰義聖人情見乎辭而其功用豈小補哉蓋天地以生物為心乾以易知而知始坤以簡能而作成生非天地之大德乎乃聖人正天所生以生天下者也體天地所好生之德以生天地所生之民則必藉位以行其德位非聖人之大寶耶大寶在位不可不守而守位則必以仁民為邦本本固邦寧也守位在仁不可不聚而聚人則必以財財為民命財散民聚也至若財以聚人宜理也務崇本而節用既富而教以詞為先宜正也必反經以貞志民有為非宜禁也必明罰以致刑而總之一歸于義是義也正所以成其仁也蓋得乎義則導之而生養遂教之而倫理明治之而爭奪息天地以德生萬物聖人以義生萬民其功業與天地相配矣而易之功用豈不大哉右第一章古者包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身遠取諸物於是始作八卦以通神明之德以類萬物之情羲皇之王天下蓋位大寶作易以前民用者也雖其妙契隂陽已具作易之本尤疏觀造化以驗消息之機仰則觀經緯之象於天俯則觀一定之法於地至天地間有鳥獸之文觀其希革毛毨之殊與地之宜觀其髙深上下之實近取諸身之性情形體遠取諸物之飛潛動植見得天地之間無一非陰陽之消息于是始作八卦以通神明之德凡陰陽之理深入無形者易直與之貫通而無間焉以類萬物之情凡陰陽之理顯及有象者易直與之相肖而不違焉如是則卦之立也顯微畢具聖人制器尚象寧不本于是哉作結繩而為網罟以佃以漁蓋取諸離伏羲作易非為制器設也然制器之理卒無外于易焉上古未有耕種則鮮食乃其先也于是教民作結繩而為網罟以佃于山林以漁于川澤而物皆麗焉且離象為目蓋取諸離包犧氏沒神農氏作斫木為耜揉木為耒耒耨之利以教天下蓋取諸益上古民知鮮食猶未知粒食也包犧沒而神農作斫木使鋭而為耜揉木使曲而為耒耒以運耜耜以起土以教天下樹藝二體皆木有益之象上入下動有益之德蓋取諸益日中為市致天下之民聚天下之貨交易而退各得其所蓋取諸噬嗑網罟作而鮮食足五穀熟而民人育則貨財殖矣然有無不通民弗便也神農于是教民當日之中而為市致天下之民于各市地聚天下之貨于各市㕓貿易有無交易而退則有餘不足彼此相通而各得其所矣此其上明下動有日中為市之象蓋取諸噬嗑神農氏沒黃帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通通則久是以自天祐之吉無不利黃帝堯舜垂衣裳而天下治蓋取諸乾坤生養雖遂禮教猶未興也黃帝堯舜繼興風氣漸開人思文治其變也時為之也三聖人因其時之所必變而通乎民之所欲趨則民日遊于其中而亹亹不倦有若或使之者如是則民宜矣民何以宜哉正以通變之道神化不測在聖人亦不知其所以然自令人安之以為宜也惟其宜之所以不倦聖人通變如此一循乎易理而已蓋易理即天之理也消息互乘盈虛迭運故當時事窮極未有不變者變則隨時而轉因勢而導未有不通者通則一時為宜萬世無弊未有不久者是以三聖人之神化通變合乎易即合乎天以是而天祐之民宜不倦吉利孰大焉當此之時黃帝堯舜夫何為哉但垂衣裳端拱于上而禮樂教化胥于此起文治成矣此天地變化無有作為聖人順時亦無作為蓋取諸乾坤刳木為舟剡木為楫舟楫之利以濟不通致遠以利天下蓋取諸涣衣裳既垂則遠邇觀化然川澤阻塞則文教不通于是刳木使中虛而為舟剡木使末鋭而為楫舟楫之利既興則不通者濟矣此木在水上有渙之象蓋取諸渙服牛乘馬引重致遠以利天下蓋取諸隨夫民雖有涉川之利而猶苦于戴負之勞于是因牛之性順服而馴之以引重因馬之性健乘而駕之以致遠則天下之徒行者利矣此下動上説猶物勞人安有隨之象蓋取諸隨重門擊柝以待暴客蓋取諸豫川途既通暴客或至可無備乎故設重門以防外擊柝以警內縱有暴客防間已備有以待之此即豫備之意蓋取諸豫斷木為杵掘地為臼臼杵之利萬民以濟蓋取諸小過雖有耒耜以開粒食之原民猶未知精食之用于是斷木為杵以使之舂掘地為臼以使之容則易粗為精萬民之養道以濟此下止上動之象蓋取諸小過弦木為弧剡木為矢弧矢之利以威天下蓋取諸睽外有以待暴客內有以得精食使無弧矢以威不軌將有險不能守有粒不得食矣于是弦木曲其中以為弧剡木鋭其末而為矢威暴所以仁良弧矢亦利也此以威武服天下之暴蓋取諸睽上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨蓋取諸大壯夫兵器既制固有以禦民患矣宫室不興何以奠民居乎是以上古之世冬則穴居夏則野處民無所安息後世聖人易之以宫室有棟以直承而上有宇以兩垂而下而風雨可以無患矣此壯固之意蓋取諸大壯古之葬者厚衣之以薪葬之中野不封不樹喪期無數後世聖人易之以棺槨蓋取諸大過夫宫室既制固有以奠民居矣葬禮未舉何以教民孝乎是以古之葬者厚衣以薪委之中野無封土樹木之規無衰麻哭踊之數後世聖人易以棺槨此送死過厚之意蓋取諸大過上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬制度既詳貴有文明之治故上古民淳事簡凡事結繩以記驗之亦足以致治後世民偽事煩聖人于是易以書契言不能記者書以記之事有不信者契以驗之由是百官之功實可稽萬民之情偽可核以治以察無不明決蓋取諸夬合而觀之聖人制器無非本諸易也尚象之功豈不大哉右第二章是故易者象也象也者像也羲皇作而圗起于是觀象而有小成大成之易是故易者非他無非象卦爻竒偶之象耳然此象者非滯于迹也乃像夫陰陽之理之似耳陽之理不可見特假竒以象之陰之理不可見特假偶以像之此先天之易立象以盡意也彖者材也有象于是乎有彖文王本此象而係彖詞彖何言哉蓋言一卦之材質也如德體象變之中有本然之能有各足之量彖悉闡之原始要終兼理統論而象之全體彰矣爻也者效天下之動者也有彖于是乎有爻周公體此象而係爻詞爻何言哉蓋天下之動如愛惡情偽利害得失之類動本至煩詞亦至悉是爻也者不過因其事變而摹倣之呈獻以出而象之一節昭矣此後天之易係詞以盡言也是故吉凶生而悔吝著也夫卦以象告如此而詞之所以發揮乎象者又如此是故得失之報以明吉凶由此而生焉憂虞之故以晰悔吝由此而著焉人之考占用易者無不具于此矣可見聖人係詞以盡言不外立象以盡意象之所像不有禆于民用乎右第三章陽卦多陰陰卦多陽乾坤之卦純陽純陰其畫固無多寡矣至震坎艮皆索諸乾而為陽卦宜多陽矣其畫乃一陽二陰而反多陰巽離兌皆索諸坤而為陰卦宜多陰矣其畫乃一陰二陽而反多陽其故何也陽卦竒陰卦偶此其故何也蓋陽卦主竒一陽二陰合為五畫五竒數也所以多陰陰卦主偶一陰二陽合為四畫四偶數也所以多陽其德行何也陽一君而二民君子之道也陰二君而一民小人之道也有數則有理由數以究其理則卦形所在即德行所在其德行何也易之大分陽貴陰賤有君民之象焉陽卦一陽二陰為一君二民天下一統其道大而公陰卦二陽一陰為二君一民政出多門其道小而私是聖人作易不獨前民用正以扶世教也右第四章易曰憧憧往來朋從爾思子曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮咸四爻詞蓋言一感一應當順其自然也何也天下空體也其往者來者原屬之天下而不屬之我何處可容吾思且思之深而慮哉蓋天下之理原于太極本同歸也而事物散見其途不能不殊殊卒不離乎同也理根于人心本一致也而此心酬酢其慮不能不百百卒不離乎一也人第以天下應天下以天下還天下順其自然可矣何憧憧思慮為哉日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而嵗成焉往者屈也來者伸也屈伸相感而利生焉試觀之造化日往則月自來月往則日自來日月無心相推而明自生而不窮寒往則暑自來暑往則寒自來寒暑無心相推而嵗自成而不匱夫日月寒暑之往非有心于往也氣機之息而屈也日月寒暑之來者非有心于來也氣機之息而伸也屈以感乎來者之伸伸以應乎往者之屈日月寒暑無心相感而明生嵗成之利不期生而自生焉此造化感應自然之理也尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇德也又試觀之物理尺蠖不屈則不伸其屈以求伸而行無心也龍蛇不蟄則不存其蟄以存身而奮無心也物理且然聖學可知心之裁制為義義之泛應為用用之渾融于心為德本同歸一致者也君子于義則精研之以至幾微必徹造人神妙之境時而往來無迹應用不窮本體即能致用而用無心矣致用自能利用隨時隨物迎刃而解利其施用至于無不自得而身安乃躬行既熟心得自深義在吾心自覺圎融透徹無心于崇德而德自崇矣此亦感應自然之理也過此以往未之或知也窮神知化德之盛也夫義未精而求精用未利而求利此其機在我可知者也乃今義已精用已利過此則機不在我非我所知也當此未之或知之時窮極天地之神而與合一不測者吻合通知天地之化而與推行有漸者流通始而入神至此而神已窮始而可知至此而知已化盛之至也豈徒崇之已乎蓋交養互發之機熟之又熟斯神化合一之妙忘之又忘何容思慮于其間哉易曰困于石據于蒺藜入于其宫不見其妻凶子曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期將至妻其可得見耶困六三之爻詞蓋言危辱之事無以崇德也大凡進退有據而身名兩全者必既度其身又度其人也今九四剛而在上如石之不可困也三不度身而欲去以邀功則傾陷君子公論不容而名必辱九二剛而在下如蒺藜之不可據也三不度人而欲依以圗安則盤據要地賈禍立至而身必危既辱且危死期將至雖有親昵誰能庇之故上六之應有妻之象其可得見耶當思善處矣易曰公用射隼于髙墉之上獲之無不利子曰隼者禽也弓矢者器也射之者人也君子藏器于身待時而動何不利之有動而不括是以出而有獲語成器而動者也解上六之爻詞蓋言解悖之理有以崇其德也凡天下無不可解之悖在善為之方耳隼者鷙害之禽小人心術之險也弓矢者射禽之器君子道德之威也操弓矢以射禽者君子得時用事之人也蓋君子解悖之器素藏于身待可為之時而動則動中機宜何不利之有若此者正以君子有器能藏先為不可括以善其動則其動自善而無足為吾括也是以不出則己一出而鷙害以除有不獲乎上六爻義正語公之藏器于身待時而動所以獲也子曰小人不恥不仁不畏不義不見利不勸不威不懲小懲而大誡此小人之福也易曰屨校滅趾無咎此之謂也噬嗑初九爻詞蓋云懲惡之事可以證安身也蓋福生于所懲小人不恥己之不仁不畏己之不義不見利則不動不見威則不懲若因其小不仁不義而見懲于前則不為大不仁不義而知誡于後此小人轉禍為福也屨校滅趾正此謂也人當知所懲矣善不積不足以成名惡不積不足以滅身小人以小善為無益而弗為也以小惡為無傷而弗去也故惡積而不可掩罪大而不可解易曰何校滅耳凶噬嗑上九爻詞蓋言改過之事可以證安身也善惡生于所積仁義善也不積特小善耳何足以成名不仁不義惡也不積特小惡耳何足以滅身小人豈一旦罪大莫解哉以小善為無益于名而弗為也以小惡為無傷于身而弗去也而不知惡已積而不可掩是以罪大而不可解故至何校滅耳人當知所戒矣子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易曰其亡其亡繫于苞桑否之九五爻詞蓋言保治之事可以證安身也蓋禍生于所忽自古身任國家者每以未然之防得之故心之常若危者所以安其位也心之常若亡者所以保其身之存也心之常若亂者所以有其紀綱之治也君子有見于此故四方無虞可謂安矣以安為危所伏而不忘危宗社鞏固可謂存矣以存為亡所倚而不敢忘亡綱舉目張可謂治矣以治為亂所基而不敢忘亂夫有思危思亡思亂之心必有圗安圗存圗治之策是以身安而國家可保觀否五爻人當知所防矣子曰德薄而位尊知小而謀大力小而任重鮮不及矣易曰鼎折足覆公餗其形渥凶言不勝其任也鼎之九四爻詞蓋言恃才之事可以證安身也蓋為人臣者居位以德德薄而居尊位謀事以知知小而欲謀大任重以力力小而欲任重此皆過分而不自量者鮮不及于敗矣若鼎之四爻正言不勝其任也人當知所審矣子曰知幾其神乎君子上交不諂下交不瀆其知幾乎幾者動之微吉之先見者也君子見幾而作不俟終日易曰介于石不終日貞吉介如石焉寧用終日斷可識矣君子知微知彰知柔知剛萬夫之望豫之六二爻詞蓋言知幾之事可以證精義入神也夫天下之事莫不有幾能知之者其神而明之者乎觀之君子上下之間自有幾存幾而不早覺覺而不及持鮮有不諂不瀆者君子於上交則能燭其不諂之幾于下交則能燭其不瀆之幾其真知幾乎然所謂幾者理初動而未著惟微而已事之所為吉者先見于此者也君子見吉之幾即作而趨之不俟終日何其神也豫二爻詞蓋言君子無欲而靜堅確分辨介如石焉神生於定明炳於先不用終日斷有卓識矣故天下事有宜韜晦而微者有宜顯著而彰者有宜退遜而柔者有宜勇敢而剛者其動微先見處無不知之矣此其曠識妙用真超世邁俗而為萬夫之望者信乎其神也子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不遠復無祗悔元吉復之初九爻詞蓋言誠明之學可以證崇德也人心自繼善來止有一善純之則一復之則幾若顔氏子其殆庶幾乎彼其克復功深無有不善以雜至善之體故其念慮之間微覺動于人心有非繼善之初當體自知自復既無迷幾復無留念不待既失而後復也初九爻義即顔氏之學也天地絪緼萬物化醇男女搆精萬物化生易曰三人行則損一人一人行則得其友言致一也損之六三爻詞蓋言得一之事可以證安身也安身之道在于得一天下情必兩而專功必兩而成吾觀天地兩也陰陽絪緼交合無間兩而一也而萬物之氣化渾厚而不漓焉男女兩也精氣交搆施受相感兩而一也而萬物之形化生生而不已焉夫天地男女皆以致一成功況友道乎若損三爻蓋言損去其間已者反其同已者以致兩者之一也子曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與也懼以語則民不應也無交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恆凶益之上九爻詞蓋言勿恆之戒可以證安身也人主莫不求益而求益須有恆心故君子不遽動也必修身順理而安然後動之政事不遽語也必心氣和平而易然後播之號令不遽求也必上下之間情意交孚而後求之征賦修此三者而立心之恆可知故動則民悅語則民應求則民與益道全矣若立心無恆事不順理從欲惟危為危以動誰其與而從之非道命令惟恐不順為懼以語誰其聽而信之分非已定恩非素孚為無交而求誰其樂而與之至莫之與則不徒不與而已且爭奪紛起傷之者衆矣若益上九爻詞正此立心勿恆是以凶也右第五章子曰乾坤其易之門邪乾陽物也坤陰物也陰陽合德而剛柔有體以體天地之撰以通神明之德伏羲之畫卦始于乾坤二畫而六十四卦皆由此出其易之門邪何也乾體一而實性動而健陽物也坤體二而虛性靜而順陰物也然以兩分者以一而交陰交於陽陽交於陰則兩物合而為德矣惟其合德則兩相摩而為四四相摩而為八八相蕩而為六十四凡諸卦之剛柔或剛上柔下或柔上剛下其質不同體無不立矣如顯而天地之撰為雷風山澤陰陽之迹也易惟合德有體則其撰之悉備者無不形容其似微而神明之德為健順動止陰陽之理也易惟合德有體則其德之無形者無不發揮其妙此先天之易該乎顯微之理也其稱名也雜而不越於稽其類其衰世之意邪羲皇既本陰陽以盡意文周又豈離陰陽以盡言哉是故卦爻之辭其稱名也或假物象如稱龍稱馬之類或言事變如建侯行師之類紛然雜出總不外乎陰陽之理何差越之有然其稱名之雜此何意也以稽其所言之事類目擊皇風下衰世變日滋故辭不得不詳焉耳此後天之易盡乎世變之情也夫易彰往而察來而微顯闡幽開而當名辨物正言斷辭則備矣夫易固雜而不越矣而何理之弗備耶如消息盈虛天道之已然者曰往陰陽之故也易則彰其一定之理吉凶悔吝人事之未然者曰來陰陽之幾也易則察其幾先之故見于事為曰顯陰陽之迹也易則言事必根于理而顯者微之原于性命曰幽陰陽之祕也易則言理必托于事而幽者闡之尊卑貴賤之名不可亂也易則因陰陽之定分而稱之各當其實鳥獸草木之物不可混也易則因陰陽之成質而辨之各從其類以至爻象之言皆本典常之道以發之吉凶之辭皆本得失之情以斷之是易也體天地通神明其無不備如此其稱名也小其取類也大其旨遠其辭文其言曲而中其事肆而隱因二以濟民行以明失得之報自其所備之中而詳論之其卦爻稱名擬議事物之小而所取之類皆陰陽變化則又甚大其旨趣包含天地鬼神之遠而所發之詞皆經緯錯綜則又甚文易之言多委曲矣而于理未嘗不精確而中易之事常詳悉矣而于理未嘗不含蓄而隱易詞之妙如此真可謂雜而不越矣聖人豈無因哉蓋因民行之不濟由于民心之二民心之二由于失得之報未明慮民之疑于趨避欲以濟其行之不及故作易定吉凶以告人以明失得之報此後天之詞所以廣先天之教而開物成務也總本陰陽二畫信乎乾坤為易之門耶右第六章易之興也其於中古乎作易者其有憂患乎易始于羲皇中微于夏商至文王係彖而易道大明則易之興也其于中古乎當其時適囚羑里操危慮深其有憂患乎夫當憂患以作易則易之為書無非處憂患之道矣是故履德之基也謙德之柄也復德之本也恆德之固也損德之修也益德之裕也困德之辨也井德之地也巽德之制也然處憂患之事無如反身修德試舉九卦明之德始于踐履以禮治私則德有所據而立自日進于髙明矣非德之基乎然惟讓可以明禮能謙以自持則德有執持矣非德之柄乎德修于存養謙以行禮則制外養中善端復矣一念之復于善即萬善之根柢故復為德之本然復而不守雖得必失得一善當拳拳固守不為外物所搖故恆為德之固持守雖固私欲果盡去乎損則懲忿窒欲淨去其人欲之私此乃修身之事故為德之修克治雖嚴天理果盡純乎益則遷善改過充長其本然之量而日增月盛有餘裕焉故為德之裕雖德裕于常未必不變于困惟處困之亨不亨吾德之至不至可辨矣德雖亨于困未必不變于終井則德性堅定能安所止應用之體立矣然可與立者未可與權巽則隨時制宜不膠一定化裁之制妙矣其序之不可紊也如此履和而至謙尊而光復小而辨於物恆雜而不厭損先難而後易益長裕而不設困窮而通井居其所而遷巽稱而隱其妙何如禮以律身非強世也而天理人情自不可易和而至焉謙卑自牧忘其尊也而心愈卑下德愈崇顯尊而光焉善端初復雖曰甚小而理欲之介自明不其辨于物乎德既有恆雖處紛雜而始終之致自一曾何至于厭乎損主懲忿窒欲初固難矣然已克而理還後何易也益主遷善改過固長裕矣然善還吾本有過去吾本無曽何增設也困則身窮道亨無入而不自得不其通乎井則居安資深足以待用而不窮是體雖靜而用則動也不其遷乎巽則稱物之宜而泯其運用之迹是用則顯而機則藏也不其隱乎九卦之德如此履以和行謙以制禮復以自知恆以一德損以遠害益以興利困以寡怨井以辨義巽以行權其用何如行已非禮則乖戾而不和是禮所以行乎和而使之中節者也行禮非謙則倨傲而無本是謙所以制乎禮而出之以遜者也以復而用之則已自覺悟良知不為欲蔽以恆而用之則久暫不渝天德不為物搖用損之懲忿窒欲則身心之害遠用益之遷善改過則德業之利興用困之窮而通則怨尤之念絶惟井體不動安而能慮故處經事而知宜惟巽順乎理則以道為體故處變事而能權九卦之用如此要皆反身修德之事也尚何憂患之難處哉右第七章易之為書也不可遠為道也屢遷變動不居周流六虛上下無常剛柔相易不可為典要唯變所適易之為書也有畫有辭切于民用不可須臾遠也何也其為道也屢有變遷不膠于一者也其屢遷何如易道不外陰陽陰陽變動而不止其所常周遍于六位之間從六位中分之初二三為下四五六為上上下之位有常而九六居之則無常從六位細别之初三五為剛二四六為柔剛柔之位不易而九六居之則有易此豈可以一定典要拘之哉惟隨其變之所趨而已易變之屢遷如此而人顧可遠哉其出入以度外內使知懼夫易惟變所適其適出適入即道之利出利入而確然不可易者宛然以法度立出外入內之則使人惕然知懼焉又明於憂患與故無有師保如臨父母不特使民知懼已也又于出入以度之中獨提憂患之事與所以致此憂患之故使人常懷兢惕雖無師保以訓之如父母臨之而不敢忽使人于知懼之中尤知懼焉信乎不可遠矣初率其辭而揆其方既有典常苟非其人道不虛行觀變之懼人則詞之因變而係者可知蓋易變無常形而詞有定理故問易者始由卦爻之詞揆度卦爻之理即出入之度憂患之故既確然有典常矣然人之由詞以達變者不可膠于一定也惟神明之人方能通變于不窮苟非其人則泥而不通屢遷變動之道豈虛行哉甚矣人之不可遠易也右第八章易之為書也原始要終以為質也六爻相雜唯其時物也易之為書有卦有爻是以全體而妙大用者也吾常原其一畫之始以要六畫之終則貞悔全而內外備陰陽純雜之體質于是成矣若卦之六爻或陽居陰位陰居陽位相雜而靡定者蓋陰陽二物各以時成時陽而陽時陰而陰初無定體之可拘也其初難知其上易知本末也初辭擬之卒成之終自時物之見于初上者言之初則其理幽隱而難知上則其理明顯而易知何者初上本末之分也本則微露其端故難知末則已闡其藴故易知惟難知故聖人當時係初之辭必擬其當假何象當著何占不敢輕舉也惟易知故聖人當時係上之詞不過因初之象占而成之耳何待擬議哉若夫雜物撰德辨是與非則非其中爻不備初上固足該始終之時物矣若夫陰陽賾亂之物雜而陳之剛柔中正之德撰而出之又擬物與德中之純雜善惡一一辨晰其孰是孰非此非兼中四爻不能悉備而無遺也噫亦要存亡吉凶則居可知矣知者觀其彖辭則思過半矣六爻既全則吉凶存亡之理具矣噫人欲究極天道之存亡人事之吉凶析觀爻詞居然可坐而知矣然此特就衆人言之耳若智者晰理既精統觀彖詞則吉凶存亡雜陳于時物間者已可得易之概矣豈待遍觀六爻哉然天下不皆智者爻詞可不係耶二與四同功而異位其善不同二多譽四多懼近也柔之為道不利遠者其要無咎其用柔中也以二四爻言之二四皆陰爻皆能為柔順之事業固同功矣然位有遠近之異故其善有不同者二多譽而四則多懼焉此何以故四位近于君動有僣逼之嫌所以多懼也觀四之多懼由于近則知二之多譽由于遠矣夫柔之為道非附陽剛不能自立本不利于遠者二柔而遠于五乃大要得無咎而多譽焉者以其用柔不過乎柔張弛合宜得乎中道此所以多譽也觀二之多譽由于中則知四之多懼由于不中矣三與五同功而異位三多凶五多功貴賤之等也其柔危其剛勝邪以三五爻言之三五皆陽爻皆能為陽剛之事業固同功矣然位有君臣之異故其善亦異三多凶而五則多功焉此何以故五為君而貴則操得為之權所以多功也三為臣而賤動有掣肘之患所以多凶也然要而言之三五皆陽位以柔德居之則委靡不振君臣胥失其道三固多凶五亦不能多功也豈不危乎以剛德居之則強毅有為君臣交得其道五固多功三亦不至多凶也其有不勝耶是知逺近貴賤物也剛柔中正德也譽懼凶功是非之辨也非中四爻何以悉備哉此觀易者不可不審也右第九章易之為書也廣大悉備有天道焉有人道焉有地道焉兼三才而兩之故六六者非它也三才之道也易之為書也內而無不含蓄外而無不包舉而廣大中之條理無不精密其廣大而悉備者乎何以見之天下之道盡於天地人而已方易之三畫成卦上畫有天道焉中畫有人道焉下畫有地道焉是三畫已具三才矣又以一而不兩則獨而無成又兼三才而各兩其畫故有六畫然六畫非他也上二爻即天道之隂陽也中二爻即人道之仁義也下二爻即地道之剛柔也六畫亦三才之道也其廣大悉備如此道有變動故曰爻爻有等故曰物物相雜故曰文文不當故吉凶生焉夫易畫既備三才之道則畫之所在即道之所在也故道之變動不居周流六虛則謂之爻爻者交變之義也爻之逺近貴賤等級森然則謂之物物之不齊物之情也物之剛柔相間燦然可觀則謂之文蓋六位錯綜煥然兩間之經緯也至於是文有以剛居柔柔居剛而位未必當者亦有以柔居柔剛居剛而位亦未必當者其義互有得失而吉凶生於其間矣可見爻者道之變動物者道之散殊文者道之昭著吉凶者道之淑慝而莫非三才之所貫也易之廣大悉備不信然乎右第十章易之興也其當殷之末世周之盛德邪當文王與紂之事邪是故其辭危危者使平易者使傾其道甚大百物不廢懼以終始其要無咎此之謂易之道也道待人而興易之復興也其當殷之末世周之盛德邪當文王與紂之事邪文王以是德當是時遇是事故其所係之詞多警戒之意而危焉何以明其危也卦詞所發莫非人事之理故凡危懼存心者戒謹恆至必有安寧之慶則辭係以吉利若使之平怠易存心者忽慢不檢必有覆敗之虞則詞亦係以凶害若使之傾然危平易傾之道安危存亡係焉豈不甚大故自一身之舉動萬物之操履與夫天下國家之治亂凡百事物平者必生於危傾者必生於易固無幸致之福亦無幸免之禍誰能廢之其道之大若此聖人係詞果何意哉無非教人危懼存心終如其始使人平而無傾終歸無咎此之謂與民同患易之道也右第十一章夫乾天下之至健也德行恆易以知險夫坤天下之至順也德行恆簡以知阻太極之理一也分布於乾坤統會於聖心自聖心純乎理有乾之名乾則自強不息極天下之至健也本此健德以行則會易知之理而恆易易本無險故險之幾舉歸坐照不待險而知也自聖心順乎理有坤之名坤則安貞無為極天下之至順也本此順德以行則會簡能之理而恆簡簡本無阻故阻之幾無不前知不待阻而知也此正能危能懼而無易者之傾不待卜筮而知吉凶者也能説諸心能研諸慮定天下之吉凶成天下之亹亹者然所以知險知阻者皆聖人自然之能事也蓋聖人於未事時易簡所涵理自融洽是能説諸心矣及應事時易簡所應幾自詳審又能即説者而研諸慮矣惟説心是以吉凶之理皆吾心所素藏險阻與否無不知之而吉凶定矣惟研慮是以趨避之幾皆吾心所密察險阻與否無不趨避之而亹亹成矣是故變化云為吉事有祥象事知器占事知來此其自然之知豈待卜筮哉是故天道寒暑晝夜即有變化人事語默動靜即有云為此理之顯者也變化有吉則祥先見於垂象云為有吉則祥先動於四體此理之微者也夫變化云為各有一定之理所謂器也聖人比擬其事於已往稽迹觀變而已然之理周知而不忒矣吉事有祥原有先見之理所謂來也聖人推驗其事於將然察微洞幽而未然之理早知而不惑矣所謂知以藏往神以知來説心研慮定吉凶成亹亹者此也天地設位聖人成能人謀鬼謀百姓與能夫不假易而知吉凶聖人能之而百姓未與能也易可無作乎聖人因天地設位而變化云為吉事之理無不備具此天地之能也但不能自言以告人聖人於是畫卦係詞以成其能也由是人有所為謀之於人趨避未決必抱蓍問易復謀之於鬼神則百姓雖愚因卜筮而知吉凶成亹亹得與于聖人之能矣八卦以象告爻彖以情言剛柔雜居而吉凶可見矣聖人作易成能不過欲人趨吉避凶耳而吉凶於何見也先天聖人畫為八卦或以純隂純陽之象告或以雜隂雜陽之象告矣而險阻之情百姓未遂知也後天聖人係以爻彖或以全體之情言或以一節之情言矣象告情言皆吉凶也惟是畫卦定位剛柔雜居則時之消息位之當否吉凶居然可見此成能之易百姓所以與能也變動以利言吉凶以情遷是故愛惡相攻而吉凶生逺近相取而悔吝生情偽相感而利害生凡易之情近而不相得則凶或害之悔且吝然是吉凶也由象辭以見其體又由變占以見其用方揲蓍之初隂陽老少未定所謂變動也此時雖未成卦爻而趨避之幾已寓非以利言乎及變動已定占決已著必有吉凶此則因卦爻之情有消息當否之異而卦之吉凶隨之非以情遷乎惟其以情遷也是故卦爻有中正相與是愛相攻也其情和諧而吉生如不中正相與是惡相攻也其情拂逆而凶生吉凶以愛惡之情遷矣至於吉凶未判而曰悔吝又有吉凶方形而曰利害從何生也如卦爻有逺相取則情之暌者病於疏近相取則情之合者嫌於妄悔吝胥此生矣如卦爻有情相感則為道義之交而利生偽相感則為私情之合而害生要之凡易之情近相得固貴也逺而不相得亦無害也惟近而不相得則猜疑間隔凶害悔吝皆由此生吉凶之以情遷如此將叛者其辭慙中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭遊失其守者其辭屈所謂情遷不觀人之辭乎人心之動因言以宣試以人險阻之情發於言詞者觀之人之叛乎正理者其辭慚愧而回互中心疑乎正理其詞枝離而不一有德之吉人言不妄發而詞寡無德之躁人言必輕出而詞多人本善也而心欲誣之其辭浮遊而不定理本定也而無執守之人其詞屈抑而不伸人之辭以情遷如此則卦爻之辭以情而遷也不益信哉周易文詮卷三
