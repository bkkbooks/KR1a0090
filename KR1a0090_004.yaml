body:
  text: 周易文詮卷四元趙汸撰說卦傳昔者聖人之作易也幽贊於神明而生蓍昔者伏羲聖人之作易也有蓍數有卦爻天下之道冒是矣第蓍何自而生乎由聖人在上篤恭不顯默助乎化育之功而和氣充塞故靈秀鍾於草木而蓍生焉蓋神物非神明不生而神明非聖人不贊故生蓍皆幽贊力也參天兩地而倚數有蓍必有數數者揲蓍求卦之數也數何倚而起耶蓋天之體圓圓者徑一圍三三各一竒是天原有三數也聖人以陽全之理裁之故參天而為三地之體方方者徑一圍四四合二偶是地原有兩數也聖人以隂半之理裁之故兩地而為二然後七八九六之數皆倚此而起焉九者三三之積六者二三之積是九六之數由分天地之參兩而起矣七者兩二一三之積八者兩三一二之積是七八之數由合天地之參兩而起矣然則易之有數蓋倚天地而起者也觀變於隂陽而立卦發揮於剛柔而生爻和順於道德而理於義窮理盡性以至於命有數則有卦卦何自立哉聖人於隂陽之變而統觀其全體之純雜則卦從此立矣有卦則有爻爻何自生乎聖人就卦中析觀其剛柔一一闡明之而爻自此生矣卦爻既立理無不備其功用當何如哉彼所稱共由曰道同得曰德而義即道之散殊也易則於進退存亡之道剛柔健順之德有以旁通其情融㑹其㫖而無少乖逆且於和順中一一條理析之極其精也不理於義乎自道德與義合之為理賦之為性而命又理與性之原也易則窮事物之理而旁燭無疆盡人物之性而區處曲當且於理性所從出者一一根極渾合無間也不至於命乎聖人作易之功大矣右第一章昔者聖人之作易也將以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦分隂分陽迭用柔剛故易六位而成章昔者聖人作易而卦爻具豈徒備卜筮之用哉將舉性命之理一一擬議之而順之不拂耳何也蓋性命之理天地人備之天非以象立也有立天之道焉如有寒無暑有晝無夜何以能成天道曰隂與陽則靜專與動直合而天道有常運矣地非以形立也有立地之道焉如有水無火有髙無深何以能成地道曰柔與剛則靜翕與動闢合而地道有常凝矣人非以血氣立也有立人之道焉如有慈愛而無斷制有慶賞而無刑威何以能成人道曰仁與義則愷悌與裁制合而人道有常處矣此皆性命之理也易何以順之亦以易之六畫六位無非此理耳統言其卦三畫已具三才又兼三才而兩其畫故易有六畫然後一卦之體成性命之理順於全體中矣析言其爻則見初三五為陽二四六為隂就此隂陽相半之中時而居之於剛時而居之於柔則剛柔相間錯綜變化自成文章而性命之理順於一節中矣易誠順性命之書乎右第二章天地定位山澤通氣雷風相薄水火不相射八卦相錯伏羲作八卦橫圖又復中分而圓之有對待之體有交錯之用有生出之序皆可按圖而知也今觀圖位乾南坤北是天位乎上地位乎下兩儀定位而合德矣由是艮與兑對澤氣上通于山而為雲為雨山氣下通乎澤而為泉為水矣震與㢲對雷因風而益迅風因雷而益烈其勢相薄而交助矣坎與離對水得火而濟寒火得水而濟燥其用相濟而不相犯矣然對待之中即有交變乾兌離震各與八卦相錯則自復至乾三十有二之陽卦成於此矣巽坎艮坤各與八卦相錯則自垢至坤三十有二之隂卦成於此矣此對待之體即以妙交錯之用也數往者順知來者逆是故易逆數也然是圖也又有生出之序焉圖從中起而分其位之左右自左數之起震而歷離兌以至於乾皆已生之卦謂之往由四而三而二而一其迹已然如今日計昨日也順而易知自右數之起巽而歷坎艮以至於坤皆未生之卦謂之來由五而六而七而八其神不測如今日推來日也逆而難知然此特自其圖之中分言之耳而要其生出之序則有逆而無順也有乾一而後有兌二離三震四巽五坎六艮七坤八皆已生而及未生逆固逆順亦逆也故以列八卦之體即此逆數者之對待也以神相錯之用即此逆數者之交變也聖人所以規而圓者皆以象造化自然之理則易為知來之書於圓圖可見矣右第三章雷以動之風以散之雨以潤之日以烜之艮以止之兌以說之乾以君之坤以藏之先天方圖之位實妙造化之全功焉彼震巽相待是雷動以發其生意風散以解其鬱結有始物之功焉坎離相待是雨以潤而滋日以烜而燥有亨物之功焉艮兌相待是艮以止物斂其生氣兌以說物足其生機有成物之功焉孰綱維是乾以君之六子皆統攝乎乾而分職以聽者也孰翕受是坤以藏之六子皆包含乎坤而乘時以出者也六子分其序乾坤統其全此方圖卦位妙造化之全功也右第四章帝出乎震齊乎巽相見乎離致役乎坤說言乎兌戰乎乾勞乎坎成言乎艮先天圓圖文王取而更置之蓋以象一嵗之運也帝者天地之主宰而氣機所乘以出入者隱寓於後天卦位之間彼八卦之位中起於震而帝於是發端氣機動矣出而畢達則齊而帝之均布則必於巽齊而明盛必相見而帝之宣著則在於離相見後委力生養必致役而帝之效用則在於坤致役後氣機充足必說而帝之暢遂則在於兌兌後生成與肅殺交加必戰而帝之隂陽相薄則在於乾乾後肅殺與休息相期必勞而帝之慰勞則在於坎坎後顯仁與藏用為終始則收藏之功開成之始則必於艮後天圓圖之妙如此萬物出乎震震東方也齊乎巽巽東南也齊也者言萬物之潔齊也離也者明也萬物皆相見南方之卦也聖人南面而聽天下嚮明而治蓋取諸此也坤也者地也萬物皆致養焉故曰致役乎坤兌正秋也萬物之所說也故曰說言乎兌戰乎乾乾西北之卦也言隂陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所成終而所成始也故曰成言乎艮帝之出入不可見即物之出入以見之自帝乘乎震而物皆於震乎出焉震位東方於時為春正甲拆之候也自帝乘乎巽而物於巽乎齊焉巽位東南於時為春夏之交言物之生意畢達而鮮潔整齊也何以見乎離蓋離德以明盛為義萬物交輝煥然相見離為南方之卦於時為夏品物咸亨之候也即聖人位必南面而聽天下德必向明而治亦取離明之意也何以致役乎坤坤為地象即土也土旺四時而獨盛於夏秋之交前此之火得土以制其烈後此之金得土以制其寒萬物無不育於土膏之潤是坤悉委其力於萬物不靳也至於兌位西方正秋也金氣肅殺化機始藏生意飽滿欣然各足故曰說言乎兌至於乾位西北正秋冬之交隂盛陽微勢必相薄而戰物亦因之夭者色變喬者葉落故曰戰乎乾坎於五行為水以卦位北方正水德用事乃慰勞之卦而休息之時也萬物至此說者恬休戰者寧定而得所歸宿矣故曰勞乎坎艮居東北於時為冬春之交萬物至此自有而無既往者終其化自無而有將來者肇其端非物之所以成終成始者乎故曰成言乎艮如是則盡萬物之出入皆八卦之顯藏而盡八卦之顯藏無非上帝之主宰後天圓圖之妙如此右第五章神也者妙萬物而為言者也動萬物者莫疾乎雷撓萬物者莫疾乎風燥萬物者莫熯乎火說萬物者莫說乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮故水火相逮雷風不相悖山澤通氣然後能變化既成萬物也乾坤之功分寄於六子而六子之用總歸於一神神也者不離乎物而又不囿於物其妙萬物而為言者乎常觀六子以動萬物而鼓暢生機莫疾乎震雷以撓萬物而解散鬱結莫疾乎巽風以燥萬物而使之堅凝莫熯乎離火以說萬物而使之利遂莫說乎兌澤以潤萬物而使之充足莫潤乎坎水以終始萬物而使之斂有歸無從無含有莫盛乎艮六子各專其功妙於流行者如此而未嘗不本於對待之體也故惟坎離得偶水火恆相逮也震巽得偶雷風不相悖也艮兌得偶山澤相通氣也然後隂變陽化彼此相濟合動撓與燥而成物之始合說潤終始而成物之終也可見流行者原本對待對待者自具流行總之一神之妙萬物也圖學之妙先後天一而已矣右第六章乾健也坤順也震動也巽入也坎陷也離麗也艮止也兌說也易有八卦所以通神明之德也常於其性情見之乾為純陽內不息而外不撓健也坤為純隂內不亢而外不擾順也震陽起於下志激昻而氣勇往動也巽隂伏於下內沉濳而外婉轉入也坎陽陷隂中中藏不測而外示韜晦陷也離隂麗陽中冲虛內主而文明外比麗也艮陽極於上靜固定而動亦定止也兌隂現於外心固和而氣亦和說也性情之妙如此右第七章乾為馬坤為牛震為龍巽為雞坎為豕離為雉艮為狗兌為羊易之八卦逺取諸物者也物之性健而行不息者莫如馬乾則純陽至健故其象為馬物之性順而勝重載者莫如牛坤則純隂至順故其象為牛以奮動之身而特起於地勢重隂之下者莫如龍震則陽動隂下故為龍以入伏之身而出聲於天氣重陽之表者莫如雞巽則隂伏陽下故為雞坎外柔內剛如豕之外汚濁而內剛强故為豕離外剛內柔如雉內文明而外柔順故為雉艮一陽止於二隂之上猶狗外剛而內柔故為狗兌一隂見於二陽之上猶羊外柔而內剛故為羊易其盡物情乎右第八章乾為首坤為腹震為足巽為股坎為耳離為目艮為手兌為口易之八卦近取諸身者也身惟首為尊乾則在上居尊為首惟腹能容坤則虛中善容為腹震陽動於下猶足在下而能動為足巽隂伏於下猶股兩垂而在下為股坎陽陷隂中如耳輪內陷而聰為耳離隂麗乎陽如目睛外發而明為目手剛在前能止物艮陽止於上為手口開於上能悅人兌隂說於上為口易其盡人類乎右第九章乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兌三索而得女故謂之少女易以道隂陽也而孰知亦以正名分乎今觀文王八卦次序於乾坤則謂父母於六子則謂男女此何以故蓋以乾純陽至健其象為天而物皆資始有父道焉故稱父坤純隂至順其象為地而物皆資生有母道焉故稱母至於六子得乾坤之畫而成者也體一而實性動而健者男之象也體二而虛性靜而順者女之象也彼震則坤求於乾而得初畫故謂長男巽則乾求於坤而得初畫故謂長女坎則坤再求於乾而得中畫故謂中男離則乾再求於坤而得中畫故謂中女艮則坤三求於乾而得三畫故謂少男兌則乾三求於坤而得三畫故謂少女易其通人情乎右第十章乾為天為圜為君為父為玉為金為寒為氷為大赤為良馬為老馬為瘠馬為駁馬為木果以乾象推之乾純陽至健其象為天從天象而廣之天體圓動無端為圜六子皆其所統為君萬物皆其所始為父其德純粹為玉其德堅剛為金在後天位居西北於時為冬氣之冽也為寒而寒之極則水凝為氷其在先天位居正南於時為夏陽之色赤而陽之盛為大赤取之動物健之最善為良馬健之最久為老馬健之最堅為瘠馬健之最猛為駁馬取諸植物則乾之體實而圓為木果之象乾象之無不該如此坤為地為母為布為釡為吝嗇為均為子母牛為大輿為文為衆為柄其于地也為黑以坤象推之坤純隂至順其象為地從地象而廣之萬物資生為母時而敷布其發生之澤為布且虛而容實為釡時而收藏其化育之恩為吝嗇賦形有定為均性之極順為子母牛厚而能載為大輿三畫皆偶而燦然有章為文偶畫雜然不一為衆坤握成物之宰為柄坤本純隂其色為黑坤象之無不該如此震為雷為龍為𤣥黃為敷為大塗為長子為决躁為蒼筤竹為萑葦其于馬也為善鳴為馵足為作足為的顙其于稼也為反生其究為健為蕃鮮以震象推之雷以陽起於地震以一陽自下而動故為雷從雷象而廣之陽性奮於淵為龍乾坤始交而成震故為𤣥黃陽氣始施為敷萬物畢出為大塗取象於人一索得男為長子隂躁在上陽進决之有見義必遷聞善必行之力為决躁取象於植物震居東方其色青為蒼筤竹下實上虛為萑葦取象於動物二隂上拆為馬之開口善鳴一陽下動為馬之馵足懸起陽動而健為馬之作足騰躍二隂在上其色白故為馬之的顙陽動於下自下而上故於稼為反生陽長必終於乾其究為健既變為陽則陽盛而萬物之生必蕃滋而鮮美故為蕃鮮震象之無不該如此巽為木為風為長女為繩直為工為白為長為髙為進退為不果為臭其于人也為寡髮為廣顙為多白眼為近利市三倍其究為躁卦以巽象推之巽以一陽伏於二隂之下猶木之在地其性善入故為木從木象而廣之其氣善入無物不被為風一索得女為長女糾木使直莫如繩引繩制木莫如工巽為德之制故為繩直為工少隂色白為白風行必逺為長木性直上為髙隂性多疑為進退為不果臭屬隂一隂下鬱而二陽外達故為臭其於人之體也髮者隂屬巽隂在下而隂血不升為寡髮顙者陽屬巽二陽在上而陽氣上盛為廣顙眼之白為陽黑為隂巽一隂二陽為多白眼陽主義隂主利巽隂為主而性善入得利之多為近利市三倍震為决躁巽三畫之變則為震故其究為躁卦巽象之無不該如此坎為水為溝瀆為隱伏為矯輮為弓輪其於人也為加憂為心病為耳痛為血卦為赤其于馬也為美脊為亟心為下首為薄蹄為曳其于輿也為多眚為通為月為盜其于木也為堅多心以坎象推之陽陷隂中內實而行有常內明而外暗故為水就水之象廣之水流不盈為溝瀆陽匿隂中隱而不露是存心之密潛養不發故為隱伏陽在隂中抑而能制是克己之勇矯偏歸正故為矯輮弓輪者矯輮之所成也故為弓輪其取象於人也則處險陷而操心危慮患深為加憂心虛則逸中實則為心病耳虛則聰中實則為耳痛坎水在人為血故為血卦乾為大赤得乾中畫為赤其取象於馬也陽明在中文采可觀為美脊剛猛在內躁急難馭為亟心陽昻隂低上畫柔則為首之下而不昻陽薄隂厚下畫柔則為蹄之薄而不厚陽前隂後蹄薄則不能致逺故為曳而不進其取象於輿也坎體隂陷而行多阻為多眚通者水之性故為通月者水之精故為月陽匿隂中於人為心險而盜以剛在中於木為堅多心坎象之無不該如此離為火為日為電為中女為甲胄為戈兵其于人也為大腹為乾卦為鱉為蟹為螺為蚌為龜其于木也為科上稿以離之象推之離內隂而外陽火則內暗外明體隂用陽故為火從火之象而廣之日者火之精為日電者火之光為電再索得女為中女陽外堅為甲胄陽上鋭為戈兵中虛為大腹炎上燥而為乾卦離中柔靜為鱉離外剛躁為蟹隂善麗陽為螺一隂中虛為蚌離象文明為龜離中虛其於木也為中空上稿離象之無不該如此艮為山為徑路為小石為門闕為果蓏為閽寺為指為狗為鼠為黔喙之屬其于木也為堅多節以艮之象推之一陽隆起於坤地之上有山之象從山之象而廣之一陽橫上為徑路一陽峻立為小石上陽橫亘下隂對待如門闕之通出入為門闕一陽在上一木之果二隂在下一草之蓏為果蓏艮德為止如閽者止人之入寺者止人之出為閽寺人之止物莫如指為指物之止物莫如狗為狗取象於動物鼠剛在齒鳥剛在喙多黑艮剛在前故為鼠為黔喙之屬取象於植物陽剛在外其於木也為堅多節艮象之無不該如此兌為澤為少女為巫為口舌為毁折為附决其于地也為剛鹵為妾為羊以兑之象推之澤乃水之聚處今坎水塞其下流其象為澤從澤之象廣之其在人也三索得女為少女其德為說以言說神為巫以言說人為口舌兌為正秋肅殺之氣全者毁剛者折時則然也為毁折兌以隂附陽是小人附君子而君子必决之理則然也為附决二陽在下一隂在上蓋土之下堅剛而上鹵潤也於人則隂少而賤為妾於物則內剛外柔為羊兌象之無不該如此右第十一章序卦傳有天地然後萬物生焉盈天地之間者唯萬物故受之以屯屯者盈也屯者物之始生也物生必䝉故受之以䝉䝉者䝉也物之稚也物稚不可不養也故受之以需需者飲食之道也飲食必有訟故受之以訟訟必有衆起故受之以師師者衆也衆必有所比故受之以比比者比也比必有所畜故受之以小畜物畜然後有禮故受之以履履而泰然後安故受之以泰上經首乾坤而終坎離蓋有序焉自太極判而兩儀分於是有天地然後二氣絪緼而萬物之氣化形化於是乎生焉是天地為萬物之父母而乾坤為天地之法象此易所以首乾坤也天地既生萬物盈天地間者皆物故乾坤從受屯屯者雷雨交作盈滿之義也又為物之始生而未伸之時也物之始生知識未開是物生必䝉故屯後受䝉䝉者䝉昧之義也又為物之幼稚也物稚不養何以遂生故䝉後受需需有養道飲食之正也然飲食為人之大欲欲在必爭故需後受訟訟必有朋黨起而相援相傾故訟後受師師者衆多之義也衆無統必亂必仰比一人以為君而權政乃一故師後受比比者輔也然民之比我以我有以養之也必制田輕賦以遂其生而庶始得富而不散故比後受以小畜民既養矣禮教可興必明倫教讓以復其性而富乃得教而有禮故小畜後受履有禮則分明志定天下各得其所而安故履後受泰泰者通也物不可以終通故受之以否物不可以終否故受之以同人與人同者物必歸焉故受之以大有有大者不可以盈故受之以謙有大而能謙必豫故受之以豫時至於泰氣化人事俱交通也然治極必亂故泰受否亂必有協力以致治故否受同人與人同者公好惡而不拂天下心民必歸之率土無非吾有故同人受以大有有大不可恃必持盈守滿而有可保故有後受謙有而能謙則不驕不侈天祐人助樂以天下故謙後受豫豫必有隨故受之以隨以喜隨人者必有事故受之以蠱蠱者事也有事而後可大故受之以臨臨者大也物大然後可觀故受之以觀可觀而後有所合故受之以噬嗑嗑者合也人主以謙致豫則臣民之心悅而隨之故豫後受隨然以喜相隨非苟隨也必上下同心協力而有所事故受之以蠱蠱者壞極而飭治振起也振起而勵精圖治可以建大功業故受之以臨臨者居上臨下大之事也事業惟大則豐功偉績照耀天下豈不可觀故受以觀大觀在上則下觀而化天下咸服治化不隔故受以噬嗑嗑者合而為一之義也物不可以苟合而已故受之以賁賁者飾也致飾然後亨則盡矣故受之以剝然物不可不合又不可以苟合若徑情而行則為苟合而相瀆相離貴有禮以制之故受以賁賁者禮以飾情之謂物至於飾固有亨道然飾不可致致則文滅其質而亨者不可通矣故受以剝剝者剝也物不可以終盡剝窮上反下故受之以復剝者文勝而質盡滅也凡物無終盡之理故剝窮盡於上必反生於下如天地之心隱而後見生人之心息而復生故受以復復則不妄矣故受之以無妄有無妄然後可畜故受之以大畜物畜然後可養故受之以頥頥者養也不養則不可動故受之以大過復則天理為主人欲退聽自不妄矣故受以無妄心既無妄則善端充積學以聚之將有不可限量者故受之以大畜所畜既大則由此從容涵泳可養之以俟其化故受以頥頥者涵養之義也惟有涵養而後有大設施未有養不裕而能有為於世者故受以大過物不可以終過故受之以坎坎者陷也陷必有所麗故受之以離離者麗也有大過人之才者雖能為大過人之事若過恃其才必至傾危躁拂以陷於險故受以坎坎者陷也既陷於險必附陽剛以求濟而險斯可出故受以離以離有附麗之義也終以坎離見水火共濟天地之能事也右上篇有天地然後有萬物有萬物然從有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯夫婦之道不可以不久也故受之以恆恆者久也下經首咸而終未濟亦有序焉自有天地則氣化形化然後有萬物有萬物則分隂分陽然後有男女有男女則隂陽相配然後有夫婦有夫婦則相合相生然後有父子有父子則生齒日繁然後有君以統之有臣以共之有君臣然後尊卑貴賤緣分以定而有上下有上下然後有禮文以行之有義理以辨之而禮義始有所施是天地萬物男女者夫婦之所由始父子君臣上下禮義者夫婦之所由致其為道也大矣咸者夫婦之交也故以咸為首夫婦之道唱隨之義不可以不久也故受以恆恆者久之義也物不可以久居其所故受之以遁遁者退也物不可以終遁故受之以大壯物不可以終壯故受之以晉晉者進也進必有所傷故受之以明夷夷者傷也傷於外者必反其家故受之以家人然有不可久者盛滿必衰見幾而止可也故受以遁遁者退避之義也然君子無終遁之理將有壯盛之機故受以大壯豈徒壯哉必進而建樹有為故受以晉又豈一於進哉若一於進必有貶斥之傷故受以明夷夷者傷害之義也既傷於外必反於家而後即安故受以家人家道窮必乖故受之以睽睽者乖也乖必有難故受之以蹇蹇者難也物不可以終難故受之以解解者緩也緩必有所失故受之以損齊家有道不能修身正家以致家法蕩然而窮則情義乖離故受以睽睽者乖異之義人情乖異則必有戕賊而禍難作故受之以蹇蹇者險難之義難無終險之理必反身修德有人起而解之故受之以解解者緩散之義難之既解人情必多怠緩廢時失事而所損多矣故受之以損損而不已必益故受之以益益而不已必决故受之以夬夬者决也損以懲忿窒欲不已其功則善端有長益之機故受之以益益以遷善改過不已其功則性天隨處流溢有江河若决之勢故受之以夬夬者决之義也决必有所遇故受之以姤姤者遇也物相遇而後聚故受之以萃萃者聚也聚而上者謂之升故受之以升升而不已必困故受之以困困乎上者必反下故受之以井小人既决則君子自遇故受以姤姤者遇之義也君子既遇則同德自聚故受萃萃者聚之義也君子既聚於朝則多賢展采自升治道於大猷故受以升升而不已則貪而求不知止必遭摧抑故受以困身既困於上勢必危於下所謂不得於朝必退於野也故受以井井道不可不革故受之以革革物者莫若鼎故受之以鼎主器者莫若長子故受之以震井常道也井久必停汚法久必滋弊欲更化以善治則井道不可不革故受以革然變成法非操天下重權不可故受以鼎鼎重器也主重權非得國家之長君不可故受以震震者動也物不可以終動止之故受之以艮艮者止也物不可以終止故受之以漸漸者進也震陽生於下動之義也天道無終動之理動極必收斂而止故受以艮艮者止之義也天道亦無終止之理靜極必進而動闢故受以漸漸者漸進之義也進必有所歸故受之以歸妹得其所歸者必大故受之以豐豐者大也窮大者必失其居故受之以旅旅而無所容故受之以巽巽者入也入而後說之故受之以兌兌者說也說而後散之故受之以渙學問循序而進自造其極而得歸宿之地故受之以歸妹既得所歸則德業盛大自不局於小成故受以豐豐者大之義也若徒恃盛大之名而借名理為托宿則失居安之道故受以旅既外於聖賢之道而無所容則必自悟而反於正故受以巽人能心入於理自有深造自得之機故受以兌兌者說之義也理既悅心自能暢於四肢發於事業故受以渙渙者離也物不可以終離故受之以節節而信之故受之以中孚有其信者必行之故受之以小過有過物者必濟故受之以既濟渙者離也人心既離則必立防間以節之故受以節節則制度數議德行民皆信從故受以中孚然事有權宜信難執一若果信而必行之則過乎中矣故受以小過有過人之才必有過人之事故受以既濟物不可窮也故受之以未濟終焉夫既濟物之窮也窮則變必無窮終之理稽之天地則循環之運不可窮驗之人物則生息之機不可窮推之人事則治亂相尋之數不可窮惟不可窮故易不以既濟終而以未濟終也是經之所以終未濟者其即終則有始生生不已之謂也乎右下篇雜卦傳乾剛坤柔比樂師憂純陽之卦為乾其德則剛是人主體乾綱以總攬也純隂之卦為坤其德則柔是人臣體坤柔以媚兹也比以四海而仰一人率土歸心道可大行樂以天下師以一人而統三軍動衆行師安危所係憂以天下臨觀之義或與或求臨則容保教思而與之於民有與之義焉觀則建中表正而求乎我有求之義焉屯見而不失其居䝉雜而著屯以震遇坎夫震動則見矣而坎險不行則善藏其用靜能觀變而不失其安止之居是雖動而未常不靜也䝉以坎遇艮夫坎幽昧則雜矣而艮體光明則牿引未深良知尚露雜而著其本然之體是雖幽而未嘗不顯也震起也艮止也損益盛衰之始也震陽下起靜極而動化機發舒之端也艮陽上止動極而靜化機收斂之極也損者損下益上上益非衰然民貧則君不能獨富衰之始也益者損上益下上損非盛然民富則君必不獨貧盛之始也大畜時也無妄災也大畜以艮畜乾似乎難止而今能止者時適然也非幸也無妄以乾而動本無取禍之理而或不免者灾自外也非宜也萃聚而升不來也謙輕而豫怠也萃者同德相聚而未往於朝也升者同道共升於朝而不來於野也謙則虛己下人自視不勝其輕也豫則志得意滿自處不勝其怠也噬嗑食也賁無色也噬嗑以合天下之間去其梗而食之去有間而歸無間治之盛也賁以反天下之本以無色而受采去有文而歸無文化之成也兌見而巽伏也兌說外見和順之氣積中而發外心之顯也巽入內伏沈潛之思退藏而淵密心之微也隨無故也蠱則飭也隨時上下交勵無事故之可虞恪守舊章與天下休養可也蠱時上下胥玩有壞亂之足慮亟宜修飭與天下整頓可也剝爛也復反也剝者陽窮於上生氣潰爛而歸於消也復者陽生於下生意復萌而反於長也晉晝也明夷誅也晉則明出地上而為晝世道休明之㑹也明夷明入地中而見傷世道晦蝕之秋也井通而困相遇也井則其道上行澤及於物不求通而自通也困則剛為柔掩陽受阻抑非所遇也咸速也恆久也咸者以和平感人而存神過化也恆者以久道化成而漸仁摩義也渙離也節止也解緩也蹇難也睽外也家人內也否泰反其類也渙以風散水民心攜二無所以合之故離也節以澤限水議禮制度有所以限之故止也解出乎險從容和緩之時也蹇在險中患難危急之秋也睽則乖忤不合情甚疏而外也家人則恩義相聫情甚親而內也否則大往小來小人之道長也泰則小往大來君子之道長也大壯則止遁則退也壯陽方盛恐其恃壯而失防隂之道故戒君子以止而不輕進也遁隂方長恐其逞勢而肆害陽之謀故戒君子以退而不可進也大有衆也同人親也革去故也鼎取新也小過過也中孚信也大有之世統億兆為一家衆也不必其親也同人之情聫人我為一體親也不必其衆也革者積習之故盡去之也鼎者維新之政盡取之也過不可有雖小有失亦過也故細行之必謹信不可無中心之孚乃信也故色取之必戒豐多故也親寡旅也豐則勢盛而喜有為其故多也旅則窮大而失其居其親寡也離上而坎下也離為火火性炎上坎為水水性潤下小畜寡也履不處也小畜以一隂當衆陽之衝欲止之而不能止小難畜大以寡不敵衆也履以和悅躡剛强之後欲進而得遂其進柔能制剛故行而不處也需不進也訟不親也大過顛也姤遇也柔遇剛也漸女歸待男行也頤養正也既濟定也歸妹女之終也未濟男之窮也夬决也剛决柔也君子道長小人道憂也需者安分待時見險不進也訟者犯分拂情與人不親也大過本末俱弱力小任重以至於顛也姤以隂而遇五陽遇之不以正也漸則進必以正如女之歸待男禮備而後行也頤者養德養身學術要之以正既濟者綱舉目張事功要之底定歸妹者女子于歸得其終身之託女道之終也未濟者三陽失位難成濟世之功男道之窮也夬決也以五剛決一柔直決之而已小人既決則君子滿朝其道日長小人屏跡其道日消而憂也夫至有君子無小人則有治無亂豈不為世道幸哉聖人以此終易其㫖微矣周易文詮卷四
