body:
  text: 周易文詮卷一元趙汸撰乾下乾上乾元亨利貞此卦六爻皆竒上下皆乾則陽之純健之至天道也亦君道也人主體此法天之健本其剛徳施于政治自無委靡不振之弊而有化行俗美之隆當得元亨然其所以元亨者不襍于欲不競于氣而一本于天命之正故始終無間純以天徳用事是謂以純王之心行純王之政者也初九潛龍勿用初陽在下是有聖徳而時當側陋象為潛龍宜晦迹以待時勿輕出以求用此善藏其用非終不用也九二見龍在田利見大人九二以剛健中正之徳際出潛離隠之時如龍在田有霖雨及物之象雖未得位其徳巳著君見之以資猷民見之以䝉澤何利如之九三君子終日乾乾夕惕若厲无咎以九陽爻居三陽位是位髙權重乃危地也然性剛能慎有乾惕之象相臣于此上思感君下思感民終日乾乾至夕猶惕則夙夜匪懈相責無負雖危无咎九四或躍在淵无咎以陽居隂固能疑之人居上之下又可疑之地進而革命必致審于天命之去留人心之向背為或躍在淵之象謹慎如此順天應人自无冒進之咎九五飛龍在天利見大人五以剛健中正之徳而居矢位為飛龍在天之象位以徳興徳以位顯君子見之以翊運小人見之以䝉休何弗利焉上九亢龍有悔亢者過于上而不能下也上居陽極時當滿􅄹為亢龍之象然在聖人有亢時無亢心至此當有以處之矣若與時俱亢則招損而悔用九見羣龍无首吉此卦六爻皆陽故曰羣龍物之剛者莫如龍龍之剛莫如首无首則陽變而隂矣人君于此純柔固非美徳純剛亦易敗事必也剛濟以柔恩威並用天下乃畏威懷徳而有和平之吉彖曰大哉乾元萬物資始乃統天此專以天道明乾義天之四徳惟元為大氣機一動即載性命以出故萬物之生皆資之以為始也又為四徳之首而生而成初无間斷直貫始終故曰統天雲行雨施品物流形此釋乾之亨也乾元之氣始則必亨當亨之時雲一薰蒸而行雨即和暢而施元之生氣不可遏抑品物至此隨時呈形如流之不可遏矣大明終始六位時成時乗六龍以御天天以元亨萬物聖人于是體元以亨萬民見天之終于貞而始于元者時也聖人遂于始終合一之原黙㑹其機則見卦之六位亦以時成于六爻定位之中有六龍變化之妙爰以通於治道乗時而運張弛闔闢無不如意先後天而弗違矣乾道變化各正性命保合太和乃利貞變者化之漸化者變之成物所受為性天所賦為命太和隂陽㑹合冲和之氣也各正者得于有生之初不相假借凌奪也保合者全于已生之後無所虧缺渗漏也此言乾道變化無所不利而萬物各得其性命以自全此釋利貞之義也首出庶物萬國咸寧天以元利貞萬物聖人體元以利貞萬民當乘龍御天時教養以孚禮明樂備惟有端已無為以觀王化之成萬國各得其所而咸寧猶萬物各正性命而保合太和也此言聖人之利貞也象曰天行健君子以自強不息乾天也上下皆乾天行之健也君子法之以人心本健原自不息專責其功于自純乎理而不間以欲粹其功而不即于懈則精一緝熈與天合徳矣潛龍勿用陽在下也陽謂九下謂潛有徳無時與時俱隠可也見龍在田徳施普也雖未得位其徳己盛其化自神終日乾乾反復道也大臣居髙履危全在心之運量故貴反復反復重復踐行之意道相道或躍在淵進无咎也或以進而不必進也飛龍在天大人造也造猶作也亢龍有悔􅄹不可久也龍而曰亢處既盈之時必不可久惟識其􅄹而亟反之乃持􅄹有道可久之道也用九天徳不可為首也剛為天徳有乗時造運之妙然非可主以為首者如一以剛先之恐折而不可為故用九變而為柔則吉文言曰元者善之長也亨者嘉之㑹也利者義之和也貞者事之幹也元亨利貞雖曰天之四徳未始不具於人性中也元者生物之始天地之徳莫先于此故於時為春於人則為仁而衆善之長也孩提少長即知愛敬得之最先有生以後身心觸發無非此仁統之最全亨者生物之通物至於此莫不嘉美故於時為夏於人則為禮而衆美之㑹也吾性自然之節文具於人心而體之為齊荘中正出之為恭敬辭讓三千三百㑹聚於此利者生物之遂物各得宜不相妨害故於時為秋於人則為義而得其分之和自然裁制如孝友信别不相凌犯相安相恱豈不和乎貞者生物之成實理具備隨在各足故於時為冬於人則為智而為衆事之幹見真守定事依以立者也四徳之具於性如此君子體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事四徳具於人性而盡性以合天者惟君子故君子復天良遏人欲所存所發全體皆仁自足以仁民愛物而長人知亨為嘉之㑹而動容周旋萃聚衆美則不必有意致飾而見之動履無不合禮知利為義之和而辨名定分使物各得其宜不相紊亂則義無不和天下之事依理以立情識用事則多動摇貞固者知正之所在而固守之是持循有主而應變無窮故足以為事之幹此君子盡人以合天也君子行此四徳者故曰乾元亨利貞可見人皆有此四徳而惟君子為能行之者盖惟天徳之剛乃天下之至健也非健何能體天徳之全乎故不徒曰元亨利貞而必曰乾也初九曰潛龍勿用何謂也子曰龍徳而隠者也不易乎世不成乎名遯世无悶不見是而无悶樂則行之憂則違之確乎其不可拔潛龍也所謂潛龍勿用者盖言初以聖徳而隠變化不測非石隠者比也能以徳自守不隨世而易能以徳自晦不求成乎名惟不易必為世所遺佚然用舍在我必不怨而悶惟不成必為世所訾議然是非在人必不尤而悶此非有心於隠者也有徳者觀時自審若道與時行而可樂未嘗不行惟道不行而可憂故終於違耳行違之間全無意必確然非富貴功名所能奪者真時潛而潛如龍不測也九二曰見龍在田利見大人何謂也子曰龍徳而正中者也庸言之信庸行之謹閑邪存其誠善世而不伐徳博而化易曰見龍在田利見大人君徳也所謂見龍利見者盖言二有聖徳正當潛躍之中者也言不艱深行不竒詭人所易忽者也而九二信之謹之無時不然如是則邪無可閑矣而閑之又閑誠己存矣而存之又存将見善盖一世以己視之而不矜焉徳之所施者廣上下化之而不知焉雖未有君之位而君之徳已備也九三曰君子終日乾乾夕惕若厲无咎何謂也子曰君子進徳修業忠信所以進徳也修辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危无咎矣所謂乾惕者何盖大臣處危疑之地非徳業進修無以勝任徳何以進内主忠信無一念之不誠也業何以修言顧其行無一言之不實也然何以實致其功徳之極致為至而至之精㣲曰幾本忠信之心知其至而至之則至中之幾無不澄澈幾可與而徳進矣業之要歸為終而終之條理為義本立誠之心知其終而終之則終内之義無不完具義可存而業修矣如是則可上可下不驕不憂而无咎矣九四曰或躍在淵无咎何謂也子曰上下无常非為邪也進退无恒非離羣也君子進徳修業欲及時也故无咎所謂或躍无咎者何盖四不果於上而又不安於下若是乎无常以迹似為貪禄位之邪而心實非也不果於進而又不安於退若是乎无恒以迹似離乎卿相之羣而心實非也其心何如哉君子徳己進業己修自信此心原不為一身而為天下正欲審可上可進之時而及之不苟且以進也故无冒進之咎九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也所謂飛龍利見者何盖凡物聲同則唱和相應氣同則感應相求水性就下而流於濕火性炎上而就乎燥雲無心於龍而龍興則致風無心於虎而虎嘯則烈物理之感應如此而况聖人興起於上徳為之感臣民有不快覩者乎所以然者從其類也試觀動物本天而親上植物本地而親下莫不從其隂陽之類聖人之於民亦類也作而物覩又何疑焉上九曰亢龍有悔何謂也子曰貴而无位髙而无民賢人在下位而无輔是以動而有悔也所謂亢龍有悔者何盖時亢與之俱亢是貴為天子不能慎於有位而无位矣髙出庶物不能俯體于民而无民矣聖人在下不信仁賢誰其輔之是惟无動動必有悔人君可無處亢之道乎潛龍勿用下也見龍在田時舍也言未為時用也終日乾乾行事也或躍在淵自試也未遽有為姑試其可飛龍在天上治也居上以治下亢龍有悔窮之災也上之有悔實與時俱窮而不知變故有災耳人當識其窮而反之乾元用九天下治也乾君象也元君徳也聖人體天之心用九之道則剛而能柔精明出之渾厚天下無不治矣潛龍勿用陽氣潛藏見龍在田天下文明雖不在上位然天下已被其化終日乾乾與時偕行時當然也或躍在淵乾道乃革離下而上變革之時飛龍在天乃位乎天徳天徳即天位也盖惟有是徳乃宜居是位故以名之亢龍有悔與時偕極時行偕行可也時極偕極是之謂不知變乾元用九乃見天則慘舒互用天之則也剛而能柔乃為奉天乾元者始而亨者也乾有四徳而元統之統於始也一始則化機初動物之生意自無而有自有而著理勢必然未有始而不亨者也利貞者性情也乾元既始而亨必亨而利利而貞所謂利貞者乾始之初性情方動至此則萬物各具一生理所謂性也性成其為性而渾然完具性中生生不息之機即所謂情也情成其為情而隨處充滿矣乾始能以美利利天下不言所利大矣哉由始亨性情觀之則知元為乾道之始非徒一始已也發生之端為能以嘉美之利利天下使物咸得其宜又且生生之利無所不利不可名言也此可見析之則四徳各具一元有以專成始成終之功合之則四徳總具一元有以全先天後天之化統天之元豈不大哉大哉乾乎剛健中正純粹精也四徳流行貫於一元無非統於乾元之大即乾之大也大哉乾乎以言其體元始亨通利遂貞成專一不撓剛也以言其用由元而亨而利而貞迭運不息健也以言其行四序流行不愆不爽中也以言其立四徳適均不侵不倚正也剛健不雜於隂柔純也中正不襍於邪惡粹也而純粹之至無聲無臭又極其精此乾之所以為大也六爻發揮旁通情也乾元之大至純粹精㡬難闡矣然㣲言之而為精者顯言之而即為情未有易先情固隠而未見惟聖人於六爻之中有以發揮潛見惕躍飛亢是曲盡其情也是聖人之用易也時乗六龍以御天也雲行雨施天下平也乾之情既旁通於六爻則六爻即六龍也六龍皆一時也聖人法乾以為治以行天道則張弛闔闢變化恩威皆以時成亦如天之雲行雨施而天下平矣此聖人體元之極功也而乾元之大不可見哉君子以成徳為行日可見之行也潛之為言也隠而未見行而未成是以君子弗用也學術事功常相需者也君子以成徳而措之行宜不日而功業立見初九非成徳乎而曰潛者何也盖人所能者徳也人所不能者時也初九徳非不足第阻於時㑹之未遇故苦於功名之未立所以宜弗用也君子學以聚之問以辨之寛以居之仁以行之易曰見龍在田利見大人君徳也二未得位何以稱大人也以有學以成其徳也然理有萬殊非學無由合也君子則廣其聞見以聚之聚則不能無疑非辨無由明也又必親師取友辨其是非本末辨之明則可居於心勉強欲速俱弗居也勿忘勿助以居之居之安則可見之行意必固我弗能行也去私去怠以行之如是則知行並茂君徳己成故為利見之大人九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危无咎矣三以陽爻陽位居一人之下有掣肘之嫌居百官之上有僭逼之忌時當憂也故以乾惕處之乃得无咎九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故无咎四以陽居隂上未陟乎元后非如五之為君下已冠乎百僚非如二之為臣中又徳業進修人事己盡聞望攸歸可疑之時也故或之或正以審天人之介也故進而无咎夫大人者與天地合其徳與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而况於人乎况于鬼神乎九五之為大人大以徳也盖徳莫大于天地大人之覆載無私與髙明博厚無異矣故日月附麗於天地以道而貞明大人之燭逺明㣲與照臨無遺無異矣四時流行於天地以道而推遷大人之仁育義正與通復無愆無異矣鬼神變化於天地以道而貞勝大人之彰善癉惡與福善禍淫無異矣故有時禪征制作創天地所未有先天以開人天本有是理天不能違大人也有時因事制宜順天地之固然後天以立政天已有是理亦惟奉若天道而大人豈違之哉天且弗違况人乃天之所生鬼神乃天之所運豈有能違之乎故為利見之大人也亢之為言也知進而不知退知存而不知亡知得而不知喪所以動而有悔也其惟聖人乎知進退存亡而不失其正者其惟聖人乎求其善處亢者獨有聖人盖進極必退存極必亡理勢然也求其明乎未然行乎當然能順盈虚之定理而不計私以避害者其孰能之下士昧而不知豪傑知而不悉非聖人其孰能之坤下坤上坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉此卦六畫皆偶隂之純上下皆坤順之至故名坤坤臣道也人臣得坤道之順則無成代終可佐在中之文贊黄裳之治當得大亨然其所以得大亨者必常守此順不以初終有二久暫或渝而不失不變如牝馬之貞乃利牝馬之貞何如君子有所往而事君也居先非順而居後為順若首事專成則迷臣道惟居後代終乃得臣道其要主於順以從君而已如以人事君往西南隂方而柔嘉為侣則得同類之應若往東北陽方而剛暴是偕則失同心之助凡此皆臣道之貞安意守之而不易乃吉彖曰至哉坤元萬物資生乃順承天嘗觀乾元有資始統天之功矣自乾而外其分量各足有至極而無以可加者坤元乎何以見之造化初無兩元萬物資始時有氣無形惟坤之氣一到形色象貌皆資之以肇端矣此非坤自為也乃順乾之氣而承之以生未始不敢先既始不敢後其順如此豈非至乎坤厚載物徳合无疆含𢎞光大品物咸亨以坤道之亨言之覆幬萬物乾徳之无疆也而坤之博厚能持載之其徳亦无疆焉不配合乎故就其厚徳之含藴生意無不包括何其𢎞也由此厚徳之光顯生機無不發見何其大也品物至此形形色色無不鮮榮比流行時又加顯矣豈不亨乎牝馬地類行地无疆柔順利貞君子攸行坤之利貞何取象於牝馬盖馬為乾象而牝隂物與地同類順也而其行地致逺不息則順而健矣坤之為徳不敢自主承天生物何柔順也與牝馬同順矣且順承者直至有終何利貞也與牝馬同健矣此坤道也體而行之是在君子法坤順以養其和平而不亢法坤貞以守其忠順而無間惟君子行之先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶君子攸行何如坤之道盡於順順固其常也若居先則迷坤之道惟居後則得坤之常西南得朋以隂從隂類故得朋東北非類自然䘮朋然知朋之何以喪能反而與類行終有得朋之慶此攸行者所宜審也安貞之吉應地无疆夫居後往西南貞也君子知乎此而心安之則有得常得朋之慶盖地惟順承合天无疆君子安貞不應地乎所謂攸行者如此象曰地勢坤君子以厚徳載物坤地也上下皆坤地之勢也其勢髙下相因至順極厚故名坤君子體之内與含𢎞同體徳之所積納天下于深仁厚澤之中外與光大同用徳之所發囿天下於仁育義漸之内道濟一時仁育萬世與坤厚一矣初六履霜堅氷至初以一隂始生於下是小人始進其端雖㣲其黨必盛将來凌君子禍國家勢所必然如履霜而堅氷将至也君子可不防㣲杜漸乎象曰履霜堅氷隂始凝也馴致其道至堅氷也坤初方履霜耳而即曰堅氷者以小人得志之始不過隂始凝而為霜也不防而馴致之至於禍不可救實有以至之也六二直方大不習无不利六二柔順中正得坤之純故言其徳内則大公无邪而心自直外則裁制得宜而事有方且無念不直無事不方滿其直方之量而大若是者豈勉強哉學造自然不待學習而内外无不利也象曰六二之動直以方也不習无不利地道光也凡人涵養未深一觸於動便多摇奪今自六二之動觀之本其坦然無邪之體以為確然定静之用則動於念慮即為直動於事為即為方而大可知是道也即地道也惟不習无不利故性體學問絶無矜持絶無障蔽何光如之六三含章可貞或從王事无成有終人臣露才揚已最是徳薄三以隂居陽是有章美之才可以經緯國家而韜晦内含無智名勇功斷斷無技者也此盖臣道之正可守為常第居下之上責任難逃或出而從王之事不敢專成惟敷忠宣力而已依然一含章也象曰含章可貞以時發也或從王事知光大也含章可貞非一於韜晦正待時可為使章美之徳為事功也或從王事而无成有終者非无見也由其胸中知分固不可越而職不可不盡知事固不可先而為不可不勤非見淺近者所可比也六四括囊无咎无譽四重隂為過於收斂之人而不中又當世運閉塞之秋是為大臣者凡事謹宻不敢輕為善藏其用如括囊然如是則循分自安不要名不喜事自无僨事之咎而譽亦无從起也象曰括囊无咎慎不害也四當危懼稍露才智皆足賈禍惟以慎宻自持乃无敗事辱身之害六五黄裳元吉君道貴順而中六五秉中徳以居尊其本乎内者不偏不倚敷之於政而寛猛仁義適協於中其形諸身者不亢不驕敷之於治而易簡和平適調於順若黄之中色用以為裳之象如是則理道不拂天下大治矣象曰黄裳元吉文在中也黄裳元吉文治彰矣豈外襲哉由中徳在内故徽柔之治自發越於外耳上六龍戰于野其血𤣥黄隂盛忘分敢與陽争為龍戰于野之象以勢陽不能勝以理隂難獨存兩敗俱傷為其血𤣥黄之象象曰龍戰于野其道窮也陽非隂敵敢與戰者由君子馴致其道至於窮極而然耳若當始凝而早制之安有今日之禍哉用六利永貞坤固安貞者也六爻純隂似不能固守用六則變為乾健居心制行永守忠順安而能貞何不利焉象曰用六永貞以大終也陽大隂小健而不息惟大為能今用六順而有常其究與大一矣故曰大終文言曰坤至柔而動也剛至静而徳方坤之為道順而已矣所謂牝馬之貞者何退然無為柔之至也承乾而動氣至即發不可屈撓不可遏抑又至剛也寂然無事静之至也承乾之施因物各付不相假借不相凌奪徳又方焉方謂生物有常後得主而有常以坤之利言之乾固以美利利天下矣坤則至順至静從陽為職惟居後以為得而一主於利遂萬物者亘古不易而為有常之坤道焉含萬物而化光以坤之亨言之氣機未到生意内含不遺不泄及其一至中涵者無不著發外者無不被也坤道其順乎承天而時行以坤之元言之其後得順也其化光亦順也生萬物而不有其功成萬物而不居其徳坤道其順乎天賦以命坤即承以性天賦以氣坤即承以形因時而行不先不後何順如之積善之家必有餘慶積不善之家必有餘殃臣弑其君子弑其父非一朝一夕之故其所由來者漸矣由辨之不早辨也易曰履霜堅冰至盖言順也天下之事由積而成試以一家言之積善則慶流於子孫積不善則殃及於子孫積者餘之本也以此究小人堅氷之禍至於弑君弑父皆由為君父者於臣子不善之㣲不能早辨而逆折之故至於此易盖言當慎小人於㣲也順當作慎直其正也方其義也君子敬以直内義以方外敬義立而徳不孤直方大不習无不利則不疑其所行也二之徳所謂直者心之本體無所邪曲而正也方者心之裁制無所適莫而義也此已成之徳也實由以聖修成之吾心之直多以怠肆而失君子主敬而兢兢純一不為私欲屈撓則本體常惺不失其直矣吾心之方多由逆億而失君子守義而裁制萬物不為成見拘執則時措咸宜不失其方矣夫有敬而無義則偏於内有義而無敬則偏於外皆不得為大也今敬義夾持敬又行之以義則内非虚空而徳日進義又本之於敬則外非應迹而徳日新殆恢恢乎不期大而大矣易曰不習无不利盖言内外交修無意矜持自時出而不窮無意利用自順應而不滯也不孤言大也不疑无假于習也陰雖有美含之以從王事弗敢成也地道也妻道也臣道也地道无成而代有終也盖人臣之道王事可從而才必不可露一有自炫之心則敢于耑成矣三有章美之德既含之矣出從王事而又无成者豈才不足哉盖心安于分不敢專成也試以分類觀之凡分之所在皆道之所在也三之分居隂則其道為地為妻為臣夫地之為道承天代終而已妻道可知况臣道乎天地變化草木蕃天地閉賢人隠易曰括囊无咎无譽盖言謹也君子出處闗乎氣運之盛衰天地開泰而變化雖草木猶且蕃生况賢人有不出乎若氣運否塞道隨時否賢人固不終隠以沽名亦豈輕出以取咎易之云者盖言六四時當閉而隠宜守身退藏以俟時也君子黄中通理五何取于黄君子中徳養成於内徳極其中無可名象合而觀之但見其一理渾然融貫天下之理包括天下之道無不通而盡其大也分而觀之而通中之理品節極其詳明條理極其次序則又理而晰之精也中徳之美如此故象黄正位居體五何取于裳人君正位勢分在我易生驕亢五有中徳雖正位于上而猶執卑下之體身心之間不敢矜慢惟謙恭以下士平易以近民是帝王執中之治順之至也故象裳美在其中而暢于四支發于事業美之至也夫有中徳而通理居體如此則觀其體莫非徳之渾全觀其用莫非徳之燦著人君美徳在其中矣由是而見于四支不驕不亢一美所暢足以章身由是而見于事業不慘不刻一美所發足以華國夫充積未深著身未顯或不可以言美或不可以言至今不徒在内而在外不徒在身而在世其美何可加乎隂疑于陽必戰為其嫌于无陽也故稱龍焉猶未離其類也故稱血焉夫𤣥黄者天地之雜也天𤣥而地黄疑謂均敵而无小大之差也上六曰戰者何隂不敢抗陽分也然陰盛則勢與陽均而陽必與之戰矣戰曰龍者隂盛无陽已周公嫌其无陽也故稱龍以存陽之名而扶其衰又曰血者隂雖敵陽猶未離隂之類也故稱血以彰隂之類而抑其盛𤣥黄並稱者盖言勢陽必受傷于隂天之色雜于地言理隂亦見傷於陽地之色雜于天然雜者其變耳盖論其常天𤣥地黄固有定分隂終不能抗陽而戰亦何利哉聖人扶抑之意深矣震下坎上屯元亨利貞勿用有攸往利建侯震一陽動乎二隂之下其徳為動其象為雷坎一陽陷于二隂之間其徳為陷為險屯難也物始生而未通之意其卦以震遇坎乾坤始交而遇險陷故名屯草昧未辨非才不濟惟震動險中才能撥亂當得元亨此濟屯之機也然時尚在險庸愚固束手以待斃豪傑亦躁妄以隳功利于審時度勢而貞勿取僥倖欲速以往此濟屯之道也且大難方殷首貴収拾人心有徳望如初者利建為侯此濟屯之人也三者備而屯可濟矣彖曰屯剛柔始交而難生始交謂震難生謂坎卦名屯者乾坤之後一索得震為剛柔始交再索得坎為難生在天地為初闢在人事為初造故名屯動乎險中大亨貞屯何以大亨貞盖濟屯在才能動尤在能善其動卦徳震動險中是才足興撥可以出險而所以動者又必觀變審時未嘗苟且以赴功名之㑹故大亨而利于貞雷雨之動滿􅄹天造草昧宜建侯而不寧震雷象坎雨象天造猶言天運草襍亂昧晦冥也屯之所以利建侯者盖以隂陽交而雷雨作洪荒未闢塞于兩間是世運晦㝠時也濟屯者宜立君以統治于以定天下正名分可也然建侯之後人心未固治理猶疎必内切思患之防外圖救亂之術乃不寧而得寧也象曰雲雷屯君子以經綸雲雷交而未雨鬱塞未通屯象也其在天下則為屯難之世大綱弛而不張萬目缺而不舉正君有為之時也故治亂世猶治亂絲急則愈擾紛則愈煩必先總其大綱經以引之于前而後晰其條目綸以理之于後更張有漸屯難乃平初九磐桓利居貞利建侯磐桓難進之貌初陽在下才能濟屯而無時動體應隂志切濟屯而無助故遲回却顧象為磐桓然非乘利擇便盖靖難之時遵時養晦初之貞也毋欲速倖圖乃為利焉而此時天下無主則亂順人心以慰衆望宜自建以為侯也象曰雖磐桓志行正也以貴下賤大得民也迹雖磐桓難進而其志居貞俟時正欲行其正于天下也故至貴者徳人多挾之以自尊自利初則志在斯民撫柔綏輯民無不歸焉六二屯如邅如乗馬班如匪宼婚媾女子貞不字十年乃字二柔順中正才具經綸上應于五義定君臣其心非不欲進第乗初剛為豪強所阻不得進于五遇為屯邅班如之象然初之與二非為仇而害之實欲藉其才徳以建功親而比之也為匪宼婚媾之象但五則杳無㑹期初則慇懃不改情之所暱節易奪焉二惟守正不與初合如女子貞不字至于十年數窮理極自妄求者去正應者合而遂同心之孚為乃字之象象曰六二之難乗剛也十年乃字反常也以二純臣而有此難所乗者豪強耳能堅守貞自反君臣遇合之常可不貞哉六三即鹿无虞惟入于林中君子㡬不如舍往吝三隂柔才弱居下勢卑不中正无徳无正應无援本非濟屯之人乃不度徳量力妄行取困為逐鹿而无虞人陷入林中之象此由不能見㡬故至于此君子養定識超當逐鹿之先已知取困則宜安静而舍去若不知止而往必無濟而吝象曰即鹿无虞以從禽也君子舍之往吝窮也三之即鹿无虞者以其心躁進惟富貴功名之是從以身徇之如從禽之無厭也君子舍之者以無具冒進其窮必也六四乗馬班如求婚媾往吉无不利四已入坎大臣居屯隂柔才弱不能上進為乗馬班如之象幸初為正應居下以應于己乃四婚媾為四計者虚心求之藉其才徳以往則剛柔相得而吉世運可囬君無屯膏之患經綸盡試民有大得之休无不利象曰求而往明也四以大臣不諱求名而往則不蔽于自用而昧于任人明之至也九五屯其膏小貞吉大貞凶五以陽剛居尊雖有徳位陷于險中國運傾頽無時無勢矣雖有六二正應而隂柔才弱不足以濟初九得民于下衆皆歸之无輔无民矣九五次體有膏潤而不得施為屯膏之象時事至此以處小事而循分偏安則守正猶可獲吉以處大事欲有為于天下則雖正而不免于凶象曰屯其膏施未光也所謂屯其膏者盖天命已去人心已離雖陽徳所施本應光大澤壅不流未得遍被于天下也上六乗馬班如泣血漣如隂柔居上无才无助雖屯極将亨坐失機㑹人已兩失徒為憂懼故為此象象曰泣血漣如何可長也屯貴于濟徒為泣漣豈能長久坎下艮上蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞蒙昧也我謂二也童蒙幼穉而蒙昧謂五也其卦以坎遇艮山下有險蒙之象也内險外止蒙之意也故名蒙蒙雖知蔽行塞而純樸未琢一發即通有可亨之理然蒙者之得亨由于明者之善教九二以剛居中能發人之蒙者大凡教人自枉則道不尊強發則言難入我必不求蒙蒙來求我斯道尊而善入又将達而求達一問答而已多不達而求達百問答而亦少故求則可告猶待其誠如初筮則告若不誠而至再三則不告非養尊也正所以發其憤悱懲其怠慢也而其所以為告又必聖賢大學之正而弗襍以異端曲學之私乃得養蒙之貞而作聖克家俱可期望而利彖曰䝉山下有險險而止蒙卦名蒙者卦象山固峻而難升險又深而莫測卦徳心既危殆不安行又阻滯不達故名蒙蒙亨以亨行時中也匪我求童蒙童蒙求我志應也初筮告以剛中也再三凟凟則不告凟蒙也蒙以養正聖功也蒙何以亨盖二以先知先覺具可亨之道足以發人之蒙而又當可而施因才而篤先後淺深各隨其候得其時之中也匪我求童蒙童蒙求我以五志應二專心受敎學先立志也初筮告以剛中告而有節也再三凟凟則不告屢問屢答一啟其怠玩之心一窒其領㑹之趣當下不思後復不悟彼且滋其擬議測度筮者固凟而告者亦凟矣至告之必利貞者聖人一正也蒙心知能之良亦本正也從容涵養不誘以私不染以習此正不失赤子之初作聖之功也象曰山下出泉蒙君子以果行育徳山下出泉其源未逺其流未達未免壅滯有蒙之象君子以徳體于身為行則用果决之力無畏難無中阻行得于心為徳則用涵養之功勿助勿忘俟其自㑹内外交養而身心之蒙開矣初六發蒙利用刑人用說桎梏以往吝初以陰居下蒙之甚也敎之者當發其蒙然發之之道其始也不肅之以威蒙将玩而不信故利用刑人其既也不濟之以寛蒙將阻而不進故用說桎梏痛懲而暫舍之以觀其後乃為寛嚴相濟若一于往而過督則蒙苦吾道之難從而敎亦有所不入矣吝象曰利用刑人以正法也發蒙之初法不可不正利用刑人借督責以正吾之法使日就于規約也九二包蒙吉納婦吉子克家九二以陽剛為内卦之主是掌邦敎者剛而不過為能敷敎在寛合賢否而隨才造就為包蒙之象敎無不被吉又以陽受陰而于包蒙中昏昧之甚者盡能兼收于化誨之中為納婦之象則有敎无類曲成不遺吉凡此皆君事也二居下而能任上事則臣之克相无負于君猶子之克家无負于父之象象曰子克家剛柔接也子克家者豈獨二能敎哉二剛而五以柔應之其君接之也不特禮貌之崇實有委任甚專受敎甚誠之意故二得行時中之道六三勿用取女見金夫不有躬无攸利六三陰柔昏昧之甚不中不正陷溺之久良心盡喪行誼全无包之則不可發之无可發遇此當痛絶之不屑敎也盖其徇欲喪心猶女子見利失身取而告之止傷吾敎何利之有象曰勿用取女行不順也君子與人為善未嘗追既往而拒將來于三獨勿用取女者以其素行未慎徇欲喪心自暴自棄敎無如何也六四困蒙吝四逺于陽无嚴憚之師又无正應無切磋之友為困于蒙之象如是則愚不能明柔不能強可羞吝也能求剛明之徳而親近之則可免矣象曰困蒙之吝獨逺實也陽有剛徳所謂實也蒙宜近之初近二有發蒙之善五應二有童蒙之吉四獨逺于陽剛之賢故終于孤陋寡聞而吝六五童蒙吉五以柔中居尊下應九二是幼冲之主純一未汨虚心以聽師保之訓為童蒙之象如是則君徳成治業盛吉象曰童蒙之吉順以巽也蒙而不安于蒙所以終于蒙也五以柔順之徳又巽以聽于二是以本體之純為聽受之虚自能善從善入而吉上九擊蒙不利為宼利禦宼上九以剛居上治蒙過嚴為擊蒙之象夫蒙于擊何所利哉亦顧其用何如耳若用此而強以難知難行則阻其進機而為學者之害不利惟用此而保護其良知良能禁絶學者之外誘乃利擊之不可概用如此象曰利用禦宼上下順也蒙而用擊似非敷敎在寛之道第以嚴禦蒙敎者得養正之方不拂治人之道上固順也蒙因嚴而自禦已宼學者得作聖之功不拂治已之事下亦順也乾下坎上需有孚光亨貞吉利涉大川需待也乾健坎險以剛遇險而不遽進以陷于險待之義也故名需大抵陰多躁妄而無恒陽多沉毅而有守卦徳九五坎體中實以剛遇險是為君者治道已盡治效未臻所當需也然人君當此内而存心不本于忠信之安外而制事不出于當然之正皆非能需必心無欲速一皆真實而有孚則功利不障計較不生王心昭融而洞達光亨由是發為純王之政又必慮善以動不為行險僥倖之事而貞乃不妄行犯難允協時宜常固治定功成而吉即變而用涉大川亦能從容底定轉危為安而利矣彖曰需須也險在前也剛健而不陷其義不困窮矣卦名需者正須待無欲速也卦徳坎險在前時變當需豪傑處此未免奮臂争先兹以剛健臨之是聖人雖挟冠世經綸又切痌瘝之念知險能止決不遽進以陷于險此盖沉毅有守非止以巧智為規避者故勢若易窮于義不困矣需有孚光亨貞吉位乎天位以正中也利涉大川往有功也需以孚貞而吉者盖人君當天下之難必徳位兼隆而能有待九五陽剛居尊而有中正之徳不徒有其勢而無反無側置身皇極無苟且欲速之事而正不徒有其權而不偏不倚處心精一無喜功好大之心而中内外皆純故能如此以此涉川似乎奮勇者易為功恬退者難為力抑知濟天下事惟在沉潛本此孚貞以往自能觀變成功故利也象曰雲上于天需君子以飲食宴樂雲上于天待其自雨需象也君子以之出治政敎已盡不容更有所為但有孚貞吉身安而無所營為心恬而無所謀慮從容閒静如飲食宴樂可也初九需于郊利用恒无咎初逺于坎身處畎畝未近于險而陽又能守理亂不聞需于郊者也此即處需之恒所宜利用者果能安于義命有孚以待居貞以俟恬然若将終身則不降不辱身名兩全世難自不及矣无咎象曰需于郊不犯難行也利用恒无咎未失常也患難人所時有見幾逺遁自不與之相犯而行此即需之常也或為才使或為勢激便多失常終守此常所以无咎九二需于沙小有言終吉二漸近險欲進不安欲退不可故遲回觀望為需沙之象如是身雖逺禍而羣小見譏不議其不能潔身則議其不能濟險為小有言幸其剛而沉毅有守中而善處得宜終免禍患吉象曰需于沙衍在中也雖小有言以吉終也二之需沙固近于險然能以寛居中存諸心者安處優㳺而無欲速之念見諸事者行所無事而無作為之擾自能需而不進惟在中雖有小言卒能觀變逺害而以吉終也九三需于泥致宼至水涯之泥善陷三需于此是身當患難之衝需泥之象也使善處之宼猶可弭乃過剛則性躁不中則妄動冒進取險而宼禍之來適自我致之耳象曰需于泥災在外也自我致寇敬慎不敗也災在外已迫矣急需猶晚而况不能敬慎所以宼自我致也若未宼而慎安從陷害六四需于血出自穴血者殺傷之地穴者險陷之所四交坎體入乎險矣大臣身當國難為需于血幸柔得其正孚貞以處危行言遜非止束手聽命為能委曲挽回出穴以濟國難象曰需于血順以聽也四雖需于血矣然柔順以聽機㑹之自然未至不競既至不拂故終能出穴九五需于酒食貞吉九五陽剛中正治道已无不盡當此之時无為而需庶政之理無事而需百工之熈為需于酒食之象此治道之正也不欲速以累心不見小以動志天命自凝人心自戴而吉象曰酒食貞吉以中正也人主内一多欲即有求治太急之病中則心純正則守定有能需之徳故能得需之效也上六入于穴有不速之客三人來敬之終吉以陰柔之才當危急之極有志濟險而未能為入穴之象幸應九三與下二陽需極並進英雄豪傑憤亂圖功不召自至為不速三人來之象然大臣不能推心置腹彼将掉臂而去耳惟敬以待之精神意氣深相契合乃因人成功出險而吉象曰不速之客來敬之終吉雖不當位未大失也陰居險極才與時左雖不當位而敬以下賢資人出險未至大失也坎下乾上訟有孚窒惕中吉終凶利見大人不利涉大川乾剛坎險上剛以制其下下險以伺其上兩相猜也又為内險而外健兩相濟也又為已險而人健兩相敵也皆訟之勢也故名訟訟非美事必理直見枉情真受誣有孚見窒不得不訟然猶非得已必心存憂懼自訟于内而惕辨明即止無敢逞縱而中乃窒可通而吉若恃其有理而終訟不休則孚反窒而凶求見明斷大人以資剖決則窒始通而利如駕空求勝險如涉川則因虚喪實甚不利焉訟之有孚者其利害如此况非孚者而可訟乎彖曰訟上剛下險險而健訟以上下言上剛制下下險伺上以一人言内懷險詐外恃強健以兩人言已險能攻彼健能凌皆所必訟故名訟訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也不利涉大川入于淵也訟有孚窒惕中吉者以九二剛來雖有能訟之才而得中無好勝之念以理義自勝非以血氣勝人故吉何以終凶以訟非美事徳喪業隳怨深禍結理不可成也大人何以利見以五所尚中聽不偏正斷合理抱寃者宜見之也涉川何以不利以冒險求勝自投于淵也象曰天與水違行訟君子以作事謀始天上水下其行相違訟象也君子以人情相違有訟不起于相違之時而起于作事之始于事機之先防㣲杜漸訟端絶矣初六不永所事小有言終吉人之終訟大抵有才有勢者為之初六隂柔則才弱居下則勢卑中心畏懼不敢終事但辨明其見窒之情為小有言則情伸理白終吉象曰不永所事訟不可長也雖小有言其辨明也不永所事固是屈于才勢揆之于理訟不可長也雖小有言辯明即止所以終吉也九二不克訟歸而逋其邑人三百户无眚九二陽剛為險之主性暴謀深本欲訟者也第居柔得中能安于理應五又屈于勢故能屈服収斂邑人三百户邑之小者言退處卑約以免災患如是則不犯分賈禍何眚之有象曰不克訟歸逋竄也自下訟上患至掇也人不肯退讓多由終訟二不克訟宜其歸逋竄也所以然者以下訟上義乖勢屈禍患之來自取之耳敢克訟乎六三食舊徳貞厲終吉或從王事无成六三陰柔非能訟者惟守其常分安其正理為食舊徳貞焉如是不免見侮於人而厲終不賈禍而吉然食舊居貞之人無適不可即或從上之事亦處後而无成功守分必不越分固是如此象曰食舊徳從上吉也食舊徳者安常守分以從上而不自主其事所以得貞而吉九四不克訟復即命渝安貞吉即就也命理也渝變也九四剛則過暴不中則過當本欲訟者幸其居柔則知訟非理也亦非正也故不克訟而反其健訟之行以就于理且悔悟深切變其欲訟之心以安于正雖不能作事謀始亦自然改圖于後不至損徳搆怨吉象曰復即命渝安貞不失也欲訟即非正理失也四不克訟而復即命渝安貞則過復無過未為失也九五訟元吉陽剛中正以居尊位聽訟而得其平者也使有孚不至見窒而天下無寃民大善而吉之道也象曰訟元吉以中正也訟之得元吉者由聽之能中正也中則聽于未斷之先無偏主正則斷于已聽之後無過當所以元吉上九或錫之鞶帶終朝三褫之剛居訟極是以健訟之才濟以必訟之志終訟者也凶其固然假使倖而取勝有或錫鞶帶之象究竟是非情偽當自有辨不渝時而敗有終朝三褫之象盖終訟未有不凶者象曰以訟受服亦不足敬也終訟倖而取勝有如受服且不足敬况又有褫之之辱乎坎下坤上師貞丈人吉无咎下坎上坤伏至險于大順又惟九二一陽居下卦之中為将之象上下五陰順而從之為衆之象九二以剛居下而用事六五以柔居上而任之為人君命將出師之象故其卦之名曰師師危事也兵出無名事必無成君不擇将以卒于敵必順天人行弔伐而貞命将出師又必慎選臨事而懼好謀而成之丈人乃得戰勝之吉無窮黷之咎彖曰師衆也貞正也能以衆正可以王矣以用也卦名師者言伍兩卒旅衆之義也辭曰貞者言以仁義弔伐正之義也盖興師必以衆而動衆必以正卦惟九二一陽衆陰皆為所用是為将者能左右衆人歸于節制而正則為王者無敵命将者可以王天下矣剛中而應行險而順以此毒天下而民從之吉又何咎矣剛中謂九二應謂六五應之師旅之興不無害于天下乃貞而得丈人則吉且无咎者何也卦體二剛而中是為将者仁勇並行恩威兼濟而君又以事權委之得君之應卦徳坎險坤順是兵凶戰危實行險也而用以弔伐大順民心以此行師雖不免勞民傷財而毒天下乃時雨之師毒之正以安之也民焉有不恱從宜其吉且无咎象曰地中有水師君子以容民畜衆水藏于地猶兵藏于民師之象也君子以為外民置兵者擾臨敵募兵者晚若當无事之時兵民兩分則以民養兵天下不受兵之益先受兵之困矣故惟平居善其政敎田里樹畜以養其生則足民即所以足兵兵皆有勇孝弟忠信以養其性則訓民即所以訓兵兵皆知方容保于先如此他日折衝禦侮有備矣初六師出以律否臧凶在卦之初為師之始出師之道當謹其始賞罰嚴明行伍整肅以律乃臧否則無制之兵未有不敗凶象曰師出以律失律凶也師一出而國家存亡人民安危皆係于此苟不以律喪師辱國何凶如之九二在師中吉无咎王三錫命九二為衆陰所歸大将也而有剛中之徳則勇與謀合威以恩施正所謂丈人者以此而在師中自能不暴不柔戡亂奏凱有萬全之吉無敗績之咎然信任不專功何由立六五恩禮優渥有加無已錫命再三自權不中制威鎮三軍也象曰在師中吉承天寵也王三錫命懷萬邦也将在師中未有委任不專而能屈服衆心者二之得吉承天寵也然王三錫命豈私一将盖萬邦安危惟係一人王者天下為懷于元戎有特寵焉六三師或輿尸凶輿尸謂師徒撓敗輿尸而歸也以陰居陽才弱志剛不能守己量力而犯非其分故至輿尸而凶象曰師或輿尸大无功也不勝已為无功况輿尸乎殘民命損國威所喪大矣六四師左次无咎陰柔不中雖無克敵之才居陰得正則有量敵之智見時勢未利堅壁圖全有左次之象兵法尚右以右為前左為後次非怯也慮勝而左于理无咎象曰左次无咎未失常也知難而退用師之常左次以退為進于理无咎六五田有禽利執言无咎長子帥師弟子輿尸貞凶六五柔順而中不為兵端者也敵加于已不得已聲罪致討如田有禽利執言攻非所以為暴取非所以為貪何有窮兵之咎然出師固貴得正而用将又貴得人剛中如二老成長子也其使之帥師宜也若使三四少年弟子分參其權則輕舉敗事雖有執言之貞亦不免于敗亡之凶象曰長子帥師以中行也弟子輿尸使不當也帥師必用長子盖恩威並著恒以剛中之徳行師若弟子必至輿尸其罪不止在弟子也由使之不當也命将豈可忽乎上六大君有命開國承家小人勿用師之終則武功成順之極則天下定戮力功臣安可不報大君于是有賞功之命然賞不可無等爵必稱功功大開之以國功小承之以家無僭差無私吝乃見王者公天下之大然惟君子可以當此若小人有功固宜一體行賞苟用以預干國政必開多事之端使有爵土必有叛逆之釁但優以金帛可也此非不賞其功存其身安其爵也象曰大君有命以正功也小人勿用必亂邦也有功不賞與賞不當功皆足以生僥倖怨望之心命爵而有國家之别正其功之大小也若小人挾功以逞必至亂邦故勿用也坤下坎上比吉原筮元永貞无咎不寧方來後夫凶九五以陽剛居上之中而得其正上下五陰順而從之以一人而撫萬邦以四海而仰一人之象故名比比則天下歸心定于一統吉然人之比我比我徳也必再筮以自審果有元善之徳足以長人且無間斷而永無姑息而貞斯無忝于元后而无咎夫徳足比人人自仰化彼未比而有不寧者方來不已間有後夫而不來者自取誅伐而凶于王者無害惟原筮吾徳而已彖曰比吉也比輔也下順從也比何以吉也盖以比者親輔一人之義也卦體五陽居尊五陰從之是在下臣民傾心向化無不順從也原筮元永貞无咎以剛中也不寧方來上下應也後夫凶其道窮也剛中謂五上下謂五陰原筮元永貞无咎者以九五剛中心具天徳之剛而粹然一中存此不忍則為元運此不息則為永守此不襍則為貞純王之徳根于純王之心也不寧方來者上下應五是合臣民歸其徳也後夫凶者自外王化理當困窮也象曰地上有水比先王以建萬國親諸侯水比于地不容有間比象也先王以為得天下易保天下難以一人親天下難以天下親天下易于是衆建萬國而設廵狩朝聘之典以親諸侯令其承宣徳意各親其民則下情不阻于上達君恩不壅于下流有以比天下而無間矣初六有孚比之无咎有孚盈缶終來有他吉人臣事君勿欺為主初以進身之始遂能徹表徹裡精白一心而有孚焉即无欺君之咎然孚未易言也必使悃忱之念真實充滿即至世味日濃汨沒日甚終無一毫虚設一毫虧缺若盈缶然以至于終則忠貞自盡初固無望其他而精誠感格君寵之來若出意外終來有他吉象曰比之初六有他吉也格君貴孚孚在比初其吉宜矣豈待終而見哉于初已卜之矣六二比之自内貞吉人臣事君㣲有依附名節矜持意氣即非純臣二以柔中之徳應五其比君也皆本内所素養非舍所學以徇人者此正達不離道人臣之貞也故功成名立而吉象曰比之自内不自失也徇人者失已比之自内既非曲學以徇世又非枉道以逢君道義名節我自兩全何失之有六三比之匪人陰柔不中正是無徳無守承乗應皆陰是僚友共事皆姦邪不善為比之匪人之象象曰比之匪人不亦傷乎匪人何處無之吾比與不比耳試思匪人何人也而三乃比之清流禁錮奸黨誅求皆始于此况身心徳業之皆喪乎哀哉六四外比之貞吉以柔正之徳不内應初而外比五盖知五剛中而有純王之心顯比皆純王之政致其身以比明主而無内顧之憂所謂忘私忘家者也則得事君之正克襄顯比之治貞吉象曰外比于賢以從上也五以無私而比天下盖賢君也四外比之豈徒賢其賢哉君上臣下義無所逃明于從上所以比之親有徳者正以明有尊也九五顯比王用三驅失前禽邑人不誡吉凡用智用術要結為事者闇汶之道也比五剛居中尊五陰來比是以元永貞之徳比天下其道光明比何顯也上無私感失得勿恤如天子不合圍開一面之網來者不拒去者不追用三驅失前禽然下無私應從違不知不相警備以求必得如邑人不誡然此之治化上下與天地同流吉象曰顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也顯比之吉者以五正中無黨無偏惟精惟一故有此化也失前禽者本此心以建治徳怨不任順逆兩忘猶田者舍去之逆而取來之順無容心也邑人不誡者天下熈和化于中矣固云民情如是由上使之然也上六比之无首凶首出庶物必有元永貞之徳而後可上六陰柔居上徒有其位無徳以比天下是失民之元首矣故為无首之象衆叛親離凶象曰比之无首无所終也无徳居上終不能為人比獨夫而已何所終乎乾下巽上小畜亨宻雲不雨自我西郊巽陰畜乾陽一陰畜五陽又陰畜陽而不能固故為小畜夫陽為陰畜似難得亨然内健外巽有可為之才三五剛中有得為之勢君子猶可伸其志于小人方盛之時亨然其所以亨者雖君子有可行之道亦小人之畜未極其黨未盛其謀未肆如密雲起自西郊而尚不雨之象彖曰小畜柔得位而上下應之曰小畜柔得位指六居四上下謂五陽以六居四是一小人畜據髙位而衆君子為其所制以小畜大故為小畜健而巽剛中而志行乃亨畜何以亨下乾上巽是内能剛毅決斷張主于中有秉道嫉邪之念而健外能紆徐慎密處事順理無恃壯用罔之為而巽二五剛徳之君子又居中用事權未盡移才勢俱猶可為不至激小人之變而志所由得行乃亨密雲不雨尚往也自我西郊施未行也密雲不雨者以畜未極而吾道之正氣猶得尚進是以小人雖得用事如雲起西郊未展其施不能行毒害于君子也象曰風行天上小畜君子以懿文徳風行止于天上未能解散及物又能畜而不能久小畜之象也君子于此未能風動天下亦當章美一身故于威儀則致其飾而使動止有度辭氣則致其善而使言語有章使發于外之徳粹然章美而已初九復自道何其咎吉初乾君子雖與四陰正應而居下相逺不為所畜其進而復于位也為能自守以正不由比昵不借引援而一以自已道義為復者也何有枉已之咎且有行道之吉象曰復自道其義吉也凡人自處非道小人即得乗間而畜復曰自道則正己可以正人其為吉也可以義斷矣九二牽復吉二漸近陰易昵小人乃其徳剛中既非阿附攀援又非意氣用事故能與初牽連以復同道彚征吾道可行吉象曰牽復在中亦不自失也復而曰牽似乎借交以進乃中以行正不流不倚盖以道義為復者故初復自道能不自失二亦如之九三輿說輹夫妻反目九三剛而不中無自守之節迫近于陰多比昵之私是援結小人以進卒為所制舉動不得自由為輿說輻之象然其志剛不甘受制又激而與之爭為夫妻反目之象總之復不自道以至於此爭何益哉象曰夫妻反目不能正室也自處不以正而受制於小人猶夫不能正室而妻得以制之也六四有孚血去惕出无咎以一隂畜衆陽本有傷害憂懼以其柔順得正虚中巽體是有孚信之徳結于五上者積誠所感自來正人之助而謀兼衆智動屈羣力則身可無傷心可無懼為有孚血去惕出之象大臣如是相責塞矣无咎象曰有孚惕出上合志也四惟有孚固結於上能使上之二陽來合吾志乃能同心協力而惕出不然豈一陰所能制哉甚矣孚之要也九五有孚攣如富以其鄰巽體三爻同力畜乾鄰之象也九五居中處尊心之孚誠既足以感衆志力之富厚又足以屈羣力為有孚攣固富以其鄰之象以言能左右之也象曰有孚攣如不獨富也自古賢豪皆願奔走馳驅以為世用然必人主推心置腹五惟以心相結故能羣力相協豈獨以力強人哉上九既雨既處尚徳載婦貞厲月幾望君子征凶上雖陽爻而居巽體亦陰類也陰陽不病於相爭而病于相和陰畜之極陽不與亢而與之和小人之施行向之不雨者今既雨矣君子之道阻向之不處者今既處矣所以然者由君子尊尚陰徳至於積滿而然也然豈小人之福哉在小人不可不戒論理以小人之邪加君子之正失其常分如婦制夫雖貞亦厲况不正乎然在君子不可不慎論勢則陰盛陽衰如月之㡬于望而征必受害而凶君子可不靜俟乎象曰既雨既處徳積載也君子征凶有所疑也既雨既處由君子不能防之于早釀成其徳積而至於載當此而征小人必疑相傾相軋故凶兌下乾上履虎尾不咥人亨以兌遇乾是以柔弱之臣遇剛毅之君所履至危故為履虎尾之象幸以悅遇剛小心恭順足以潛消嘿格不但斥辱不加亦且素履可展為不咥人亨之象彖曰履柔履剛也以柔臣遇剛君我勢易陵彼勢易逞履非所履也英明果決動有危機故為履說而應乎乾是以履虎尾不咥人亨履危何以不傷兌説應乾人臣不拂不激柔非委靡說非徇媚自能霽威而行素願是以履危而亨剛中正履帝位而不疚光明也所謂應乎乾者以五居尊不徒神謀雄斷而剛且精一執中無為表正徳稱其位無疚于心由是發于事業治道炳然光明矣得若君為之主而悅以應之故亨象曰上天下澤履君子以辨上下定民志天在上澤居下不易之定分也君子以為天下不治由于民志之不定民志不定由于上下之未辨于是因其定分制為典禮以辨之貴賤尊卑各有定分車旂衣服各有定器凡若此者正以定民之志使不敢有越分也志定而天下之治成矣初九素履往无咎初九陽剛素有抱負在下居仕之始志節方銳故其所行无非素履以是而往上不負君下不負民中不負吾所學何變塞之咎象曰素履之往獨行願也君子未仕莫不有行道之願但修之于家而壞于天子之庭則得行其願者鮮今素履而往幽獨之中君民為念確然不拔非功名富貴所能移也九二履道坦坦幽人貞吉道在天下坦然平易所當履者也九二剛中有自守之操在下未為斯世之用無應是無汲引之人居易以俟無入不得為履道坦坦之象人世風波即在富貴二能如是此真幽閒淡漠之人世艷不攖得潔身之貞頑廉懦立有可儀之吉象曰幽人貞吉中不自亂也富貴利達誰能亂我吾心自為亂耳九二剛中則有定見定守充然自足於中脫然無慕于外故為幽人貞吉非與山林之士在外矯強者比也六三眇能視跛能履履虎尾咥人凶武人為于大君六三柔而志剛是才徳不足果于自用本無見事之明乃自智焉如眇自謂能視本無任事之勇乃自雄焉如跛自謂能履剛暴如此無一可者以此事君非說而應乾者也勢必犯順觸禍如履虎尾咥人凶以此治人非剛中正而履帝位者也徒為播惡于衆如武人為君得志肆暴豈能長久象曰眇能視不足以有明也跛能履不足以與行也咥人之凶位不當也武人為于大君志剛也人惟自以為能即多不足眇而自謂能視實不足以有明跛而自謂能履實不足以有行咥人凶者以無和悅之徳履乾必傷也武人為于大君者以其志剛無中正之徳必播惡于衆也九四履虎尾愬愬終吉四處大臣之位近英明之君而以不中不正履之則權侔人主才名震君正危機所伏如履虎尾焉幸其以剛居柔因危知懼愬愬敬畏以事其上則疑忌潛消始危終吉象曰愬愬終吉志行也得君行道人臣之素志也四能愬愬自不疑而信任專生平之志無不行矣然則大臣欲行其志豈可炫才使氣哉九五夬履貞厲五剛中正是才能有為履帝位勢又可為下以兌悦應之又將順其所欲為凡事必行無所疑碍為夬履之象乾剛獨斷雖為君之正道而任情取敗亦危道也故貞厲象曰夬履貞厲位正當也五以雄才大畧之君而至夬履貞厲者以所居者正則恃其才當則恃其勢所以果于自用無持重之心以至此也位以居言上九視履考祥其旋元吉人君自修人事之外並無天道上九居履之終當凡事既成之後不求履之應于天但求履之旋于已故當視其所履以考其祥蓋祥生于所履祥者福之兆履之善也必不敢自寛虚心反照果所行者盡善盡美終如其始無少虧欠無一瑕玷斯當天心協人望元吉象曰元吉在上大有慶也人情鮮終元吉最為難得兹在上而能得此不特一人之慶天下宗社之慶也豈不大哉乾下坤上泰小往大來吉亨乾下坤上于時為天地交泰貞元㑹合故為泰氣運開泰之日正世道清明之時陽方日進隂方日退是小人退聽君子滿朝志無不遂而吉道無不行而亨治道與世道並隆文運與國運俱泰正其時也彖曰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也内陽而外陰内健而外順内君子而外小人君子道長小人道消也天不能無陰地不能無柔人不能無小人今泰乾坤相交則是觀之造化天下濟地上行以氣交而萬物化生無不通也觀之人事君下交臣上應以心交而道濟之志無不同也其所以通與同者皆係于君心理欲邪正之辨盖乾為陽為健為君子坤為陰為順為小人内乾外坤是君心所存皆陽明之善而陰暗不足以累之也君心所發皆剛健之徳而柔順不足以襍之也是以信而順者皆君子疎而逺者皆小人惟内君子則福國庇民之道漸長惟外小人則蠧國害民之道漸消君志如此所以共成其泰象曰天地交泰后以財成天地之道輔相天地之宜以左右民天地交而成泰然無聖人參贊不能為功于天下故元后于是有開泰之道焉以化之自然曰道聖人裁而成之如察四時經九野定五倫則氣化無或過矣道之當然曰宜聖人輔而相之如用天時因地利秩人倫則形氣無限于不及矣若此者正以左右斯民令其遂生復性得以道其所道宜其所宜而開萬世之泰也初九拔茅茹以其彚征吉三陽在下相連而進是一人倡之羣賢從之為拔茅茹之象如是以征同志之賢自成輔泰之業吉象曰拔茅征吉志在外也初豈植黨者哉君子志在天下不在一身初與二陽同志故其進亦同也九二包荒用馮河不遐遺朋亡得尚于中行九二以剛居柔在下之中上有六五之應主乎泰而得中道者也太平之世情安法弛然驟振則撼遽釐則擾必待人恕處事寛而包容荒穢然罪必誅弊必革用馮河之勇焉且舉及側陋圖及隠㣲精密之思無一事遺于外而不遺于遐逺又不昵近習不玩目前公忠之念無一人比于内而朋比是亡全此四者而剛柔合宜各得其中寛嚴相濟共成一中不養亂不激變則配合乎中行之道矣象曰包荒得尚于中行以光大也荒而曰包似乎優容太過其得尚于中行者何盖中心蔽者有中而不能察中心隘者有中而不能容九二之心無不洞徹昭察乎人情世態之㣲而不蔽于一偏無不容納善藏乎神明變通之用而不紊于所施故無所偏執而中行之粹皆心之純也九三无平不陂无往不復艱貞无咎勿恤其孚于食有福恤憂也孚所期之信也九三將過乎中泰將極而否欲來之時也以天言之世道無常平而不險陂以人言之小人無常往而不復來此天運循環信有必然而可恤者夫治亂相仍者天也保其治而不亂者人也必艱其思慮内存兢業貞其施為外復詳審不以勢盛而侈不以時平而玩人事已无可咎自是天運黙回平者常平往者常往即有一定之孚不必憂恤而太平之福于焉可食矣象曰无往不復天地際也三當盛時而曰无往不復非過計也否泰之運天地為之此際挽回少遲則無及矣可不艱貞乎六四翩翩不富以其鄰不戒以孚已過乎中泰已極矣故三陰翩然而下復其力之協也不待富厚而類從其心之孚也不待戒令而自信小人合交以害正道君子所當戒也象曰翩翩不富皆失實也不戒以孚中心願也陰本居下小人據高位失其分之實也不戒而即孚者由其素願也君子可不圖之哉六五帝乙歸妹以祉元吉以陰居尊為泰之主柔中虚已下應九二是大君忘勢下賢而不有其尊與帝女下嫁而不有其貴一也如是則賢才得而理道昌非一身一家之福矣元吉象曰以祉元吉中以行願也任賢保泰人主之素願也然有願而不能行者以邪䜛貨色之為累耳五有中徳則清心寡欲自能如願元吉上六城復于隍勿用師自邑告命貞吝積治成泰猶積隍成城上六泰極而否城復于隍之象時勢至此難以力爭故師勿用但當反已自治修其政令以維持之如告命自邑可耳然不能圖于未亂而欲收于既壞雖所行之事皆是收人心凝天命之貞亦不免于羞吝象曰城復于隍其命亂也城復于隍豈曰天命由政令之不修以至紊亂命亂故復否告命所以治之也豈可付之于不可為乎坤下乾上否之匪人不利君子貞大往小來匪人謂非人道也二氣閉塞而成否否則三綱淪九法斁非復人道之常君子正道決不能行惟時君子斂迹小人得志為大往小來之象彖曰否之匪人不利君子貞大往小来則是天地不交而萬物不通也上下不交而天下无邦也内陰而外陽内柔而外剛内小人而外君子小人道長君子道消也否與泰反在天地二氣鬱而萬物屯在君臣驕諂盛而國事非在造化肅殺殷而生機少在人心柔邪熾而天徳絀小人用事君子播棄此貞之所以不利也象曰天地不交否君子以儉徳辟難不可榮以禄坤下乾上天地不交否象也君子當此小人道長之時必不能容然小人以爵禄相榮君子就之則失身逃之則賈禍惟收斂其徳以避小人之難使人不得以禄位榮之乃善于處否之道也初六拔茅茹以其彚貞吉亨三陰在下相連而進為拔茅以彚之象然勢不可遏而心猶可回果能變邪為貞不植黨以害君子則上福國下庇身不特吉而且亨象曰拔茅貞吉志在君也小人傷害祇為身謀既能變為君子自以愛君為念而不計其私矣六二包承小人吉大人否亨陰柔而中正小人而能包容承順乎君子之象此小人之吉也然在大人則當安守其否而後道亨盖不可以彼包承于我而自失其守也象曰大人否亨不亂羣也君子豈能不與小人為羣但不以包承之故為其所亂則其道猶可亨耳六三包羞以陰居陽而不中正小人志于傷善而未能也故為包羞之象若終包而未發亦可免于凶咎象曰包羞位不當也六三包羞才不足以濟其奸也不然豈終于包乎九四有命无咎疇離祉君子處世不患無可為之時惟患無可為之道九四當過乎中之時是否極將濟在天已有開泰之命而有不極其剛之徳是反亂為治在人又有致泰之功從容幹旋人事之无可咎者正其凝命以轉泰也寧獨一身受福哉疇類三陽皆得上進而麗福祉矣象曰有命无咎志行也當否之時孰無休否之志但天時未至人事未修終于未能耳今有命无咎則人能合天不同矯逞以圖有濟志安有不行哉九五休否大人吉其亡其亡繫于苞桑否不可有亦不易傾五剛中正徳位兼隆為能撥亂反正以休天下之否此大人之凝天命合人心也吉然患生于忽不可以休而自肆必雖休勿休時懷危亡之懼所以致治者无不至防亂者無不周而後不拔之業如繫苞桑之固矣象曰大人之吉位正當也秉徳乗權方能休否正有濟世之徳當有濟世之權大人乃能成功而吉上九傾否先否後喜以陽剛當否極是當得泰之㑹而有濟否之才能傾時之否者也方其未傾不能無憂及其既傾太平之喜可知象曰否終則傾何可長也上九居否之終其勢必傾况有傾否之才豈有長否之理離下乾上同人于野亨利涉大川利君子貞同人與人同也于野謂曠逺而無私也為卦以離遇乾火與天其性同二應五其徳同又卦惟一陰而五陽同與之其情又同故為同人君子之與人也必大公無我家天下人中國同人于野焉乃同心協力者衆無往不通而亨即險可濟而大川亦利涉焉然概曰同人不論可否不擇是非與世浮沉雖盡天下而與之終是私情之合而已必合于君子之貞以理而不以情以公而不以私始非比周為黨而得同人之道乃為利也彖曰同人柔得位得中而應乎乾曰同人柔謂六二乾謂九五得位謂六居二得中謂卦之中卦名同人者以二柔中之徳應五剛中之君所謂一徳交孚君臣同于朝也故曰同人同人于野亨利渉大川乾行也文明以健中正而應君子正也唯君子為能通天下之志同人于野而亨且利者盖大道之公非健不能以乾而行則剛徳勝而私情絀隨所往而皆利也利君子貞者卦徳文明而以健行之是和同比周之介晰之精而公私從違之間決之力六二中正而五應之是我以道同于人而非私昵人亦以道與我而非私比内外人已皆君子之正道也正則天下之志通于此矣盖人同此心心同此理吾得其所謂正即得其所謂通通天下之志乃為大同象曰天與火同人君子以類族辨物天在上而火炎其上其性同也故曰同人君子以欲致同必先審異天下一定之名分曰族如士農工商皆族也族不類則相越而害其同名以命之使親疎貴賤各得其分天下不同之名器曰物如車旂服飾皆物也而族中之物原自有辨物不辨則相競而害其同器以别之使等威度數各昭其則則天下絶無僭亂參差之弊合乎君子之正矣初九同人于門无咎初剛在下于己無私心上無係應于人無私與周而不比同人于門之象自无偏黨之咎象曰出門同人又誰咎也同人而人得以咎之者必其心有私也今初出門同人則四海皆兄弟矣親不得議其黨疎豈得議其薄乎六二同人于宗吝宗黨也六二雖中且正亦能同人然有應于上不能大同而係于私同人于宗之象夫所感者私則所應者狹吝象曰同人于宗吝道也君子同人當以天下為一家今但于宗私而且狹吝之道也九三伏戎于莽升其高陵三歲不興同人貴同然非強其類以為同也三剛而不中是強暴而妄同上無正應又寡援而急同欲同于二而非其正懼九五之見攻于是内懷不測之心外起窺伺之計象猶伏戎于莽以敵五攘二也究之理勢俱屈終不能興象曰伏戎于莽敵剛也三歲不興安行也恃其勢力將以敵剛屈于理勢終不能行妄同之無益如此九四乗其墉弗克攻吉四剛不中正而妄求又無應與而急求亦欲同于六二而為三所隔恣憑陵之志結非分之援為乗墉以攻之象然以剛居柔能惕然自反于理為弗克攻之象如是是能改過而不召禍吉象曰乗其墉義弗克也其吉則困而反則也四既乗墉非力不足也二五相應義之常也四欲與同非義矣故弗克也其所以吉者義即同人之則奮然儆省能以義斷困而反于法則之中也九五同人先號咷而後笑大師克相遇五剛中正二以柔中正相應于下同心者也而為三四所隔不得其同故先不免于號咷然義理之正邪不得而間之終必得合故後必至于笑然六二柔弱君子易退三四剛強小人易進為君者必剛毅獨斷不惑䜛邪如用大師以克之然後得相遇也象曰同人之先以中直也大師相遇言相克也中正以應理本直也直在同之先矣小人豈得間之必大師相遇者盖邪正不兩立君心惟斷乃與正合勸其克也上九同人于郊无悔居外無應物莫與同是孤介獨行无心于天下蕭然與寂寞之士為侣為同人于郊之象如是避世雖非大同亦無比昵无悔象曰同人于郊志未得也同人之志必通天下而後得今曰于郊則離羣索居與視民物為已責者大相反矣安見為得志乎乾下離上大有元亨大有所有之大也離居乾上無所不照有人君照臨萬國之象又六五一陰居尊得中而五陽應之有天下仰戴一人之象故為大有然大有者勢而治有者徳乾健離明徳本諸身居尊應天徳徴諸民是以禮樂政刑極其精詳而推之四海無所不達大善而亨也彖曰大有柔得尊位大中而上下應之曰大有卦名大有者五以柔居尊有天子之位居上之中有大中之徳上下五陽應之又有其輔徳位兼隆臣民效順天下大一統矣故不徒曰有而曰大有其徳剛健而文明應乎天而時行是以元亨大有固以其勢之盛矣而所以成其有之大者實以其徳大凡人主出治柔而不健則知善而不能舉知惡而不能去健而不明則前有䜛而不見後有賊而不知其徳乾健離明是内則雄謀神斷外則睿知聰明徳之本諸身者純矣以此運治法天之健憲天之明而以時出之時乎斷時乎以不斷斷時乎明時乎以不明明自剛不失之于刻明不失之于察而盡制作之善以極治化之隆而得元亨象曰火在天上大有君子以遏惡揚善順天休命火在天上所照者廣為大有之象所有既大無以治之則釁孽萌于其間矣故應天君子以惡足以累吾之有于未著則遏而絶之以善足以輔吾之有于隠㣲則揚而顯之若此者以有善無惡乃天命之本然遏所本無非私怒揚所本有非私喜不過順天休美之命以為保有計也初九无交害匪咎艱則无咎豐侈之時驕奢易生人每多害初以陽居下而在事初是私感未起尚大未萌未涉盈侈之害匪有縱敗之咎然恃其无咎而易心處之究必至于多害惟艱以持之撙節抑損守其无交害之心乃終无咎象曰大有初九无交害也大有之始陽剛居之初心未變无交故无害也安能必其終乎甚矣艱之為要也九二大車以載有攸往无咎大臣輔有最難勝任二以剛中應五抱負既𢎞委任又重是以文武常變之才而濟投大遺艱之責如大車以載然以是而往才全徳備肩𢎞任鉅无弗勝之咎矣象曰大車以載積中不敗也小小才能不堪國事才徳充積于中自不覆敗九三公用亨于天子小人弗克三以剛正之徳遇五虚中之君是人臣自靖凡嘉謨嘉猷或先事而為治有之規或後事而為保有之道無不獻于我后猶公侯朝于天子而方物畢貢之象此惟君子能之若小人當大有之時但獻讒徇諛而已豈能如是象曰公用亨于天子小人害也論思獻納君子能之若小人容悅為事蠱君心禍家國害不可言矣九四匪其彭无咎剛近柔主權位太盛所謂彭也若不深自退抑是以盛處盛矣九四幸而居柔故能小心敬畏威福予奪一聽天子操縱無敢僭踰不以寵利居成功而匪有彭焉如是則上不疑其僭下不忌其專何咎之有象曰匪其彭无咎明辨晳也四之不極其盛由其明尊卑之分知臣不可以凌君燭盛衰之機知滿必至于招損辨之至晰故能如是六五厥孚交如威如吉大有之世柔順而中以處尊位虚已以聽九二之賢而上下歸之是其推誠任賢孚信之極足以固結臣民之心而使之交相契洽為厥孚交如之象然君道貴剛太柔則廢遏惡揚善斷然以威濟之而不牽于情欲乃懷徳畏威有可永保吉象曰厥孚交如信以發志也威如之吉易而无備也孚至于交君臣一其志矣何以能若是哉盖惟一人之信孚乎九二其精誠所感有以發上下之志也又必威如而吉者盖以太柔則人將易之而无畏備之心也上九自天祐之吉无不利盛滿在上天之所忌然以剛居上而能下從六五是能滿而不溢履信思順而尚賢也賢者天之命也上能尚之則祐在身福祉聯臻而吉祐在天下則清和咸理而利象曰大有上吉自天祐也處有至上宜難得吉而兹獲祐豈倖致哉由其尚賢以格天而天祐之也此不測之寵綏若有定之昭格人主安可忘所自哉艮下坤上謙亨君子有終卦徳内止外順是心不肆而行不驕謙之意也卦象山髙地卑是山至髙而地至卑謙之象也故為謙謙為美徳人所同好以之待人守已行无不通亨然不獨亨于一時而已謙徳君子為能常謙而不失徳愈尊而名愈顯始雖不居其有終則不沒其有故能成就而有終彖曰謙亨天道下濟而光明地道卑而上行謙而曰亨盖謙雖為人道而天地亦然天非下濟化育之功不能光明地惟順承效法之能乃能上行謙則必亨天地且然而况于人乎天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也又曰君子有終者博觀之天地鬼神以推之人天道如日月升沉寒暑往來是虧盈而益謙也地道如山川增損陵谷遷移是傾盈而流謙也鬼神如降殃降祥作福作災是害盈而福謙也又何疑于人道予奪進退是非褒貶無非惡盈而好謙也故人誠能謙自為人好不為人惡以之居尊則徳因謙益顯雖忘其尊而光自不可掩以之居卑則徳因謙益隆雖守其卑而人自莫能踰此君子所以有終也象曰地中有山謙君子以裒多益寡稱物平施以卑藴高謙之象也君子以為人己之間本有當然之則人情盈滿處多謙抑處少則應物之間􅊠昂不平矣于是裒損其自滿之心以律己增益其謙遜之念以待人則人己兩忘渾然無我若皆稱量乎物自然之宜而施之適當其可无不得其平也初六謙謙君子用涉大川吉隂柔有能謙之資處下有謙虚之度雖非足恭以待人而退讓之道已極其至謙而又謙之君子也用此道以涉險人莫不樂吾之謙而出險之功可成吉况于常乎象曰謙謙君子卑以自牧也人之驕心客氣每易發而難收非重自抑損不能降之使馴謙之君子由平日慮以下人之心自養故不期謙而自謙也六二鳴謙貞吉柔順有謙之心中正得謙之道其為謙也充内著外有不期鳴而嘖嘖在人口者此非矯情干譽貞也而邦家俱達行無不亨吉象曰鳴謙貞吉中心得也鳴謙似乎外飾二豈聲音笑貎為哉實由謙徳積中心之所得而非自鳴也九三勞謙君子有終吉三以一陽居下之上位高任重者也以剛正之徳為上下所歸是功在民社自視欿然所謂勞謙君子也是則功莫與爭而徳望不衰朝野推重功名永保有終吉象曰勞謙君子萬民服也功高而量又宏不惟天子讓忠百官讓徳萬民且服其勞而能謙矣可見人道之好謙也六四无不利撝謙柔而得正上而能下不疑不忌行无不利然位居功臣之上更當推賢讓能實存不敢自安之意發揮于容貎詞氣之間也象曰无不利撝謙不違則也撝謙似乎太過孰知功不及三而位過之揆之當然之則固當如是非為足恭以求容而免忌也六五不富以其鄰利用侵伐无不利以柔居尊是不驕不亢君之能謙者也故不待勢驅而臣民悅服為不富以其鄰之象盖從之者衆矣猶有未服者則利以征之然能謙如五豈待征伐為利哉以此臨民而百姓安以之主祭而百神享无所施而不利也象曰利用侵伐征不服也五為謙主何以利用侵伐哉為負固不服不得已而征之非尚威武也上六鳴謙利用行師征邑國謙極有聞人所樂與即用行師亦利惜其居柔非戡亂之才無位非奉天之討故止可征已之邑國此固才位所限而于謙徳無損焉象曰鳴謙志未得也可用行師征邑國也上之鳴謙宜大行其志于天下然才力不足不能大有所為而服逺之志未得也是以雖用行師亦但征其所屬之邑耳安能威服天下哉坤下震上豫利建侯行師卦體人心協應卦徳以順而動故為豫凡事以得人心為本豫則樂以天下得天下心非僅驩虞小補矣故大事可為即如封建諸侯所以統衆也而萬姓歸心誅討行師所以動衆也而三軍用命其利如此况其他哉甚矣人和為貴也彖曰豫剛應而志行順以動豫卦名豫者四以一陽上下應之朝野傾心惬其得中之志也然任剛而動未免乖宜以坤遇震為以順而動動于一身喜怒哀樂本于履中蹈和動于天下禮樂政刑出之大公至正自念慮以及事為皆合天理以協人心故天下和平而豫豫順以動故天地如之而况建侯行師乎利建侯行師者盖以主豫者既順以動則一理所感上下協應天地亦如我之順動而不違矣而况建侯不過為天地立君行師不過為天地討罪有不協人心之應乎天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉以順動極言之豈惟建侯行師為然哉即天地聖人亦不能外通復之間順理而布日月各循其度四時各順其序張弛之際順理而行則不煩刑罰而萬民自服可見順動者豫之時義也而成化成治俱由于此不大矣哉象曰雷出地奮豫先王以作樂崇徳殷薦之上帝以配祖考雷出于地而後聲奮和極其至豫象也先王法之以作樂聲容具備用以闡揚其功徳之盛且大用之以洽天人之休冬至祀天于圜丘而配以祖尊之也季秋祀帝于明堂而配以考親之也樂至洽神人和上下豫莫大焉初六鳴豫凶初陰應四是小人憑藉權門得時主事不勝其豫而夸耀以自鳴者也招權鬻爵是自求禍凶象曰初六鳴豫志窮凶也豫初即鳴其志已滿安得不凶六二介于石不終日貞吉豫雖主樂易以溺人六二中而得正是上下皆溺于豫獨能以中正自守其于理欲之辨已精而守之介然如石焉其徳安靜而堅確則其思慮明審不俟終日而見凡事之幾㣲也如是則得操持之正而無迷惑之失貞吉象曰不終日貞吉以中正也逸能迷徳利每致昏二惟有中正之徳故能私欲盡而義理明智慮極而幾先炳自不終日而吉也六三盱豫悔遲有悔陰不中正而近于四是無介然之守而依附取寵以為豫者也能無悔乎翻然速改可也若溺于豫而遲則終有悔矣象曰盱豫有悔位不當也近四何傷无徳所以有悔豫非溺人人自溺耳九四由豫大有得勿疑朋盍簪四為卦主一陽而上下應之是大臣一身君之安逸民之樂利皆能致之由豫者也夫以一人而致宗社生靈之福不亦大有得乎然所藉以保天下之豫者實惟天下之才而才非嫉忌者能致必先去其疑之一念勿外信而内疑勿始信而終疑斯英賢朋集如盍簪矣象曰由豫大有得志大行也大臣以悅安天下為志由豫大有得則大遂其志矣六五貞疾恒不死當豫之時以柔居尊沉溺于豫縱欲之君也又乗九四之剛衆不附而處勢危故為貞疾之象幸其得中流風善政猶有存者天命人心尚存一綫故為恒不死之象象曰六五貞疾乗剛也恒不死中未亡也疾而曰貞以所乗者剛權歸于下勢孤于上也以是而猶恒不死者全在政敎未盡亡也上六㝠豫成有渝无咎陰居豫極縱情不反為㝠于豫幸震體能動覺性猶存一旦翻然改悟則㝠者覺矣故又為㝠豫之事雖成而能有渝之象如是則過復無過无昏迷之咎所以廣遷善之門也象曰㝠豫在上何可長也欲不可縱㝠豫而曰在上豫已極矣可長久哉當速渝焉可也震下兑上隨元亨利貞无咎隨從也震動兑悅是人主徳足致人之隨而人自隨之故為隨朝野一心治化洋溢其亨大矣然隨由悅致悅則易私挾數用術以相要結皆非純王之道必利于大公无我之貞乃无違道干譽之咎彖曰隨剛來而下柔動而說隨卦名隨者卦變剛來下柔是君有徽柔之徳而剛徳之佐來而下之臣隨于朝卦徳此動彼悅是君有振作之才而天下之民悅而附之民隨于野故為隨大亨貞无咎而天下隨時隨固可元亨矣而必貞乃无咎者何也天下人心可以徳孚不可以私合惟以正致人之隨而非勢要惠結臣民乃無弗從隨時之義大矣哉天下大矣隨一出于正而天下無不隨可見貞者隨之時義真聯屬天下之要樞非驩虞小補之陋術豈不大哉象曰澤中有雷隨君子以嚮晦入宴息雷藏澤中隨時休息隨之象也君子以為造化非入無以養其出人心非靜無以養其動于嚮晦時入而宴息焉盖人不夜息則氣耗虚擾靜不致功則本體不定皆無以為進修之本故必寧神于靜養氣于恬淡其心于何思何慮凝其心于勿助勿忘保其時止之體以為時行之用體隨其至矣初九官有渝貞吉出門交有功以陽居下為震之主隨之官也既有所隨則廓然之胸變而有所偏主非心之初矣為官有渝然亦顧所隨何如耳隨而不正謂之黨隨而不廣謂之狹必所隨以貞因不失親始無比匪之傷而受親賢之益吉然又必出門以交公而不私廣而不隘不生客氣不昵先入不棄㣲瑕不忽蒭蕘惟賢是從乃貞之量始滿而收麗澤之功象曰官有渝從正吉也出門交有功不失也官既渝矣何以得吉隨道貴正惟從正則不私故吉也出門交有功者隨道貴廣惟不私則于隨之正道不失矣六二係小子失丈夫初陽雖近才徳未成小子之象五陽雖逺實為正應丈夫之象二之所當隨者自在五而不在初乃陰柔無守而係戀庸流遺失俊傑隨道乖矣可不審乎象曰係小子弗兼與也二本無失丈夫之心但邪正不容並立既係小子則失必在丈夫安能兼與乎甚矣擇交貴早也六三係丈夫失小子隨有求得利居貞四剛在上象猶丈夫初邪在下象猶小子三近係四而失初是依名輔而舍鄙夫為得所隨矣夫四得時用事三能隨之則凡所以建功名立事業者何求不得然係非正應恐其求為要求得為苟得故必重道義矜名節居守其貞焉乃為利耳不然依阿以求則得不償失何利乎象曰係丈夫志舍下也人之取舍決于志三既係于四則所舍必在于初其失之者乃其本心非徒勢弗兼與也九四隨有獲貞凶有孚在道以明何咎四與五同徳是徳與位稱以此隨君言聽計從何求不獲然權位太盛嫌乎凌逼所為雖貞其勢必危然以貞得凶大臣當此不必規避惟貴處之得宜人臣可自獻者心也所存務皆忠君愛國之孚心之自靖者事也所為務皆履正奉公之道如是則誠積于中動合于道不踰不僭明哲保身自上不疑下不忌何咎之有象曰隨有獲其義凶也有孚在道明功也隨有獲者權勢太盛事雖未危以義揆之宜有凶也有孚在道由其中心明哲乃能以誠結主以道律身而有保身之功也九五孚于嘉吉六二柔順中正嘉美之臣也五以中正應之知之明任之篤一徳一心直以肝膽相為結契孚于嘉者也則君徳修治道振上下交而天下隨之矣吉象曰孚于嘉吉位正中也為政在人取人以身五有正中之徳故能孚于六二不然不過勉強形迹之間安能心與之孚哉上六拘係之乃從維之王用亨于西山上居隨極王者以一念真誠固結天下而不可解有拘係從維之象以此孚誠即王者用亨其神且歆况臣民乎象曰拘係之上窮也拘係之者以真誠固結之極也巽下艮上蠱元亨利涉大川先甲三日後甲三日艮剛居上巽柔居下上下不交下卑巽而上苟止故為蠱蠱壞之極亂當復治當得元亨然天有是運正人事所宜盡也治蠱者于此必興衰救弊銳力深圖如涉大川以求必濟乃為利焉然治之之道如何與其治于既壞之後莫如圖于將壞之時甲日之始事之端也于前事過中而將壞則可自新以為後事之端宜用先甲三日之辛起敝維風以更新之而不使至于大壞于後事方始而尚新更當致其丁寧之意以監前事之失宜用後甲三日之丁永終知敝以圖全之而不使至于速壞如是則始能振刷絶不苟且因循而前弊可革終能詳審絶不紛更激烈而後利可興蠱何不亨彖曰蠱剛上而柔下巽而止蠱世何以蠱剛上柔下君亢臣卑兩情相隔下巽上止臣諛君惰庶事日荒安得不蠱蠱元亨而天下治也利渉大川往有事也先甲三日後甲三日終則有始天行也蠱而元亨亂而復治乃天下治平之㑹也利涉大川者治蠱如救焚拯溺不可因循以坐視不可苟且以隳功君臣于此正當往而有所事也先甲三日後甲三日以亂之終為治之始天運必然正當盡人以應天也象曰山下有風蠱君子以振民育徳山下有風披拂摧落蠱之象也君子以天下之蠱由于民習之卑巽斯民之蠱由于已徳之苟止故于民徳之壊于舊染之汚者必鼓舞作興以振起其維新之機于已徳之壞于物欲之蔽者必優㳺涵養以培育其本明之體則治已以治人而蠱可治矣初六幹父之蠱有子考无咎厲終吉蠱者前人已壞之緒故諸爻皆有父母之象當蠱之初未至極弊乗此未深其事易濟子幹父蠱者也故為有子而考得盖愆而无咎然幹蠱非易易也少不詳慎動成愆尤必以危厲之心處之善救善防乃終得吉象曰幹父之蠱意承考也幹蠱則改父之道事若不順孰知前愆克盖考之願也子能幹之事雖不承意則承也善繼莫大于此安可以傷厥考為詞哉九二幹母之蠱不可貞五以柔主致蠱二以剛中起衰救弊子幹母蠱者也豈非臣之貞乎第以剛承柔恐直行已意未免堅持拂戾故又當周旋委曲不可自以為貞而固執之也象曰幹母之蠱得中道也蠱非剛不能幹非中不能善其幹九二剛得中道既不因循復不矯激蠱何不治九三幹父之蠱小有悔无大咎三以大臣承先朝積弊而更張之有漸幹蠱之象但過剛不中未免振刷太銳為小有悔幸巽體得正雖主張或過于事理人情不至于拂戾故无大咎可有所退托而不幹哉象曰幹父之蠱終无咎也人臣果能幹蠱雖小有悔而巽足矯偏終无大咎何必避始之悔乎六四裕父之蠱往見吝治蠱不可不急四以陰柔才弱不能有為是大臣憚于變更溺于優㳺而反以釀弊裕父之蠱者也如是以往則蠱将日深立見羞吝象曰裕父之蠱往未得也強以任事乃能治蠱若怠以委事能有得乎因循以往正不得借口更張之有漸也六五幹父之蠱用譽五當前人積弊之後而以柔中應二是以繼世賢君資名世賢臣主臣一徳相與勵精剔弊以幹父蠱誠中興令主也善繼善述之譽洋溢天下矣象曰幹父用譽承以徳也五豈能獨自致譽由其虚中任賢而二承以剛中之徳故能相濟成功人主于賢安可無精神契合之也上九不事王侯髙尚其事陽剛居蠱之終在事之外不當治蠱之任者也為不事王侯之象惟尊徳樂道居仁由義以髙尚其事象曰不事王侯志可則也上之不事豈特孤髙沉㝠而已哉此種志趣其所以維持風化激厲人心者甚大固可以為天下後世之則也其有禆于蠱之世者豈淺小哉兌下坤上臨元亨利貞至于八月有凶二陽浸長是君子用事未嘗有意凌逼小人而小人自不敢近故為臨剛長有可為之勢而悦順剛中又有善為之道小人可盡去君子可大行元亨然必所臨者一本道義之正使彼无隙可乗利于貞焉乃利况天運循環消長不定由臨至遯不過八月小人将復得志而君子有凶矣思患預防可不貞乎彖曰臨剛浸而長卦名臨者二陽在下勢雖未盛却有漸長不驟又有方來未艾之意小人于此自難自全故為臨說而順剛中而應臨何以元亨盖有其勢者每多傷于所恃卦徳兌悅坤順是内焉心氣和平不以矯激自負外焉舉動合宜不以意氣自逞卦體九二剛中而五應之是在已天徳自強不過于亢而在人有君為應不慮其孤以此而臨自無不亨大亨以正天之道也内外人己臨之皆善大亨宜矣又戒以貞豈過計哉盖理以維勢天之正道也天道惟正故能主持造化君子惟正故能主持世道君子臨小人可不正乎至于八月有凶消不久也至于八月有凶者以陽今日雖長其消也亦不久君子可不預為之備哉象曰澤上有地臨君子以敎思无窮容保民无疆地臨于澤臨之象也君子體之得臨民之道焉臨民不可無敎然道齊易及仁義難漸不能淪洽肌膚其敎即為未盡必敎育之思亹亹不倦乃心極其周與澤俱深矣抑臨民不可無養然風俗不同苦樂各異不能容納保䕶其養亦為未盡必容保之事蕩蕩無垠乃量極其廣與地同厚矣此至聖有臨之道也初九咸臨貞吉初陽方長以正去邪未嘗有意凌逼小人而自然退伏有咸臨之象然使自處有一不正小人得以中傷今剛而得正則所持皆義理之道而非發于意氣之私無偏黨無反側此臨之貞也動出萬全在我無可乗之隙制彼有術在道有可行之㑹矣吉象曰咸臨貞吉志行正也邪正不容並立小人之邪不去君子之正不行志欲行正道于天下所以必欲去小人也九二咸臨吉无不利二剛得中是秉道嫉邪而不傷于過激者也且上進之勢與初不同小人撓阻不得以是而臨誰敢中傷吉吾道大行无不利象曰咸臨吉无不利未順命也小人朋邪害正不順君子之命故必咸臨而後吉利六三甘臨无攸利既憂之无咎小人位居二陽之上自度難容欲媚悅以自結于君子為以甘悅臨人之象其如君子不受非道之悅何利之有若知甘臨難以求容而憂之改行存善則无妄悅之咎象曰甘臨位不當也既憂之咎不長也以甘為臨无徳而位君子之上是其咎也能憂而變甘為誠則咎不長矣六四至臨无咎柔正應初是大臣下賢情意懇切表裏如一不以勢位拘不以毁譽間相臨之至者也如此推誠吐握何負相臣之咎象曰至臨无咎位當也凡異己必疑同徳自信四惟位當有徳能孚所以見賢即親相臨獨至不然將訑訑自足安能休休有容哉六五知臨大君之宜吉君臨天下自用則小獨任則偏五以柔中應二其為臨也不自用而任人乃知者之事而大君先務之宜也如是恭己可以成化吉象曰大君之宜行中之謂也人主以用賢為中中即宜也六五知在知人不在偏知是行中矣所謂大君之宜者此也上六敦臨吉无咎處臨之終是臨民敎思无窮容保无疆深仁厚澤淪浹天下敦厚于臨者也如是則久道化成吉且无負臨民之責而无咎象曰敦臨之吉志在内也人主于民有是心斯有是政志在萬物一體故化成于上而治成于天下也坤下巽上觀盥而不薦有孚顒若觀者有以中正示人而為人所仰也盥將祭而潔手也薦奉酒食以祭也顒然尊敬之貌九五居上四陰仰之又内順外巽而九五以中正示天下所以為觀觀化在民為觀在已必也信不以聲敬不以色沖然穆然恭已于上而一種孚誠之意不論内外動靜其精神愈斂愈純愈收愈潔如祭者盥而未薦有孚在中顒然可仰此篤恭之妙也彖曰大觀在上順而巽中正以觀天下卦名觀者盖以人主為觀非位不尊非徳不立九五以一人在上而為天下之觀其觀大矣然必有所以成其大者則在于徳順則和平不拂巽則沉潛不露以此為觀于天下不假作為不尚形迹而建中表正超于聲臭之表所謂皇建有極非徒擁位者矣故為大觀觀盥而不薦有孚顒若下觀而化也觀而止言其孚者盖以精誠之極感格自神其篤恭之不顯有以嘿運于人心而下之觀者亦黙化于中正而不自知其然也觀天之神道而四時不忒聖人以神道設敎而天下服矣夫下而觀化止一觀示之間則上之觀也無心下之化也亦無心觀之為道不其神乎極而言之天以無聲無臭四時各循其序無過中失正之差何其神也而聖人設敎未嘗有聲色之迹而天下人民不識不知順帝之則而無不服則聖人之道直與天地同其神化矣象曰風行地上觀先王以省方觀民設敎風行地上遍及庶物觀之象也先王以為天下風土異宜習俗異尚不遍無以為觀也于是廵行方岳使太史陳詩市官納賈而因其不齊爰設以敎如末俗敎以農桑淫風敎以禮别奢敎以儉儉敎以禮神而化之使民宜之務使同歸中正此王者之觀也初六童觀小人无咎君子吝陰柔在下無識無才不能逺見童觀之象此在小民日用不知不足深咎若君子則當觀光于國不能光昭聖化為可羞吝象曰初六童觀小人道也可使由而不可使知者小人在下之道則然也豈君子所宜哉六二闚觀利女貞陰柔居内而窺乎外是不能覲光王烈而惟窮居獨處仰窺王化者闚觀之象此在女子則為守貞豈志四方者可如此乎象曰闚觀女貞亦可醜也丈夫在世宇宙之事皆吾分内之事二雖不同小人亦止比于女子不亦可醜之甚乎六三觀我生進退六三居下之上可進可退故不觀九五而獨觀已所行之通塞以為進退既慮輕進為干時又慮苟退為養拙如此以觀可謂下不負身上不負君者矣象曰觀我生進退未失道也進退而皆觀于我生則以我為主進固可以行道退亦所以修道不至兩失所據矣六四觀國之光利用賔于王五以中正為觀禮樂紀綱燦然明備君之光也即國之光四以大臣親炙其盛實千載奮庸之㑹也君子際此猶髙不賓之節豈不有負明時乎故疏逖之臣利于朝覲草茅之士利于仕進作賓王家共慶彈冠可也象曰觀國之光尚賓也四非輕進以五崇尚賓賢之禮也九五觀我生君子无咎九五徳位兼隆而為四陰所仰是以君子之道為觀天下者也故必反觀我之所行果能建中表正盡合君子之道然後已不失徳民不失望而于君道無愧矣象曰觀我生觀民也民之視傚係于君君之得失騐于民九五之觀我生不但自觀已也又必察民徳之醇疵以徵主徳之善敗也上九觀其生君子无咎陽剛居上是以君子之道師天下者也當其任者亦須反觀其生道徳學術果足為世儀表則廉頑立懦之風由我而成而于君子賓師之責無忝矣象曰觀其生志未平也上雖無位而其為觀天下之志不能自己故兢兢不忘戒懼而自觀其生也震下離上噬嗑亨利用獄卦象頥而一陽間之如一統之治為強梗者所間必去之而後天下同風故為噬嗑既噬而嗑則梗化者去而化可行亨然強梗難以徳服若從輕恕之法優容之典未免養奸縱亂非用獄不可而卦之威明得中又具治獄之道者必用此以治之小則懲大則戮然後間去而亨故利彖曰頤中有物曰噬嗑上下兩陽而中虚頤口之象九四一陽間于其中為頥中有物物在頥中而不噬則人身之咽喉塞矣梗在要害而不去則王者之敎化塞矣必噬之而後合故曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也詞曰亨者以梗化之人阻吾聲敎必去之而後亨也利用獄者盖治獄之道惟威與明而又貴乎得中卦體三陽三陰剛柔各半是執法之義與矜恤之仁並行不悖不過暴不過縱也卦徳下動上明是決斷之威與精察之識各極其至無姑息無蒙蔽也觀雷電合章之象是明動相資明合動而益顯動合明而愈神觀柔中上行之五是剛柔相濟矜恤不至容奸惻怛不至長惡凡此皆用刑之道故五以陰居陽位為不當若未能以徳化民而以此用獄何奸不燭何暴不弭所以為利象曰雷電噬嗑先王以明罰勑法雷電交至明威合一以去間噬嗑之象也先王以有間而後合不若未間而預防盖法弛而犯必多恕反成刻律明而人不蹈嚴亦寓慈于是明辨其輕重之罰以整肅其一定之法使人知所畏避不待噬而後嗑矣初九屨校滅趾无咎初上無位為受刑之象中四爻為用刑之象初在卦下罰薄過小用輕刑以懲于初為屨校滅趾之象止惡于初小懲而大誡此小人之福也自无大咎象曰屨校滅趾不行也趾所以行滅則知所懲誡而不進于惡矣六二噬膚滅鼻无咎二有中正之徳心無偏私明斷合宜者也治獄而情偽立辨如噬膚之易然所乗者剛暴之人非嚴刑峻罰不足以服其心故不免于傷滅其鼻乃得无咎象曰噬膚滅鼻乗剛也二噬膚矣又滅鼻者非過嚴也所乘者剛務為長厚即為養奸不得不如此也六三噬腊肉遇毒小吝无咎陰柔不中正無治獄之才徳治人而人不服為噬腊肉遇毒之象夫身為刑官不能得人之服未免小吝然彼為間而我治之刑當其罪終必服法而无咎象曰遇毒位不當也三之遇毒豈人真難治哉以素行不足以取信也九四噬乾胏得金矢利艱貞吉大臣以剛居柔是以明斷之才存欽恤之念以此治獄為能以剛克強以直理枉雖遇難治之人亦得其情而堅者剖直者伸為噬乾胏得金矢之象然主刑者民之司命必利于艱貞其難其慎惟恐冇情法之私無偏無黨惟恐有喜怒之狥乃世無寃民天下稱平而吉象曰利艱貞吉未光也四必艱貞而後得吉者恐用刑者之心容有偏倚之私而未光也六五噬乾肉得黄金貞厲无咎柔中居尊是慈祥之主能不流于姑息此以用獄自得其情有噬乾肉得黄金之象然獄成而獻之天子民無更生之望矣故必守之以貞不敢以操縱自私而出入惟允持之以厲不忍以生殺惟予而恣雎自用乃刑清民服無忝造命之任无咎象曰貞厲无咎得當也五必貞厲乃得无咎者盖貞則聽斷惟公厲則心思詳審所以刑得其當而无咎上九何校滅耳凶上九剛惡已極怙終不悛宜服上刑為何校滅耳之象凶莫甚焉象曰何校滅耳聰不明也明罰勅法有耳共聞上獨聽之不聰故以滅耳罪之若能審聽而早圖之則無此凶矣離下艮上賁亨小利有攸往賁飾也内離外艮有文明而各得其分之象故為賁賁雖尚文然貴得中若以柔來文剛陽得陰助而離明于内則質為主而文濟之既敦樸以為先又文明以成化文質得宜可以行之逺久故亨若以剛上文柔而艮止于外則文為主而以質輔之雖足以矯固陋之習却無以敦尚實之風文過乎中僅可飾乎一時故小利有攸往彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往剛柔交錯天文也賁何以亨卦變柔來文剛是真誠内積文來飾之文質彬彬禮無不行故亨然文所以文其質也自其分剛上以文柔則未免文勝之過故小利有攸往觀賁之亨利而知賁非徒文而已盖盡天人之藴焉彼剛柔交錯卦之變也即日月星辰昭回于天者也非天文乎賁之義昭于天矣文明以止人文也離明艮止卦之徳也即君臣父子燦然有禮以相接而其中又截然有分以相守也非人文乎賁之義昭于人矣觀乎天文以察時變觀乎人文以化成天下試以賁道而極言之也天之四時遞變往來不窮甚難察也觀乎剛柔之交錯剛來見陽之復柔來見陰之復而變無不察矣人之治化恩易于瀆防易于暌甚難成矣而觀乎文明之以止秉禮見其相接安分見其有守而化無不成矣賁道豈不大哉象曰山下有火賁君子以明庶政无敢折獄山下有火草木皆映賁之象也君子體之于兵刑禮樂之庶政則用其明以修之以成文明之治至于折獄生死攸關貴于詳審而忌明察苟恃明巧飾則此敢之一心不得其死者多多矣故君子非不折也无敢輕用其明以折之焉初九賁其趾舍車而徒剛徳明體本足以上賁皇猷者而處在下位道貴自賁為賁其趾之象衡門泌水之下仁義自麗故車馬之榮人所共羨初能舍其非道之車而安于徒步此以道徳為光華者也象曰舍車而徒義弗乗也舍車而徒豈以隠為髙哉非其義也禄以天下弗顧也繫馬千駟弗視也以義揆之故弗乗也六二賁其須二與三中正同徳則心必相孚無應黨孤則勢自相倚故與三相須而成賁者也一謀一猷皆資三之智力則柔得剛助文治可彰為賁其須象曰賁其須與上興也三以才人在已之上二能附之而興起有為則賁治可成矣九三賁如濡如永貞吉一陽居二陰之間是大臣操文柄于上羣臣宣文敎于下奔走承宣皆不乏人凡所猷為自成彩色賁之潤澤而流光者也為賁如濡如之象然濡陽者陰溺陽者亦陰必永守此貞蒞之以莊接之以禮終始不易其正乃有以起其敬畏消其不遜賁常濡矣吉象曰永貞之吉終莫之陵也凡人之陵皆生于狎三以貞自持嚬笑不苟凡彼陰柔固将奔走之恐後矣安敢陵我哉六四賁如皤如白馬翰如匪宼婚媾四以大臣與初正應本隂陽相賁者而為九三所隔是同徳艱于㑹晤無以成經緯之功象猶物之失賁而皤如然相遇雖疎而求初之心甚急甚切象如白馬之行有飛翰之疾夫九三剛正非害四也實親四也六四于此可因其婚媾而失守乎永求初合可也象曰六四當位疑也匪宼婚媾終无尤也四所居之位逺于初近于三疑若可附而求者所以來三之求也然位雖可疑而志不可奪四能守正而不與九三剛正終能以義抑情無相尤之念六五賁于丘園束帛戔戔吝終吉五以柔中為賁之主敦本尚實耑以儉樸先天下是不賁于市朝而賁于丘園者也于一切禮文過于簡畧有束帛戔戔之象當賁飾之時而儉嗇若此固不免于鄙陋而吝然禮奢寧儉抑僭還淳終必得吉象曰六五之吉有喜也時方尚文主文治者方有憂慮五能反本而得終吉世道有雅化矣寧無喜乎上九白賁无咎上有陽剛之徳是人臣盡革華靡獨維淳質以白為賁者也夫賁極反本復于无色無文而為至文又何文盛之咎象曰白賁无咎上得志也上以救文維世為志今白其賁而无咎化成天下之志无不得矣坤下艮上剥不利有攸往五陰在下而方生一陽在上而将盡故為剥陰盛陽衰小人壯而君子病當全身逺害不可有所往也彖曰剥剥也柔變剛也卦名剥者陰有以剥落之也盖小人既衆乗君子之孤欲盡易為小人之黨也不利有攸往小人長也順而止之觀象也君子尚消息盈虚天行也不利有攸往者小人盛長時不可往也且坤順艮止有順時而止之義君子觀剥之象尤當謹身晦迹不入不居有待而往所以然者陽息而盈則天運復時行則行陽消而虚則天運剥時止則止此天運循環不得不然者也君子尚之而行順時乃所以順天也象曰山附於地剥上以厚下安宅山至髙而反附于地山勢傾頽剥之象也君子以地不厚不能載山下不厚不能安上上無宅下為之宅故當剥時以救治必貽以休養予以安逸以安民生則下之民安而上之宅亦安矣盖民為邦本本固邦寧剥民適以自剥也初六剥牀以足蔑貞凶剥在卦始雖未即奪君子之位然已侵其權而泥其道象猶剥牀而先及其足勢必至于蔑貞然君子者固小人所藉以安者也今漸蔑貞自失所庇矣寧無凶乎小人何利為此象曰剥牀以足以滅下也滅陽之害方起于下今雖㣲而後必盛君子其可忽哉六二剥牀以辨蔑貞凶二進而上肆忌之勢漸盛害正之謀浸行象猶剥牀而及其辨也勢必蔑貞取凶君子可不思患而早圖之象曰剥牀以辨未有與也剥牀至辨雖盛于足猶幸其黨與未盛尚可以去失此不去禍無及矣六三剥之无咎衆陰方剥陽而三獨與上應是不但無黨邪之失且有扶正之功剥之无咎者也象曰剥之无咎失上下也三與上下四陰其類同也一意從陽无復顧忌失乃所以為得也宜其无咎六四剥牀以膚凶四陰黨盛忠臣義士皆受其殃象猶剥牀以膚然君子既剥小人豈能獨全凶象曰剥牀以膚切近災也災已及身切而且近去無及矣君子何不早為之謀也六五貫魚以宫人寵无不利五為羣陰之長誠能統率小人以次而聽命于陽國政事權一歸君子之掌握如貫魚順序以宫人承寵于君之象夫國有君子則宗社之福小人之庇也无不利象曰以宫人寵終无尤也黨邪害正人人得而尤之今五以宫人寵君子嘉與維新必不追論往事終必无尤也上九碩果不食君子得輿小人剥廬剥時君子俱極淪落在上一陽獨存于朝是天特畱此以興善類以開太平為碩果不為人食可種而生之象夫當剥極之時猶有君子必能福國庇民而民載之如得輿然小人亦蒙其庇矣若必欲盡剥以為快世安有君子既盡而小人獨存者哉祇自剥其廬耳究何利乎象曰君子得輿民所載也小人剥廬終不可用也何以得輿盖徳足庇民君子愈孤民心愈殷雖為獨立民實載之何以剥廬小人用盡機謀意欲盡害君子究極于終適以自剥安所用其剥乎震下坤上復亨出入无疾朋來无咎反復其道七日來復利有攸往剥盡而坤陽幾盡矣而又復生于下一陽來復故名復其在人事君子退而復進吾道發舒自可有為而亨其徳動而順行又能以道處勢亨之在已出入无嫉害之患亨之在人朋來无摧抑之咎此豈獨人事哉以陰陽反復之道推之自姤一陰始生歴遯否觀剥以至于坤于卦為七爻于時為七日一陽來復天運循環有必然也時事至此道可大行功可大建以此而往何弗利焉彖曰復亨剛反復何以即亨以剛既往而復反則君子既去而復來勢將在君子矣正道有不亨乎動而以順行是以出入无疾朋來无咎夫一陽來復其勢甚㣲何以无疾无咎盖君子當剥之後其氣久鬱倐忽而來未有不銳然思逞者今内震外坤是陽動于下而以順上行凡所作為相時度勢不驟不激順理以行可以培初回之元氣可以養方來之全力故已之出入固皆自復之道而朋類之往來亦得牽復之吉反復其道七日來復天行也反復其道七日來復者以陰陽消息理勢必然君子可不承天乎知天行益知順行之不可已矣利有攸往剛長也一陽方來道尚未盛何以利往盖剛反之勢將至滿朝道可大行也復其見天地之心乎觀復于人事有以知君子之亨觀復于造化又有以見天地之心剥盡而為純坤天地生物之心幾于滅息而積陰之下一陽復生其生生之機若無而忽有將絶而忽續其不息之心乃復可見在人則為靜極而動本心幾息而復見之端也天且如此人可不復乎象曰雷在地中復先王以至日閉關商旅不行后不省方一陽在下復之象也先王以為運化之機存乎天贊化之妙存乎人㣲陽不養則陰陽愆伏人物夭癘皆由于此故設安養之法于冬至之日正陽復之時而閉關焉下而商旅不行以培養生意上而君王不狩以靜養生機使一脉㣲陽凝靜不擾則養之固而發之力而順時贊化之治大矣初九不逺復无祗悔元吉初為復主而在事初念動即覺念覺即消不待形見而後復復之不逺者也夫人之悔生于動動而即復悔從何來復至于此天理日萌人欲日消可以希聖希賢元吉象曰不逺之復以修身也學以修身為本心無妄念則身無妄動今復曰不逺省察克治過無不知知無復行豈非所以修身哉六二休復吉柔順則能從人中正則能擇善近初之賢而能下之以資切磋則日進于善而不自知復之休美者也徳業日進吉象曰休復之吉以下仁也初九克復之仁人也二能下之則以友輔仁不期復而自復矣六三頻復厲无咎以陰居陽生稟之偏又處動極性情之躁復善未固為頻復之象夫頻復則必頻失固將陷于人欲之危而厲然頻失而能頻復能復于遷善之門而无咎象曰頻復之厲義无咎也頻復不免于厲然能屢復則過而能改固非遂私而文過亦非畏難而苟安于義為无咎也六四中行獨復四在羣陰之中獨與初應是與衆同行不與衆同流而獨能景行仁人以自復其善者所謂恥凡民而毅然豪傑自任排異學而卓然聖賢為徒為中行獨復之象可謂善復者矣象曰中行獨復以從道也初盖有道仁人也四惟初之是從是從道也雖違衆獨復又何有所恤哉六五敦復无悔五有中正之徳是天資純粹而又以復善為心者故其操存之固不以内外分不以始終間敦厚于復者也復至此得于心者安固而不摇體于身者重厚而不遷庶幾至誠之無息其為復也固非頻亦非逺何悔之有象曰敦復无悔中以自考也人受中以生本無欠缺第在已之功有間故有成有不成耳今五之復无悔是天全而賦之我亦全而受之徳至此成矣其為成也即以自有者成之也上六迷復凶有災𤯝用行師終有大敗以其國君凶至于十年不克征陰柔居復之終既無為善之資又無復善之念蔽錮已深善端復滅迷而不復從欲則凶天人交厭災𤯝必及矣以是而行無一可者祇以僨事且將喪心終身汨没而不能出其象如此迷復之凶可不畏乎象曰迷復之凶反君道也迷復之凶雖用之君且反其道之常况其下此者乎甚矣復之不可迷也震下乾上无妄元亨利貞其匪正有眚不利有攸往无妄實理自然之謂動以天不動以人故為无妄无妄則誠誠則動物可以悅親而信友可以獲上而治民必得元亨无妄未有不正者但認理不精偏執信果之念自以為无妄者即妄之根也必所存所發不惟妄念不着即无妄之念亦不着一皆出于天理之貞乃得元亨而利若有不正是妄而已眚且不免况求往之利乎彖曰无妄剛自外來而為主于内動而健剛中而應大亨以正天之命也其匪正有眚不利有攸往无妄之往何之矣天命不祐行矣哉无妄何以元亨利貞卦變天徳之剛不復外馳還為一心之主誠之存者正矣卦徳震動乾健所動自健任我有為而不屈于物欲誠之發者正矣卦體九五剛中而應六二所應自中任我應酬而不襍于詭隨誠之孚者正矣此皆无妄之道无不大亨然必以正者乃天命之本然也天命無不正正則祐不正則不祐其匪正者彼自以為无妄可往究將安之不正則逆天矣其何以行之哉象曰天下雷行物與无妄先王以茂對時育萬物天下雷行震動發生是物物而予之以无妄也先王以物之生一天也天一時也于是以至誠篤實之衷因時而施對此天時以發育萬物因其所性而不為私盡人盡物使不失其實理之自然此誠體无妄之極功也初九无妄往吉剛在内而為誠主是最初一念動以天不動以人真无妄者也以此而往何誠之不能動物乎吉象曰无妄之往得志也以誠而動惟無期望于外而行無不得又何弗慊之心六二不耕穫不菑畬則利有攸往心性之學有有為心與助效心皆妄也六二柔順中正于凡天命之理所當為者純心為之無所為于前無所冀于後始終無間真无妄者也故有不耕亦不穫不菑亦不畬之象以此而往正義明道觸境皆通何弗利焉象曰不耕穫未富也不耕穫者無所為而為非計其効而為之也此純心之學也六三无妄之災或繋之牛行人之得邑人之災卦之六爻皆无妄者也三處不得正居非其地遇非其人本无可謗而毁或來災之无妄者也為或繫之牛行人牽之以去而居邑之人反遭詰捕之擾之象此真无妄之甚矣君子奈之何哉亦惟順受其正而已象曰行人得牛邑人災也得牛者行人也而災在邑人此之謂无妄之災而君子亦自信而已九四可貞无咎陽剛乾體是天徳為主下無應與是物交无引實心實理正可常存而不變誠能固守此貞自无邪妄二三之咎象曰可貞无咎固有之也无妄乃天命之正吾之固有而宜守者能守之不變宜无咎也九五无妄之疾勿藥有喜五與二中正相應君臣同徳内治已修无疾者也設或奸宄竊發蠻夷猾夏内憂外患起于不虞為无妄之疾但當靜以待之勿用攻擊其變自弭為勿藥有喜之象象曰无妄之藥不可試也既云无妄治以不治可也若又試之反傷國家之元氣生民之命脉矣如之何其可哉上九无妄行有眚无攸利上九非有妄者但處窮極之地自恃无妄執一而不知變不可行而必行行即匪正而有眚矣拂情違勢往何利焉象曰无妄之行窮之災也无妄之行豈災也哉窮極不變致之災耳乾下艮上大畜利貞不家食吉利涉大川以艮畜乾有止畜之義乾健篤實有藴畜之義故名大畜畜貴于大尤貴于正故君子學以畜之必以聖賢為歸而不惑于異端功利乃為大畜而利然止獨善而不獻之王廷非畜之大也必食禄于朝以抒抱負乃道大行而吉抑苟禄而不道濟天下亦非畜之大也必大展經綸如涉大川乃匡濟一世而利此體用合一之學也彖曰大畜剛健篤實輝光日新其徳卦名大畜卦徳内乾剛健盖其徳性之剛常主于内而不屈于物欲外艮篤實由此見之踐履真純懇至慥慥闇然之中章光自不可掩内外交養胸中所得自見日異月新成其所畜之大剛上而尚賢能止健大正也何以利貞卦變九自五而上是人臣進而居鼎鉉也卦體六五尊而尚之是人君折節以下賢也卦徳又能止健是鋤強抑暴使不為惡也三者所關甚大皆非大正不能如剛上而非直已守義則進不由道尚賢而非屏欲去邪則恭敬虚拘止健而非道徳齊禮則化導無本可見正者修身尊賢之道戢暴禁奸之本也安可不貞不家食吉養賢也不家食吉以有尚賢之君懸禄養士君子懐才抱徳當享大烹若此時而安于家食必無致用之才者也利涉大川應乎天也利涉大川盖濟事以時而時即天也六五下應于乾為應乎天君子藴蓄深厚義理融貫隨時轉移動與天俱故利涉也象曰天在山中大畜君子以多識前言往行以畜其徳天至大而在山中大畜之象也君子以天地民物道徳性命莫不具于古人之心而其發于言行無非徳之所著也于是逺稽博覽而多識之察言以求其心考行以觀其用使前言往行無不㑹于胸中則萬理統于一心一心統于萬善問學道而徳性尊所以蓄其徳者大矣初九有厲利已初九陽剛為四所畜是君子為小人所摧抑也當此冒進必至取困有厲惟順時而止乃能全身而利象曰有厲利己不犯災也初知往即有厲而已之則不犯小人排擠之災明哲保身之道也九二輿說輹九二陽剛才徳足以致用猶輿足以行也得人推轂豈慮脫焉乃為五所畜幸其處中能審時度勢時止則止為輿說輹而不進之象可謂知幾之士矣象曰輿說輹中无尤也二有中徳明足以見㡬介足以自守故无躁進之尤九三良馬逐利艱貞日閑輿衛利有攸往三與上皆陽而當畜極是時極當通而又同徳相孚故與上同升馳驅乎王事有良馬逐之象然逐則過剛太銳故利于艱難其思慮貞固其施為且日閑習輿衛恐有傾覆兢兢乎致逺之具恐有中傷兢兢乎周身之防則其出不苟其進有為何攸往之不利乎象曰利有攸往上合志也初利已二說輹皆不利往而三獨利者盖馳驅王事三之志也而上與之合是志同道合互相汲引故往無不利六四童牛之牿元吉天下之事制于已然者難為力制于未然者易為功六四居大臣之位為君止惡者也初惡未形四應而即制之潛消黙化猶牛未角而牿以防其觸也是能以禮防民上不勞于禁制而有以革心下不苦于刑誅而有以從化元吉象曰六四元吉有喜也凡止惡而費周張不免拂意六四止之于初而得元吉則我無為而民自化此心為之一快也六五豶豕之牙吉二剛已進而畜之是民有惡而勞于制矣六五柔中居尊為能乗其機而善制之修之以政維之以敎厚生正徳使知廉恥不必嚴刑峻法而民自不偷如患豕牙之利不制其牙而制其勢剛躁自止矣刑清民服何吉如之象曰六五之吉有慶也人主制民有道而使天下不敢為暴豈特朝廷之福哉而實天下國家之福也上九何天之衢亨上當畜極而通之時則是強暴盡殄反側悉平何浩浩蕩蕩如天之衢也治化大行亨象曰何天之衢道大行也人心既無不服則王道自無不行正所謂應天者也震下艮上頤貞吉觀頤自求口實卦體外實内虚上止下動頤口之象養之義也故為頤養之係于身心不小必得其至正内外乃為有益而吉然正與不正其介甚㣲惟自反觀反求重加審擇如養徳必觀其所養之道果能集義以養氣寡欲以養心崇聖賢大學之道而不為異端之術乃為得正如養身必觀其所以自養果能不以貧賤飢渇害其心不以聲色臭味汨其性由性命當然之則而不為飲食之人乃為得正正始得吉不正則不得吉惟在我之觀求何如耳彖曰頤貞吉養正則吉也觀頤觀其所養也自求口實觀其自養也頤何以貞則吉盖養惟以正則身心有主物欲不染乃吉也其所謂觀頤者純乎性命之正學聖道而不溺于虚無崇正學而不流于術數養徳者宜作如是觀所謂自求口實者觀其自養之道一皆出于義理之正如窮不屑嘑蹴達不冒素餐養生者宜作如是觀反觀之功是在養正者加之意耳天地養萬物聖人養賢以及萬民頤之時大矣哉養正之道頤之道也極而言之豈特一身資之哉天地施澤以養萬物于既生之後無所及而無乎不及聖人養賢以及萬民有所及而卒歸于無不及夫莫大于天地聖人而皆不外于養約之不出成身成性之間而極之則見盡民盡物之際頤之時豈不大哉象曰山下有雷頤君子以慎言語節飲食雷動山下震動發生物由此養頤象也君子以言語從頤出者慎之勿妄發以病徳飲食從頤入者節之勿過度以防身如是則内外交修其所以養徳養身者固不止于此而莫切于此矣初九舍爾靈龜觀我朶頤凶陽剛在下本飽乎仁義而不願人之膏梁者乃上應六四失其性靈動于利欲為舍爾靈龜觀我朶頤之象自失養道敗徳喪名凶象曰觀我朶頤亦不足貴也靈龜本可貴者乃舍此就彼將已之所固有而亦失之矣何足貴哉六二顛頤拂經于丘頤征凶養道貴于自立二陰柔不能自養而求于人無一而可求養于初則以上求下是丈夫而甘心豢養于卑賤不亦顛倒而違于常理乎若求養于上則非其正應是君子而甘心乞食于權門而往必遭其斥逐凶象曰六二征凶行失類也六二求初固不可矣往求于上亦復得凶者以無應而行皆失其類故兩有所求一無所利也六三拂頤貞凶十年勿用无攸利六三陰柔不中正以處動極昏邪躁動其所為頤者縱欲敗度恣情滅性拂于頤養之道矣雖日用飲食在所當養而貞究亦不免于凶將終身沒于從欲之危如十年勿用身名俱喪又何利乎象曰十年勿用道大悖也三至十年勿用由其躁動縱情不能以理制欲大悖頤養之道也六四顛頤吉虎視耽耽其欲逐逐无咎以柔居四大臣才不足以養天下必資初九之賢以養人似顛于頤然養賢及民其澤自溥故雖顛而吉第恐相臣為國愛民多下士之虚聲鮮好賢之實意賢人未必為我用耳誠能信任不二下之而專始終無間求之而繼如虎視耽耽其欲逐逐則賢樂効忠無負養道矣象曰顛頤之吉上施光也四以顛頤而亦得吉盖為君上養民臣之責也相能任賢臣之施即君之施光被天下矣六五拂經居貞吉不可涉大川君養天下常經也六五陰柔居尊而不能養人反頼上九之養豈不拂哉然養賢及民君之貞也守此而篤于委任則賢盡力而民被恩吉若以拂經為嫌而自冒昧用之則謨猷不足于養必無所濟故不可涉大川象曰居貞之吉順以從上也上九之賢養民有餘者也五能順以從之而毫無勉強故居貞而吉上九由頤厲吉利涉大川六五頼上九以養人是天下由之以養者也故為由頤夫以天下待命于一相則一夫失所皆予之辜故必已溺已飢痌瘝念切乃能勝任而吉况陽剛在上才以權運當大展其經綸以𢎞濟一世而由頤之事始克盡無愧故利涉大川象曰由頤厲吉大有慶也由頤而以能厲得吉者養道自極盡善天下萬世無不受其慶矣巽下兌上大過棟橈利有攸往亨四陽居中過盛故為大過當大過之時有過人之才者始克有濟上下二陰不勝其重有棟橈之象然天下無不可為之時特患君子無善為之道二五剛中内巽外悅剛而不過有可行之道以是而往自能通時之變反勢之重可以建大功矣故亨彖曰大過大者過也何謂大過四陽居中是時勢極盛天地平陂之㑹帝王升降之衝大者過也棟橈本末弱也棟何以橈初上二陰為本末俱弱在人既不能振作于其始又不能奮發于其終所以不勝其任而橈也剛過而中巽而說行利有攸往乃亨棟既云橈何又利而且亨盖柔弱固不可以濟過而任剛亦不能以有為二五剛而得中是強毅過人而又能裁之以中者也且巽而說行内沉潛而入事理外和順而協人情皆過而不過如是則靜察變而動投機往而亨也乃以是耳大過之時大矣哉大過之時何時也關古今之升降係宇宙之汚隆無其才者不濟任其才者亦不濟苟非剛中巽悅不能適于時入于機調于氣其時豈不大哉象曰澤滅木大過君子以獨立不懼遯世无悶澤水潤木乃至浸滅乎木大過之象也君子體之立大過人之行焉挺然于風波披靡之中其勢孤而易懼乃自守益篤天下非之而毫無顧忌為能獨立不懼超然于名譽是非之外其迹晦而易悶乃自信樂天舉世不見知而不悔為能遯世无悶此誠大學識大操持大過人之行也初六藉用白茅无咎以陰柔居巽下是以無已之小心當天下之大事必置諸安而後已如措物于地而又藉用白茅焉如是則精詳可以無愆敬慎可以不敗以敬處過何咎之有象曰藉用白茅柔在下也陰柔則徳性謙和而不矯舉在下則處事縝密而不激昻故能謹慎不敗九二枯楊生梯老夫得其女妻无不利九二陽過之始未免陰氣害事幸與初陰相比濟之以柔能制其過庶幾剛過而中者也將事無不濟取象于物為枯楊生根而發生有機取象于人為老夫得其女妻而生育有頼此以濟過无不利焉象曰老夫女妻過以相與也陽過始而即得初陰以相與則剛得柔濟過而不過矣九三棟橈凶以剛居剛是處大臣之位剛愎自用違衆拂時安能勝任象如棟橈太剛必折凶象曰棟橈之凶不可以有輔也大過之時患在亢而無助大臣訑訑自足而不可以有輔安得不橈而凶九四棟隆吉有他吝四當大過之任為能以柔濟剛過而不過者也上可以安宗社下可以奠生民如棟隆然以起吉然時當大過人皆知有不可過剛之說四若益以初柔則有他矣大柔則廢隆者將橈不亦吝乎象曰棟隆之吉不橈乎下也棟之所以隆而得吉者以剛柔相濟不至太柔因初陰之柔而至于橈也九五枯楊生華老婦得其士夫无咎无譽九五陽剛之極又比過極之陰是君驕亢于上而臣又巽懦于下其不能相濟如枯楊生華華而不實老婦士夫終難生育之象雖无僨事之咎亦无濟事之譽象曰枯楊生華何可久也老婦士夫亦可醜也枯楊生華本實先撥安能久也老婦士夫生育無基可醜甚矣上六過涉滅頂凶无咎上六處過之極時不可為才弱又不能濟而盡心竭力不避艱險必欲有為奮不顧身如過于涉水而滅其頂雖不能濟而凶然殺身成仁舍生取義于理无咎象曰過涉之凶不可咎也人臣之于國事所可盡者心力所難必者成敗幸而濟天下事固當論其功不幸而死天下事尤當諒其志過涉以至于凶不可以敗咎之也坎下坎上習坎有孚維心亨行有尚陽陷陰中為坎重之則陷之深故為習坎處險之道以信為本人當重坎身已入險所可自主惟此一心卦體中實有孚亨之象處險者果能實心安于義命而不萌僥倖則中有定主利害不驚而心自亨通以是而行必能靜觀時變而成出險之功不亦尚乎彖曰習坎重險也坎何言習坎險也上下皆坎險而又險也水流而不盈行險而不失其信所謂有孚者以坎象為水其信有常其流也足此通彼不至盈溢即其信也此信萬古不變無論行乎地中行乎險阻始終不失也人之處險而中有定主始終不易者何以異于水也維心亨乃以剛中也行有尚往有功也維心亨者以二五剛而在中一真為主利害變故俱不能摇而心自得亨也行有尚者惟剛中而心亨自能妙達機宜功在出險也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉即險而極言之處險則思出險用險亦以防險觀天之險髙不可升觀地之險山川丘陵一險于上而無形一險于下而有形天地且然况王公之有國者而可無險乎法天而設紀綱法度法地而設城池甲兵以凛人心以壯國勢可長守矣是險也者聖人用以保國與天地並存者也其用豈不大哉象曰水洊至習坎君子以常徳行習敎事水流洊至兩坎之象也君子以之為學為敎皆不外此以道而存心修身曰徳行徳行不常則吾心之險將汨天理必日新又新使理熟于身心而不厭以道而立法垂敎曰敎事敎事不習則民心之險得阻王化必勞來匡直使民熟于見聞而不倦治己治人皆必重習而後安之乃洊至之義也初六習坎入于坎窞凶以陰柔居重險之下既無濟險之才又值難濟之勢為在習坎之中而又入于坎穴之象其險益深終于淪胥凶象曰習坎入坎失道凶也天下不可必者時不可強者才所可為者道初失出險之道是以入坎而凶也九二坎有險求小得二處重險之中是人臣尚當國難之衝為有險之象幸其剛中是有孚心亨者才足自衛動不失宜為能因勢利導善其斡旋故雖未盡出險猶可維持國勢為求小得不至入于坎窞象曰求小得未出中也二本有才之人不求大得而求小得以未出險中阻于時耳六三來之坎坎險且枕入于坎窞勿用隂柔不中正而履重險之中則才徳既弱時事復艱來往皆險前險而後枕時勢至此其陷益深不可用也象曰來之坎坎終无功也或來或之此身展轉于陷險之中縱心欲求濟終无可為何功之有六四樽酒簋貳用缶納約自牖終无咎當險之時位近于五是君臣相與以濟險者也君之信任倍于常時故為之臣者事君固不可無禮而在險中則情為要而文次之不必尚繁縟拘形迹惟一以誠樸結君如祭者樽酒簋貳而且用缶凡所獻替皆委曲因明以通其蔽如納約不自户而自牖焉如是則忠悃篤而君心不疑諷諭行而吾言易入雖在險終必濟焉无咎象曰樽酒簋貳剛柔際也樽酒簋貳四豈事君不盡禮哉盖險難之時臣固切于上交君亦專于下應剛柔相際故情相洽而迹相忘所以不煩儀文也九五坎不盈祇既平无咎陽剛中正而時將出險是人主徳位兼隆而又值可濟之機必至夷險為平猶坎雖不盈而已抵乎既平之象人君出險之事已塞无咎象曰坎不盈中未大也君有中徳險應平矣而坎猶不盈者以時尚在險中其中徳未能大有所為非終于不盈也上六係用徽纆寘于叢棘三歲不得凶以陰柔不振之才而當險極危已之際陷之愈深終不得出象猶縛之繩而又置于棘中將三歲不得脫也何凶如之象曰上六失道凶三歲也人必處險有道終乃得出今以六居上不能有孚心亨失其道矣安得不凶三歲耶離上離下離利貞亨畜牝牛吉陰麗于陽故為離人臣麗君莫先乎正而順所以成其正也必陳善閉邪不為阿諛取容而貞乃利且可致君行道而亨然所謂貞者非浮慕持正之名而用意氣以少激也必養成其至順之徳如畜牝牛乃恭順以事疑忌不生寵眷日篤吉彖曰離麗也日月麗乎天百榖草木麗乎土重明以麗乎正乃化成天下離附麗之義也推之人物莫不皆然在天有日月必以氣麗天而後能照臨在地有百榖草木必以形麗土而後能生成况君徳乎必本重明之徳以麗乎正不流于察不偏于私乃能正百官以正萬民天下化之而成文明之治矣柔麗乎中正故亨是以畜牝牛吉也所謂利貞畜牝牛吉者盖人臣麗君苟非中正則情每流于妄悅苟非柔順則行或失于謙和以是而求亨吉也難二以柔麗中正是臣之麗乎君者有徽柔懿恭之徳而能裁之以中行之以義不激不隨得臣之正故亨然惟柔順極至故吉象曰明兩作離大人以繼明照于四方上下皆離兩明繼起重離之象大人以緝熈其徳日新又新使徳輝宣著以照臨四方則光被四表格于上下矣初九履錯然敬之无咎以剛居下而處明體是人臣麗君果于任事喜于見智凡事躁動為履紛錯之象咎幾不免以敬處之而審時度勢持以小心則心有主而動不妄自无履錯之咎象曰履錯之敬以辟咎也初履錯而必于敬者盖躁進一念咎已隨之敬則所以慎其履而辟其咎耳六二黄離元吉柔麗乎君而得其正是臣之麗君將順而匡救渾厚而精明黄離之象成繼明之君徳而不見其功襄化成之盛治而不露其迹君明臣良渾无節義事功之可見也元吉象曰黄離元吉得中道也六二居中不激不隨无過不及得乎中道者也故吉九三日昃之離不鼓缶而歌則大耋之嗟凶重離之間前明將盡為日過中而昃之象斯時也人力固不可諉氣運亦難強爭若不安盛衰之常以自樂而徒戚戚于危亡之憂祇速其斃凶象曰日昃之離何可久也盛極將衰即憂亦不能久人于未昃之時思患預防可耳九四突如其來如焚如死如棄如大臣當後明將繼之時是天命初回人心始向之日正宜以順而動徐圖安定而乃以剛處之陋前人之規行一已之志更張太驟為突如其來之象過剛則激災必及身故有焚死棄之象象曰突如其來如无所容也文明柔順臣之體也突如其來失敬順之道焚則死死則棄何所容其身乎六五出涕沱若戚嗟若吉以陰居尊柔麗乎中雖非過柔然不得其正而迫于上下之二陽為制于強臣君權幾下移矣若能反身修徳憂深慮逺既出涕沱若而憂形于色又戚嗟若而憂形于聲則主徳修于上權奸弭于下矣象曰六五之吉離王公也六五迫于權臣而得吉者位麗王公則一念敬忽理亂攸關憂其憂斯能位其位矣上九王用出征有嘉折首獲匪其醜无咎上九陽剛居卦之上處離之終正剛明及逺者也王者用此道以出征則能伐暴救民而有嘉美之功但折取其首亂之人而威自振所獲者匪從亂之小醜而刑不濫凡此皆嘉也既不畜奸養亂又不嗜殺寡恩无咎象曰王用出征以正邦也出征豈好觀兵哉征者正也寇賊奸宄亂我邦國故出兵以正也周易文詮卷一
